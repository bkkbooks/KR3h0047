body:
  text: 書畫跋跋藝術類一書畫之屬提要臣等謹案書畫跋跋三卷續三卷明孫礦撰礦字文融號月峯餘姚人萬厯甲戌進士官至南京兵部尚書諡文簡是書名書畫跋跋者王世貞先有書畫跋礦又跋其所跋故重文見義也明以來未有刋本僅有鈔本在仁和毛先舒家後歸其邑人趙殿成殿成為孫氏之壻故礦六世孫宗溥宗濓又從殿成得之乾隆庚申始刋版印行任蘭枝為之序初宗溥等以礦書本因世貞之書而作如不載世貞原跋則礦之所云有不知為何語者乃取世貞諸跋散附於各題之下其明人書札可與礦語參證及為礦語所緣起者亦附載焉凡墨蹟一卷碑刻一卷畫一卷續亦如之惟續跋碑刻作墨刻蓋偶爾駁文非宏㫖所在也詹氏小辨曰王元美雖不以字名顧吳中諸家惟元美一人知法古人又書史㑹要曰王世貞書學雖非當家而議論翩翩筆法古雅湧幢小品之論亦然蓋拙於揮毫而工於别古者也礦以制義名一時亦不以書畫𫝊然所論則時有精理與世貞長短正合合二家之論並存之亦賞鑑家所當取證者矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀書畫跋跋序字畫之興兆於河洛古者庖羲氏始造卦象時未有書但布畫成體或以為所畫乃古書之文或以為畫即畫之所祖及史皇所書爰有象形徐鍇注說文稱畫即六書象形之一端其實異事而同理蓋六藝之支流百技之榮華者也自周漢代降以之成名者既多英人學士往往施諸評議加之綴集自晉迄明其書或多至數十百部其最著且傳者衛恆之四體鮑照之銘張旭之十二筆意與夫庾肩吾之品栁尚書之訣李後主之筆法及夫袁昻梁武帝陶隱居之評尉遲郎中之贊與書苑書斷書録書畫史畫録圖書見聞録厯代名畫記及近世書畫舫鐵網珊瑚圖繪寶鑑丹青志人間録之屬好竒雅嗜之士皆可以游意而騁目焉豫嘗觀明王氏所稡刻書畫諸篇喜其採拾多而見聞廣非獨論書畫也其間往往多逸事足資異聞博識然又未嘗不怪其擇之不精若筆陳圖則以為右軍永字八法則以為歐陽行本畫山水訣則以為關同右丞此蓋後世僞俗之所託又如孝源評畫略無短長御史賺書等於俳說既不區夫讒雁亦濫列乎鐫緹是故業無論其重輕學無分乎巨細非托捃博綜為難而核審精辨之為足尚也是書畫譜如干􅀈者為明宗伯尚書餘姚孫文簡公所訂輯公仕明神宗時以文章著清望自詩書禮諸經與夫三史晉書文選皆有評論斯編以學問之餘更起而爭勝於廣川畫跋東觀餘論海嶽書史之間以相與上下前輩風流文彩之盛殆可想已公六世孫翰林君宗溥方官於京師將謀刻之宗溥豫門人也故謁焉而屬為之序乾隆庚申仲春上浣後學任蘭枝題書畫跋跋凡例一先大司馬於從政之暇著述甚勤有名世述三卷人傑編三卷後越絶十卷書畫跋跋四卷居業初編次編餘編十二卷㑹心案晶盤雪里居樂事共三卷銓曹東省經略南樞俱有奏議共二十卷其他馬班異同太史直筆周人輿古文四體等書莫能殫述緣家世籍餘姚遷杭以來卷帙散失是編始得鈔本錯訛極多後復從家姊壻趙意林信處得此本矜慎之私不敢自祕用公當世一是書為跋王大司冦弇州先生書畫跋而作也原本簽題弇州書畫跋似為王氏之跋而於先大司馬附跋之義未明爰仍書畫跋跋之名餘俱未敢妄有增易一集內間有一二條係跋司冦之弟奉常敬美先生之跋者其為王氏之跋則一也故以王氏跋槩之一集內輯注謹因先大司馬有此遺編而弇州山人四部稿內又皆有可徴引爰述舊聞稍晰疑義未嘗一參論例因不復加以謹按名目一本跋文義自明不必更載王氏跋語者於題下止系王氏跋以明相因之義有必參王氏跋互看而始明者於王氏跋下加節録之或全録之一弇州先生好古敏求考核精密有一題而載一跋者亦有一題而載三四跋者儻可不必繁引止徴一跋而先司馬錯綜諸跋而斷以已意則於下别冠以次跋三跋名目互證之一注釋例宜附載本句之下第有止摘一二語頗不足以發明本句者必連及之又病於沓拖故酌從綱舉目張之例而冠之於前一徴引王氏跋語之外有必并載前人書札而語意始明者謹於標題上加别白之一弇州先生才識宏卓於書畫跋尤瀾翻不竭即一跋亦往往纍幅未已注釋僅取其可互相發明焉而已其不盡者空一字再述更端一前代書畫法帖悉萃天地菁英而流轉人間要不得比諸烟雲過眼鴻爪雪泥故於授受流傳之際雖王氏跋語無關本文者亦互載以為賞鑑收藏者之一助一是本為毛稚黃先生所藏後繫一跋今併附刻不敢忘所自也第輾轉傳抄焉保無豕魚亥魯之謬溥等雖敬謹校讐付諸梓人未能自信亦藉是廣為就正云爾
