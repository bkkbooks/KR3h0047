body:
  text: 書畫跋跋卷一明孫鑛撰墨蹟鍾太傅薦季直表王氏跋二首跋云薦季直表最後出由分湖陸歸蕩口華復為之刻石以傳好事者意此神品無上法書不應歴唐宋間寥寥乃爾次跋云攷陳壽志繇本𫝊為魏相國封東武亭侯坐法以侯免文帝即王位為大理即帝位為廷尉進封崇高鄉侯遷太尉而不言作司徒若上米芾印則宋人之蛇足也芾恒云生平不見漢魏書故寶晉齊㫁以晉始太傅此表正與蘭亭絶相似皆是已退筆於草草不經意處生趣但蘭亭長此匾蘭亭瘦此肥蘭亭今此古然蘭亭以骨為肉此以肉為骨蘭亭規矩在放縱中此放縱在規矩中其相反處筆意亦正相合也第考諸跋中來厯即始于陸行直以前不著所自好事者疑寥寥唐宋間亦是見知律然筆法自妙不應以耳聞疑目見若以年銜為駁則史傳所記主在大政蹟不謬區區履歴非所經意且此等處極易錯不足為據偽作者摭史事粧飾固不難耳季直事陳壽志不載書法創出事創出正可定為真也米顛閱書白首無魏遺墨語見書史米芾印果似蛇足然安知非作書史後得覩此不及増入又安知非以寶晉故妬魏蹟如劉涇不信世有晉帖耶若貞觀淳化宣和大觀四印則的為偽作無疑且陸跋止稱有河東薛紹彭印章則此外諸印皆至正以後所増耳蛇足又豈獨一顛哉司冦公得此卷後即出撫鄖陽余不及乞觀至今為恨今諸子中不知阿誰收得異日尚圗畢此心願也右軍三帖王氏跋一余前得先右軍大熱此月二帖於崑山顧氏乃黃琳美之家物轉入陸太宰全卿顧氏其外孫也後得淡悶干嘔帖於慧山談氏印識題跋甚衆大熱帖有二本一在閣帖第七卷云足下尚停數日半百餘里瞻望不得一見卿此何可言足下疾苦晴便大熱小船中至不易可得過夏不甚憂卿還具示問黃長睿釋如此劉次莊闕小字不釋船字釋作恒臨江二王帖釋作比恒又云里字上稍短釋作生字者非比恒小船俱未當未見閣帖真本不敢臆㫁今騐顧氏所摹閣帖恒字是無可疑小字右㸃帶筆自中畫左貫過右中畫上有橫轉畫殆類所字第作所恒文義不屬一在閣帖第八卷便大熱足下晩可耳甚患此熱力不具王羲之上不知司冦所得是何帖淡悶干嘔帖亦在第八卷足下各如常昨還殊頓胸中淡悶干嘔轉劇食不可強病高難下治乃甚憂之力不具王羲之楊用修謂淡即痰干即乾古字從便耳良是劇字劉釋作亂非此月帖閣帖無之元章書史待訪録俱不載不知作何語跋疑是南宫臨本想其筆勢流動或亦可玩淡悶帖據鑒定為唐人臨本此所謂下真蹟一等亦是竒寶第恐是後閣帖上臨出耳大熱帖果係真蹟真天地間神物足與季直表抗衡安從得乞暫玩古人于筆法或觀舞劍或見蛇鬬皆云有悟入然豈如覩真蹟之為快哉虞永興汝南公主誌銘草王氏跋一此吾鄉陸太宰完所藏也而李文正東陽為識其後且云太宰見此本三十年往來於懷其弟長卿始購得之以為快然余攷米襄陽書史云先於洛陽王䕶見摹本後十年真蹟在故相張公孫直清處有名幾元者題又宣和書譜已入秘殿而前後銜題寳識今皆無之此豈王䕶本此書雖妙極戈法而不無襄陽結搆或即米所臨未可知也此無錫華氏物也華禮部起龍殁後數月唐元卿忽謂余曰元谷家汝南誌草今又為鳳洲公有矣若甚懊不得意然書史云此幅文但至半而止行下有空白紙猶空十一字此蓋卒日猶未言葬闕文尚多安得便言赫赫高門不當後幅却與前幅不相連屬也然此蓋草稿赫赫高門正是銘文發端語葬日等不必屬草祇可臨期填入故徑接赫赫去耳幾元題是咸通二年唐懿宗年號也崔十八綽曰此去獲見汝南帖亦何減於昇第耶頓令人土苴人爵内小字注不知注在何行旁今既無此小注其後行下猶有十一字空白否空白止十一字則後無餘紙御題寶識應即侵入行内何由割去然則司寇所得多係米臨本不亦王䕶本㫁非真蹟明矣凡御寶等但有添入者鮮有割去者惟貞觀淳化所收䦨出民間或割去以應募自遭靖康亂後無此忌矣且未入南宋御府復何為諱褾識耶惟不増褾識或猶是王米二本不至作螟蛉耳孫耳余初聞元卿語時曽舉書史米臨張直清本對今跋中亦及之人所見固不相逺第果係米臨本必當并入小字注不應遺却若王氏本有無則或未可知耳褚河南哀冊文王氏跋二首跋云右故相國河南公褚登善書唐文皇哀冊文得之吳江史氏家蓋九百年而紙素完好墨色爛然刺眼真神物也次跋云余所得此帖有于瓌紹彭題識及諸名賢私印甚夥至于紹興御記及敷文鑒賞㫁不若詹本之少據詹本世不復著一鈎一捺有千鈞之力雖外拓取姿而中擫有法余甲戌嵗與敬美同在禮部間論書法敬美曰若覩家兄所藏哀冊文天下無墨蹟矣余曰安得乞一覩敬美許之後因循未果米元章未見此帖然相傳俱云學褚最久余嘗見其跋褚摹蘭亭真蹟筆法與此絶相似海岳名言云吾書小字行書有如大字惟家藏真蹟跋尾間或有之不以與求書者心既好之隨手落筆皆得自然備具古雅又云褚遂良小字如大字以此騐之益信莫廷韓初入燕日沈伯英謂余曰雲卿爾來方學哀冊文是時莫尚名是龍字雲卿也筆意頗亦近之然米得態莫得姿先是余曽得石本於姑蘇當時亦絶愛之後鳯洲公家亦有石本華起龍寄一帙來覺不如舊購者詢之敬美云即此石買時并買石耳然細較印文行欵俱錯原是兩石耳舊刻顧元慶跋謂唐中丞應徳先生云在義興堵氏今司冦乃謂得于吳江史氏豈由堵轉入史耶此書妙處在筆勢飛動鈎捺有力第位置間尚不甚滿人意不耐著眼看謂此能擺脱歐虞拘束固自一說第宣示黃庭其位置不方整然細玩之安揷自有法妙意涌勃蓋巧運規外此帖則生硬㸃畫似尚不受令米莫病亦然懐素千文王氏跋二首跋云藏真此卷歐陽文忠公家物後有跋語與集古金石錄所載同内缺百四十一字文徵仲太史手補之亦僅虎賁之似耳此帖在文忠公家又已見集古録不知米顛何由未見陜刻今盛行世跋語不言字畫同應别是一本素師雖有鐵腕力然不脫緇流氣筆法亦太近今周公瑕謂不讓哀冊文恐未然河南游夏比肩師則蘇張輩耳無但品格殊地位亦懸絶宗室家懷素千文王氏跋一余家有懷素于文真蹟僅九百字今得豫章宗侯所藏絹素千文閲之圓熟豐美又自具一種姿態素師千文今世存者尚多想其在日所書固不少然其筆法秪是狂勁故易偽作以乏醞藉耳此帖據跋似亦疑其偽然偽亦有佳有不佳楊二山太宰雅好書畫每向飛鳧人曰有假者持來我買真蹟價重我不能買然往往亦得佳者顔魯公送裴將軍詩王氏跋二首跋云右顔魯公送裴將軍詩多感慨踔厲是公合作語而不見集中錫山安國續刻之故應是安氏物也書兼正行體有若篆籀者裴將軍當是裴旻旻劍舞與張長史書吳道子畫為開元第一長史筆法原自劍舞來魯公受法長史復遇善劍將軍宜其雄強勁逸也柳誠懸書蘭亭詩文王氏跋二首跋云余從顧氏所驟見之怳然若未識久看愈妙因損一嵗俸獲之仍為歌志于後次跋云跋尾楊少師有書名乃不能佳宋適無書名乃致佳此不可曉也滄浪莆田海岳無垢及長睿校書皆宋之諳八法者皆有跋誠懸書力深此詩文率爾摘録若不甚留意而天趣溢出正與清臣坐位帖同法然彼猶饒姿此則純仗鐵腕敗筆誤筆處乃愈妙可見作字貴在無意涉意則拘以求㸃畫外之趣寡矣中一二俗筆不足嗤惟間有醜怪處去惡道不逺玩者亦玩其趣可耳若效之恐遂成惡札張温甫陳白沙是其末流也余有此石本首標唐帖卷三不知前二卷為何帖亦不知何地所刻或云即司冦家石然小酉選帖不載尚屬可疑蘭亭詩文本多此但裁取佳句實藉誠懸筆蹟以傳餘棄者遂不傳考法書要録右軍五言五首其一曰纒利害未若任所遇逍遙良辰㑹起處似缺數句其二曰三春啟羣品寄暢在所因仰眺望天際俯盤縁水濱寥朗無厓觀寓目理自陳大矣造化功萬殊莫不均羣籟雖參差適我無非親首句五字草誠懸録此篇刪起二句縁作渌厓作崖目作物親作新細味要錄是誠懸誤書耳今詩紀遂作碧天對渌水矣其三曰猗歟二三子莫非齊所記造真探元退涉世若過客前世非所期虚室自我宅逺想千載外何必謝曩昔相與無所與形骸自脱落自前字至宅字注其四曰鑑明去塵垢止則鄙恡生體之周未易三觴解天刑方寸無停止務伐將自平雖無絲與竹元泉有清聲雖無嘯與歌詠言有餘馨取樂在一朝寄之齊千齡其五曰合散固有常修短定無始造新不暫停一往不再起於今為神竒信宿同塵滓誰能無忼慨散之在推理立言同不折河清非所俟中或稍有誤字一及三四五誠懸俱不録馮汝言詩紀亦不收若非彦逺此録則世間無此詩矣周藩圖内至標云羲之詩兩篇成不知何人臆㫁弇州公最留意詩翰亦未深攷第據要録此五詩與蘭亭序同作一帖當即接序後貞觀時臨蘭亭者最多奈何獨棄此詩可懊也想次篇五字草三篇前字至宅字注霏露結之狀勃勃楮冊間雜古墨蹟王氏跋一前二紙智永一劄篇似臨筆褚河南㫁簡得之陸太宰所眉山兄弟二劄故當雁行襄陽鄧文肅班彦功饒介之皆元人名書家翩翩可喜也永師臨本不讓陸平原擬古河南㫁簡亦是未央宫瓦以蘇米隨杖履猶可鄧班饒豈應闌入其間波斯船中恐無此等物范忠宣公告身王氏跋一右尚書右僕射中書侍郎高平范忠宣公入相麻學士蘇文忠公筆也中書行詞門下審定尚書奉行今制猶如此内閣擬票六科看詳六部議覆每日章疏送科部侍郎入科畫本即以面上御批紅字謄録於後某年某月某日於㑹極門奉聖㫖云云侍郎某押皆手細書若不畫不押猶可封還不行也今則朔望一到科胥人代書侍郎惟僉押存故事耳科中且或以辭謝為敬禮矣忠宣公為相果能持平跋謂不得藉此挽回世道僅足緩小人之怨老而禍寛恐未然使垂簾初諸大臣皆能持此心詎有紹聖以後之事哉第疑范公亦是微見隙動乃矯以持平耳嘉隆事亦然宋先司諌公告身真蹟王氏跋一右直秘閣知常州軍州兼管内勸農事告身一通為世貞十五世祖司諌王公者名縉見宋名臣言行録别集第六卷是時臺諌諷公同論張右相公不惟不從且上疏論劉光世等驕惰王徳忠勇酈瓊輩潜謀有日方防秋之際張浚未可遽罷臺諫遂劾公觀望欲為後圖以此出知温州云范文正公手書伯夷頌王氏跋一元有平江路李總管者嘗得之以歸范氏之子孫一時諸公高其誼爭為之詩歌題跋范文正公與尹舍人書王氏跋一范文正公與尹師魯舍人二劄蓋家人寒暄語耳而君臣父子之道備固不當以書家論也道服贊王氏跋三文正非書家當行特亦非不能書者耳然視永叔固勝跋謂不作天章延慶風骨可謂善為辭道服贊今刻停雲館帖中雜宋元墨蹟王氏跋一雜宋元墨蹟其後乃元人跋虎兒書耳此卷不知幾人書乃獨舉米范蔡要之止忠恵一條佳耳宋賢遺墨王氏跋一司馬諸公大率俱以人重米氏父子似不當置此中以品則非倫以書又恐不甘居此列耳既云賢湯進之宜黜去蘇滄浪真蹟王氏跋一蘇滄浪子美草書少陵漫興八絶句而遺其一後不著名姓永叔嘗云蘇子美喜論用筆而書字不迨其所論玩蘇書良然字非不佳却不得筆勢此跋云勁在筆中似尚未中的蔡蘇黃米趙帖王氏跋一余得蔡忠恵安樂扶䕶二帖蘇文忠久上人一帖黄文節眉州畢大事二帖於柘湖何良俊氏又得米海岳古詩於長洲張鳯翼氏提舉帖于華亭張某氏最後得文忠送梅花帖趙文敏騎從帖于嘉禾盛氏弭節帖于吾州應元氏後先以善價購之此千狐粹腋雅相稱似勝前窮波斯寳船第彼有魯侯贋鼎秦璽損敗角好古者應仍取彼東坡書烟江疊嶂歌王氏跋一時萬厯改元初秋宣城道中展此卷覺九派九子諸江各出所有來争勝也舟行烟江疊嶂間展此卷良是兩重竒境第不知晉卿圖亦在卷中否弇州公最慕長公亦甚重長公書奈何未購得所書赤壁兩賦余曽於韓禮侍世能家見一本姿態穠鬱而有飛動勢是嘉興項元汴家物元汴印識滿紙然細玩亦是響搨本耳蓋長公字肥用墨濃故摹者易為力山谷雜帖王氏跋一此跋謂此君每出語即若上水船後又跋謂殆類余近日伎倆兩語皆謔然後語味較長魯直最服膺東坡即醉墨傾欹半不可讀亦當如張文潛搜索持去胡乃以増睡思目之不知此燭下眼花頭眩書若何能醒人睡否山谷浣花溪圖引王氏跋一此卷山谷老人詩故夏太常家物燬于火中每行下輒缺一字太常子大理徳聲補之亦佳卷尾有文宂吳公跋及手簡要當有李文正篆首今亦脱落矣詩不著題亦缺名氏而考公集有之杜老浣花溪圖引也又云始公作草書眉山先生從傍賞歎不已錢穆父學士曰魯直書故佳恨不見懐素自敘帖耳公意不謂耳最後見素書大愧悔以為不如逺甚愈刻意臨池晚節自謂得長沙三昧余未見山谷狂草以其行書意度之謂橫逸疎蕩饒姿態良是第長沙故未得三昧此老復何從於彼偈下悟出山谷太白長歌王氏跋一後二跋如蕭海釣文明沈氏田啟南皆𢎞治間名士也長沙是僧筆山谷是文人筆然僧是長沙短處文人是山谷長處山谷老人此君軒詩王氏跋一吾家小祇園竹萬箇中有軒三楹不施丹堊純碧而已陳子兼方伯為題署曰此君軒今年歸自楚得山谷老人大書此君軒詩一卷云云異日乞公瑕雙鈎入石壁之軒為此君傳神也余姊夫吕膳部通甫曽購得此卷是王太守龍川家物擘窠真書筋骨甚厲而不傷態真有籜龍坼石勢第細看亦是雙鈎本後又購得一卷是臨本而腕力弱蔣少叅汝才復有一本則愈草草矣司冦公所得豈其真蹟耶安得並取較之又一卷王氏跋一涪翁書此君軒第二詩是初得長沙法而以華陽真逸筆運能于穉中取老作法外具眼觀可也前一卷真此卷草穉中取老此意尚未能解山谷書墨竹賦王氏跋一此卷為劉克莊書墨竹賦尤是當家畫竹法作書真善狀黃體風度以寫墨竹賦良是一合安得購與可竹冠於卷首米南宫書後王氏跋一此卷為友人李子所藏余愛玩之久乃以王履吉小楷南宫𫝊系其後而紀以嵗月李子嗜古而所藏時為人持去不甚惜此卷其善有之自崇寧大觀上至晉幾八百年至唐初亦可五百年而彼時墨蹟猶多存淳化内府所藏姑不論據元章待訪錄晉帖三十餘唐帖八十餘其後續見者尚不盡載他元章所不見者恐亦尚多今去宋元祐崇寧不五百年而蘇黃米真蹟殊寥寥蘇黃尚曽經焚毁米則無禁人言米元章自少至老筆未嘗停有以紙餉之者不問多寡入手即書至盡而已而元章亦自言一日不書便覺思澀其遺蹟留世者應最多乃今米蹟猶難得不知何說余所見惟李銀臺伯玉有一卷昨風起西北古詩是真蹟遒勁有神采然無古人沈著入木三分意又其筆意終與蘇黃相近想時代使然此兩帖余未之見跋云一紙奕奕有生氣當與伯玉卷同後一紙據稱不失褚河南懸腕法則應近沈著矣李子法書既為人持去不甚惜何縁得一借觀之翠微居士真蹟王氏跋一道祖襄陽同時人與劉涇俱好收古書畫翠微居士其號也跋稱道祖書不作傾險浮急態想其為人亦然其不甚傳或坐此薛道祖蘭亭二絶王氏跋一薛道祖手書禊帖是從真定武本臨得者足稱哲裔此帖文徴仲太史家藏入張伯起轉以售余籖首有徴仲八分小字精絶及危太樸虞伯生二跋皆可寶也定武石藏道祖家道祖又最嗜古蹟應日臨數過然傳世者少何也此臨本今刻停雲館帖中亦覺力弱彷彿形似間不甚有骨宋高宗養生論王氏跋一右太史姚君繼文藏宋思陵手書嵇中散養生論一篇行真草相間後有徳壽御書印徳壽思陵為太上時所居宫也繼文工八法無俟余贅云思陵於字學最深此是遜功帝遺風然骨力似尚不及正與米氏父子相似紹興中虎兒直敷文可謂箕裘世舊范文穆吳中田園雜興卷王氏跋一右范文穆田園雜興絶句六十首蓋罷金陵閫以大資領洞霄宫歸隠石湖時作書法出入眉山豫章間有米顛筆意文穆手蹟余曽見蓋得米意多今人率嗤宋詩然宋人真率處却有風致能感動人今人徒雕琢宋詩如生野花今詩如畫牡丹張即之書後王氏跋二首跋云張温甫秘閣喜作擘窠大字聞今人極愛重之懸餅金購募此一絶句及戯題跋語老手峭勁却于桑皮側理書之似解人意次跋云張溫甫好書少陵古柏行余見凡數本咸峭骨此稍和腴而遂不甚能發筆温甫書佻處得之李北海而以栁河東筋骨行之故槎牙四出不免墮惡道其失乃在不得斂鋒法少保沈蛟翁處有此公書蓮經刻板較稍有蘊藉蓋刻者損其槎牙耳其署書却佳縁字大則槎牙猶不甚刺眼其喜作擘窠字亦以此中娬媚處却近趙吳興此是北海一派分來趙子昻枯樹賦真蹟王氏跋二首跋云全得古籀法真吾山房中二絶也次跋云余得褚河南雙鈎蹟與此對之雖形模大小不甚異而中間行筆絶不同若買褚得趙當亦不失所望凡臨書或取態或取勢大槩以意求之於位置間不能無毫釐失果得其意則失亦似矣此臨褚則惟㸃畫真行處不改換面目其結體遣筆全是自運不知何為亦標曰臨然比之自書却稍近古雅豈魯人之學柳士師者耶趙吳興小楷法華經王氏跋一書法華者人以十數獨趙吳興為勝而此卷乃吳興自用了願者以小楷書精繭蓋備有北海誠懸之妙而時濟以大令者也第二卷缺為明夏太常昶所補尤圓潔可愛吾弟其善䕶之此本是敬美所寶余曽寓目細筆方匾體每字起處俱有折鋒敬美所示余此蓋字字相連不㫁勢匀熟有餘然不脱寫經手氣此云備有北海誠懸之妙而時濟以大令余未敢附和也夏太常補一卷是二沈餘派謂尤圓潔可愛亦所未解豈過篤友于遂忘其曲筆耶趙吳興大通閣記王氏跋一文敏書此記晚年最妙筆佛地位書也元人跋至三十餘皆具八法蓋時多能書而又好事非今人所可及也善屬付善䕶持吾弟其愛惜之此卷與前卷同日觀字幾如錢大展卷光彩射人絶得歐虞碑碣法雖微帶肉而骨力圓勁媚姿自肉中出猶是本色惟骨法令人改觀筆縱而不肆殆如半空擲下起收處皆莫得端倪㸃畫一一得所不若他碑之漫排置謂是晩年最妙筆良然此是長洲伊家故物乙亥嵗伊客部在庭至京欲以宋人胡笳十八拍圖易之敬美不應伊亦曽以圖示余乃臨本中最低下者價不能當三十一孰與易也趙吳興心經真蹟王氏跋一吳興書是蘭亭室中無上三昧筆吳興書信佳然謂與般若經俱入三昧則似過趙文敏書濟禪師塔銘王氏跋一右濟禪師塔銘禪師撰二僧皆法門龍象也毋論其文辭工拙要之是本色語耳白月來賣文錢為之一洗恐兒輩厭不能浮大快賞之第以一瓣香展供耳昔王右軍逼桑榆以絲竹陶寫恒恐兒輩覺今弇州以賣文錢易墨蹟恐兒輩厭意正同然絲竹固不如墨蹟第右軍惟恐損歡樂趣不廢絲竹弇州遂不能浮大白意似少怯若一瓣香展供二高僧要是當行耳趙文敏書詹舍人告王氏跋一右趙文敏所書宋起居舎人詹仲儀告辭奬諭各一通惜為俗子益以通雪道人偽欵及印章汙其前後遂成蛇足既稱宋起居舍人其告辭奬諭文敏何由書之豈重録其辭耶未見得真蹟不敢臆㫁趙文敏行書王氏跋一作書有全力而無先意乃得佳耳此卷趙吳興行書二贊二圖詩及跋尾凡二百三十二字李北海法十四米襄陽法十六而妙際時以大令𤼵之卞華伯以眉山贊語跋之亦似見一斑者立春日題此覺芳英爛漫筆端松雪在當時聞一字白金五分此跋云二百三十二字豈論價耶然亦止十一兩餘耳趙筆法全得之右軍其寫碑乃叅用北海拖曳法襄陽大令恐不甚似有全力而無先意行押法信如此若正書或不然筆陣圖固云意在筆前者勝趙子昻二帖後王氏跋一昔人評趙吳興書如丹鳯翀霄祥雲捧日余謂正書不足以當之獨以尺牘行草得山陰父子擫拓法而以有意無意發之蓋不負此評耳子昻尺牘果佳趙文敏篆書千文王氏跋二首跋云新安吳孝文示余趙文敏此卷次跋云吳生以趙篆千文乞余跋文敏此書極精整有意出徐騎省周右丞上絹素用織成烏絲闌是南渡後修内司物吳生别二嵗所乃在余質庫中驚問主事者得四十金用為豪具竟去不顧矣昔盧節度從山北盧匡求右軍借船帖一閲渠寳之但許就視盧除潞州行三舍客有攜此帖云有一郎君求售盧驚惋還之不復問吳寳此書不移時而其身不能有何况盧氏子也余自是不以為合浦珠而以為楚人弓姑識之耳余不解篆書第微識其意若能用之真行草間良是妙境必欲真作篆恐終是畫鬼魅手宋以來惟徐騎省庶幾若文敏篆恐不免似杜工部以詩法為文耳果能出騎省上哉吳生盧郎事略相似夫挾青趺者不乏何乃即歸之二公想以二公有企慕意冀其易售耳無見所欲難哉難哉盧節度還之不復問是佳事司冦公乃遂有之似少愧盧若云責在主庫者此則郭翁伯㫁舌律也第吳甘心為豪具山北郎乃是盜父物其起因不同合浦珠楚人弓二語便是公案趙文敏于歸帖王氏跋一趙吳興于歸帖淳雅有古法是合作者然此青鳳一毛耳又云蘇長公嘗書赫蹏曰吾此紙可以劖錢祭鬼後五百年當受百金之享云據云青鳯一毫當無多字蘇長公赫蹏自謂五百年後受百金之享正不知幾何字耳十絶句畫跋王氏跋一唐人十絶句婉麗有情得藍田詩中畫趣趙文敏書筆翩翩能𤼵之㑹錢叔寳尤子求避暑蘺薋園令各作句景十小幅復走一介吳興要文休承併成一冊云昔人謂摩詰詩中有畫郭淳夫亦記羊士諤長孫左輔等詩謂有發于佳思而可畫今此十絶句不知作何語淳夫所記四絶句亦在其中否錢尤文俱吳中一時妙手安得令作掛幅壁間觀之鮮于伯機兩卷王氏跋鮮于伯機千文一鮮于伯機草書千文初展卷間不能大佳乆看始覺其精警有筆外意跋尾楷書數行輕纎自媚乃謂是五十以後筆豈亦有明逺文通之恙耶王氏跋鮮于伯機詩紀真蹟一余所有困學游高亭華巖記及詩真蹟數千言見鐵網珊瑚中行筆清圓秀潤芒角不露隠然唐人家法即與文敏鞭槖中原不知合置誰左先伯父都督公有伯機草蘭亭石刻今在從子處龕為卓屏其書祇是圓熟筆力亦不弱但無一種出塵意若子昻則入眼媚色照人何可相比趙以已書二紙易鮮于一紙當是時名已成故為此以推重困學意若謂易一紙焚之則是以入宫蔽目子昻或不應爾楊鐵厓卷王氏跋一至元間楊鐵史聲價傾海内餘名往往借客今其文與書俱在耳獨勁氣時一見筆端異老客婦謠此亦可窺也鐵厓公余曾見用墨頗重亦有紛披老筆然恐非書家派當借詩以傳耳宋太史手書鄭濓名解後王氏跋一右包叅軍家藏宋太史書鄭生名解示余按書述稱太史父子不失邯鄲此書行筆極蕭散而有純綿裹鐵之意似非規規學步者太史名濓鄭生亦名濓豈古所謂慕藺齊莊之遺耶則其文該洽辨覈固宜耳太史書醇古入書品鄭濓名解潜溪集未載近聞有刻太史全集不知搜及此否宋仲珩方希直書王氏跋一叅軍又出二紙其一為中書舍人宋璲仲珩其一文學博士方孝孺希直也仲珩太史公少子希直常評其書謂威鳯翀霄祥雲捧日曰此書雖草率不經意而時見八法俊美圓逸知方君非曲筆耳希直不以書名而剛方不折之氣流溢筆墨間其名磨損不可辨蓋永樂有禁收公筆劄者同罪故耳希直在建文朝以文學博士伏節其職若今之侍讀學士者因附記之人謂仲珩書勝乃翁似不然仲珩饒態然稍疎景濓較有醞藉方希直書未見宋克急就章王氏跋一余往與徐獻忠先生論書法歎章草自二王後僅一蕭子雲耳國初宋南宫仲溫可補述者然波險太過筋距溢出遂成佻卞先生笑謂余家藏仲温急就章二百年矣蓋不露筋距舉以乞余贉零落若追蠡而絹墨幸不敗結意純美余欣然重表錦之以為征誅之後獲睹揖讓偶取葉少蘊刻皇象石本閱之大小行模及前後缺處若一惟波撇小異耳此豈亦仲溫手臨象本耶章草不難學難精第亦人所難識去篆𨽻殆不逺征誅之後獲覩揖讓良幸然魏文不云乎舜禹之事我知之矣看皇索兩帖是何筆法宋仲溫書畫帖王氏跋一宋仲溫生平作章草極多然微涉佻而尖此書畫帖遂能藏潁古法藹然大抵經意乃佳耳仲温作字僅能不俗耳無晉唐筆意弇州每推許之殆所不解俞紫芝急就章王氏跋一錢唐俞和子中頗得趙魏公三昧此帖以宋經箋紙用章法書急就章古色藹然令人不忍釋手按章法自皇象索靖後惟右軍父子豹奴孫權子中獨能尋考遺則於㫁墨殘楮昔孔北海思蔡中郎見虎賁貌類者輒引與同飲曰雖無老成人尚有典型紫芝急就以存古章法則可跋引皇索右軍父子為論過矣虎賁似中郎却是切論凌中丞金剛經王氏跋一金剛經獨蘇眉山趙吳興往往作行楷散施阿蘭若中若中丞凌公書此經全用鐵門限筆圓熟有結體得臨池之三昧蓋百餘年而後歸之公孫比部云鐵門限筆皆自空中擲下最勁而整謂中丞全用此師筆乃以圓熟目之三昧安在戲題一偈不得鐵限法此則寫經手果得鐵限法即應勝蘇趙作不鐵限法正是凌中丞凌中丞臨子敬洛神賦王氏跋一余所見古刻獨十三行及一全本耳十三行勢稍竦側而用筆重翩翩若迅鶻全本筆極微而秀媚儇逸姿態不可言公仕仁宣朝至中執法以嚴重稱公卿間結法清婉乃爾太史公見留侯像能不愾歎己巳余來吳興公之諸孫工部君寶藏之間以示余因識其後長洲章氏摹刻洛神全賦後有王摩詰薛河東印不知母本在何所中丞所臨豈是耶余猶疑其出懐琳輩手若十三行固佳沈民望書姜堯章續書譜王氏跋一沈民望以一書遇人主備法從更百五十年乃不能與挆觚少年爭價問之人有不識者二沈氏𢎞治以前天下慕之𢎞治末年語曰杜詩顔字金華酒海味圍碁左傳文蓋是時始變顔也余童時尚聞人說沈今人或有不識想吳子然耳出吳境即希哲履吉恐亦有不識天全四帖王氏跋四首跋云人謂翁書由米顛來非也其遒放波險全得長沙面目神彩風骨亦自琅琅惜結體少疎耳次跋云靈巖聖游記云此卷為劉以則靈巖之東道主也書筆勝法亦往往稱是卷首沈啓南畫足為茲山傳神劉西臺祝叅省錢學士皆有書名者三跋云天全出入長沙襄陽間四跋云此卷蓋貽吳江史明古者後有吳文定沈啟南二跋亦可寳也謂翁書由襄陽由長沙皆未然元未得筆謂筆勝法亦未是祇是天分髙畧涉躐古帖遂以意行之耳神彩風骨良不乏其横逸處正與蘇滄浪相似名賢遺墨王氏跋一跋中名賢自宋文憲公景濓以下共三十七人太宰魏文靖公仲房新建伯王文成公伯安學士解公大紳宫保吳文定公原博祭酒李文忠公時勉詹事陸文裕公子淵皆王跋中所推又云山谷老人謂王荆公書簡逺黄長睿謂章申公惇楷法妙入魏晉三昧米海岳謂蔡魯公京及弟開府卞俱得古人筆然是四人者其精細菀翰今無一存即有之亦不能售數鐶之直而韓范歐富率然之筆人尚以拱璧視之友人笑曰若是為拙書解嘲耳且若論詩何以不取高崇文而取宋之問乎僕無以答因記其語名賢手蹟得一睹良快髙崇文宋之問善諭也魏文靖署書有名王新建筆法恐不在宋解吳李陸下三吳墨妙王氏跋二跋中自徐武功而下凡二十五人豐考功人翁與焉今字學吳中果甚盛然豐人翁越人也亦置菰蘆中豈以西京封國論耶三吳楷法十册此十冊公嘗以借伯玉余得縱觀之大都不甚佳内惟祝希哲文氏父子履吉等諸名家間有可觀然亦非得意筆似是凡佳者皆别為獨卷稍次者乃退入此卷耳冊各有手跋語與此又稍不同此想是後定稿也第一冊王氏跋一陳文東小楷聖主得賢臣頌文東名璧華亭人沈民則學士出師表字頗大民望大理虞書益稷篇字小如文東陳文東二沈其筆法大約圓熟二字盡之宣正間直兩制諸公多用此法手跋云此所謂雲間𣲖不得歐虞手腕法伯玉云蘇人好立門户才隔府便指作别𣲖既又云無怪蘇人彼各有師承或鍾王歐虞等必宗一家所執皆古法所以今人不能屈兩語皆中的然余在客部見四夷持來辨騐諸勅洪永間間作歐虞體甚遒勁可愛宣正至成𢎞多沈體亦間有姜廷憲筆若趙體則自國初來皆有之趙體間作行書尤覺神彩飛動玉璽硃色皆若新惜不令司冦公見之第二冊王氏跋一徐元玉臨褚河南哀冊文吳原博墓表極得蘇長公筆而鋒多含蓄不露佳手也徐武功微有風采吳文定負書名然不得長公氣骨陸文裕二札稍佳耳第三冊王氏跋一祝京兆書秀媚出塵細玩儘有姿態然醞藉未深謂是少年書良然第四冊王氏跋一昔歐陽率更不擇紙筆皆能如志此禿筆非京兆孰敢書以贈人然淳古雖有餘而轉折處未匀淨終是為禿筆所累閒錄序固佳第五册王氏跋一聞之吳人待詔毎新嵗輒書舊詩文一冊至老無復遺而歿云余在項子長少參見待制所錄詩稿數帙是行書其云每年錄舊語正同此乃是小楷稍為難得第六册王氏跋一此徵仲小楷足可壓卷其淳古處少遜希哲而秀媚精密過之大率行草希哲勝楷法徵仲勝世人多重行草徵仲歿後名少衰以其用行法作草又或一律乏諸變態耳第七冊王氏跋一余絶愛履吉小楷曽見有極遒媚者此數章似俱未甚快第八冊王氏跋一壽承五子詩精謹有法小變乃翁體然尚不及晚年之舉止自如孔嘉廣五子詩是顔派猶覺拘而未暢休承有一種脫塵氣王家馭絶重之而貶壽承蓋由待制風浹閭里彼處凡夫庸子皆能作文家體耳其實壽承竟是當行人謂待制之長壽承傳字休承傳畫不虚也許元復法亦出顔而微帶肉第九册王氏跋一俞仲蔚前後雜詩二幀共二十二首諸與余倡和者是晩年筆稍縱而有誠懸腕云陸子傳作麻姑壇體絶精整其行􅍁及字大小俱倣麻姑式宛然魯公遺意覽至此頓覺神爽子兼禄之書皆本趙吳興來骨不勝肉是縉紳中名筆道復千文亦不俗仲蔚筆力頗勁而字形不甚悅人亦未純是柳然有半空擲下意以古法論當右仲蔚第十册王氏跋一黄淳父前長篇一水興之有鋒鍛者後十二章小似不及最後得張伯起唐人數詩伯起生平臨二王最多退筆成家雖天趣小渇而規度森然矣公瑕雲卿伯起皆余與往還者公瑕作率更體甚遒整作吳興體最沓拖厭人而每好作吳興不甚作率更不可解也此二十章是本色而微叅以率更意筆肥而骨勁足稱合作雲卿善用墨最濃而最流動後數年益進此尚是未進時筆伯起懇懇趨古名家自矜此云天趣少渇恐伯起聞之未快顧德育王舜華吳中常體黃淳甫書蘇人謂帶邪氣然用力亦深袁魯望小變吳體士夫之能書者獨奈何無百穀李文正陸文裕墨蹟王氏跋一儼山先生寳應雪夜玩月歌則出入北海吳興雄逸超爽有秋鵰春駿騰騫絶影之勢陸之與李歌辭不妨衣缽書法更自青冰也因合而藏之西涯翁在位日書名震海内篆書姑置勿論行草亦清勁有筆第微帶邪氣彼時士夫書多作此形狀蓋幾日用不知矣儼山翁精究八法於痩硬中露秀媚亭亭獨上但尚未是當行耳謂勝李果然謂出於李或未然也以青冰目之恐陸未服李文正詩翰王氏跋一太師李文正公此卷為宗易太史書當謝首揆之次嵗而卷端有牧羝撃賊笏二曲豈意有所不足耶宗易為任丘李文康公時亦以首揆贈太𫝊偶與元馭語次及此因舉贈之以比於䖍刀之義云爾牧羝擊賊笏二曲亦是偶然書之恐未必有意長沙任丘居首揆皆尚包荒今以贈荆翁或未首肯張東海冊王氏跋一張南安書雖流浪自喜往往失之緩弱東海翁筆勢飛動自是顛旭狂素流派遣筆處殆如雲行電掣安得云緩弱惟未能去俗凡俗體俗筆俗意俗氣俱不免犯之蓋亦為長沙所誤桑民懌卷王氏跋一此卷為盛秋官書尤多生平得意語其書似不勝文文似不勝詩民懌詩間有一二中晚句卑卑偏鋒亦未露豪氣此云書不勝文文不勝詩則此卷當置何品李范菴卷王氏跋一司冦公稱貞伯眼底無千古至目趙吳興為奴書然余嘗見其數札大約從二沈來亦間作賓之原博脚手夫學古人何名為奴若從風而靡則真從者氣習耳如今人恥先秦兩漢不學或拾歐蘇餘芳乃自矜捨筏其失正同金元玉書王氏跋一王可大比部亟為余言金元玉之書法勝於徐子仁問之吳中不識也徐子仁書嘗見之金元玉書未見元玉名琮雜帖王氏跋一希哲徵仲履吉是吳中三絶文定書以爵顯啓南書以畫顯祝希哲小簡王氏跋一希哲此書皆赫蹏小簡與舍中子多市井迴易事買書便是雅事至末簡所謂月甚佳可來一跳蓋希哲與閶門少年時時傅粉墨作優伶劇耳余亦有枝山赫蹏數簡潦草中儘有佳趣語亦多鄙俚第不作迴易語差免銅臭然他人孰無迴易簡或用拭几或以炷油人何由見之此簡傳至今正坐為佳字累耳祝京兆灌木圖歌卷王氏跋一京兆腕本勁第間失之疎此云縱放而不疎允為合作豈徵仲圖如裴將軍舞能𤼵京兆筆勢耶圖上大字更怪偉不知是大令筆豫章筆京兆雜詩艷詩王氏跋一希哲辭多青閨中廋語令人絶倒宜從褚河南瑤臺美女不當作禿師屈彊筆也淳父乃以豐麗賞之得非取駿于驪黃之外乎欵曲中廋語是京兆詩本色秀媚中逸態是京兆書本色若作屈彊老筆豈故矯其枉乎然則何不作昌黎次山語書之祝京兆季靜園亭卷王氏跋一以大令筆作顛史體縱横變化莫可端倪然書道過此則牛鬼蛇神矣枝山筆微似大令縱牛鬼蛇神終是豫章非顛長史也然渠此種草却易偽祝京兆卷王氏跋一此希哲中年書雖不無出入然往往自楊少師豫章襄陽來而疎瘦横放不求盡合所以可重也卷首四字尤遒偉中有贈開西孫逸人即太初也書法於古人何必盡合既云楊黃米安得若出一手當是與希哲而四耳關西太初司冦公想亦重其人故特㸃出祝京兆秋興八首為王明輔題王氏跋一京兆於顛史不近狂僧稍近然取姿處多要非的派也顛米態彷彿似之用筆亦不類若謂素骨而芾姿庶為定評顧又恐許京兆太過耳京兆好書中晩詩此書杜老秋興固自難得更覺與墨池增勝京兆雜詩卷王氏跋一三河少年躍馬自快兩語可謂善諭希哲草書月賦王氏跋一希哲生書法波靡時乃能用素師鐵手腕叅以雙井逸趣超千載而上之尤可貴余嘗謂希哲如王謝門中佳子弟雖偃蹇縱逸而不使人憎跳盪健鬬如祭將軍而有雅歌投壺風味此卷為故毛光禄書光禄嘗刻之石末云人閲物物亦能閲人聊以寓吾一時目而已自國初來諸書家多書珍寶中文希哲乃好書月賦當是漸作獻吉解此賦良多俊語第突起說初喪應劉不知何意雖古人無忌諱亦何必乃爾素師叅雙井王謝子弟祭將軍評希哲最當物能閱人大是閱世深語祝枝山李詩王氏跋一祝京兆作旭素書是京兆旭素書耳佳處亦多大令筆態獨此卷太白上皇西巡歌五首因禿管淡墨之勢而用之狂怪恕張結搆不疎復饒飛白遺意駸駸乎二氏青冰矣卷在江西程生所余以京兆他書數紙文太史書一紙畫一紙易之亦用米襄陽故事耳京兆旭素書信是確論然此語凡學古人者皆可加不獨京兆也若以禿管淡墨遂謂為二氏青冰則是希哲殫平生力翻不如敗毫殘烟矣恐無但二氏未心服希哲必且屈彊即毛頴陳元亦將有後言也元章與人易書畫自謂看久即厭時易新玩兩適其欲乃是達者今司冦公亦此意否若程生則恐是為徇知屈但得取數多聊自寛耳然亦可見是軸之勝他卷矣京兆書杜紫薇書王氏跋一祝京兆好書中唐詩初讀前一詩以為京兆語而怪其稍濃渥有致既辨其為杜紫薇集為之一笑至於書紛披老筆望而知其枝指生也枝指生望而知杜紫薇辯而知此豈公之鑑詩暗於鑑字乎不然稍濃之怪是别淄澠之舌此無假物色若紛披老筆恐猶是以形旁求人或以贋本誑公離朱暫眩尚未可知也祝京兆真蹟王氏跋一昔人謂右軍才行甚高有逺識惜不究其用以書掩之此非公言也張長史與顔尚書同學𨽻不勝去而為草吳道子與張同學草不勝去而學畫楊恵之與吳同學畫不勝去而為塑云右軍才畧豈云以書掩之正自以書顯耳許元度孟叅軍晉代固不乏也祝京兆之文章亦然使書不工孰是瓿頭取敝籍視之哉張長史授顔尚書筆意唐人所記甚明此云張與顔同學𨽻不勝去而為草不無矛盾且郎官壁記真書出顔上何謂不勝當是譽楊恵者假兩公為重巧為此說不足據又祝真蹟王氏跋一祝京兆草𨽻奕奕絶世惟李獻吉詩沈啟南畫可以配之濟南諸公後出幾令獻吉失盟主而京兆遂無能踰之者書則文徵仲類何仲黙王履吉類徐昌榖敗筆絶少畫家唐伯虎亦不減於徵仲獻吉詩希哲書啟南畫果是三絶獻吉何嘗失盟主第以晉楚争強遂忘齊桓耳五霸桓公為盛終是定論嘉靖末年履吉字佑遂在希哲上好古者又或首舉豐人翁然要之行利皆通終當歸希哲余不解畫獨妄謂啟南未必擅場戴進吳偉亦自嶽嶽彼各有流派啟南格雖入妙然多行書筆譬之米南宫終身無楷也時吳戴不能詩品稍俗耳唐伯虎若在恐亦未甘居第二茂苑菁華卷王氏跋一吳中希哲徵仲履吉道復稱四名家此卷種種臻妙雲卿得此殆若狐腋之粹白矣昔蔡中郎箧論衡而談驟進雲卿臨池比益工得無慮為人搜作萟林公案乎道復書亦豪勁有姿態第無古法謂之散僧良然亦祇可叅禪耳祝文及王自是吳中三名家道復或未可等倫廷翰書後益工然别有解不從此四君來文太史三詩王氏跋一衡山翁書絶有古法筆力甚蒼勁以不經意出之乃更妙在日名絶重卿相無不折節下至婦人童子皆知之乃今殁後四十年來人遂或不搆甚書此皆肉眼以目皮相耳若於書學稍究心見翁真蹟必當斂袵下拜文太史四體千文王氏跋一文待詔以小楷名海内其所沾沾者𨽻耳獨篆筆不輕為人下然亦自入能品待制真行自佳無容言若四體恐終係強作云沾沾矜𨽻法想稍能熟其體耳篆書倘遇生字或不無旋檢篆韻文待詔遊白下詩王氏跋一詩亦清逸可喜第起句往往落韻此公疥癬疾誤入膏肓吳人至今中之耳徴仲齒長於獻吉其詩猶沿宋元來餘習以大厯後俊語為的其起句落韻亦坐此然却有一種真趣讀之亦醒快邇來詩家家李杜顧去真趣較逺文太史書進學解王氏跋一史稱昌黎為進學解執政憐而竒之遂以省郎知制詔然此文雖跌宕終不能如東方子雲雅質而饒古意文待詔書法出聖教序亦然退之此作雖古質處微遜客難解嘲然能别出意不重墮達㫖釋誨烟霧中較量身分固在倩雲伯仲間若待制書之於聖教序則尚隔數塵恐難與昌黎並論文太史絶句卷王氏跋一諸絶句如老病迂踈非傲客只愁車馬破蒼苔大類白少傅分司洛中語皆可寳也徵仲書中年類松雪晩年益以豫章法更覺遒勁有神若詩則原係白傅派絶句尤多逸趣文太史三體書王氏跋一三體書擬豫章尤妙惟作米筆差不似耳待制自謂早年效玉局作字然玉局淳古待制秀媚不得其真惟得其偃筆肥墨耳晩年縱筆豫章形不似而神似其險側飛動有墜石裂冰之勢與效蘇處意正拗若襄陽則標格原殊奈何得似也文太史三詩王氏跋一晉陽風物凄緊九月於明佐藩伯齋中覽故文太史三詩金波桂樹清露梧桐怳如此身在越來虎丘間諺云物離鄉貴在晉中觀蘇詩蘇字自是誤入天台司冦吳人鄉感尤當深也趙飛燕外傳王氏跋一文太史小楷書飛燕外傳初看之若掾史筆草草不經意者而八法自具是真蹟也余乃丐尤子求作小圖凡九段系其後尤於此圖有精思頗得龍眠吳興遺意周公瑕後為書西京雜記十餘則俞仲蔚書外𫝊皆小楷工絶之甚往往有踞太史上坐意云伶元此傳文絶竒柔曼中清骨玉立徵仲秀骨公瑕豐姿各得一斑又徵仲近飛燕公瑕近合徳也尤求畫亦是周昉遺風皆雅相稱惟仲蔚蒼險筆未免似賞花烹茶若以書高士傳則庶幾矣徐髯仙墨蹟王氏跋一子仁書行世亦不少第挂幅多大概亦是松雪派雜書畫冊總跋王氏跋三首跋云前後序及題畫八分皆文徴仲手書精絶之甚苐不及晩年鐵腕耳次跋云吳中一時書法盡此矣惟祝京兆妙得晉人法趣常有餘王履吉陳道復皆少年筆與晚嵗全不同三跋云吳中文士盡於此矣語豈遂無一佳者乃知此道之難也𢎞正間吳中文果卑弱不可讀若詩句恐尚有一二佳者以當陳王少年筆或不辱也祝書法果獨絶徴仲小楷即出少年時手腕固猶勝其文耳王履吉五噫圗歌王氏跋一履吉五噫歌雖昉自平子而能用已意𤼵之復有文伯仁係圖伏日一展閲如碧玉壺賜對消得紫綾半臂矣其用筆秀雅絶得尚書宣示樂毅論遺意獨中間一波倔彊肥重文皇戈法未易療也歌昉平子復有伯仁為之圖豈生平所厯勝地耶抑即吳中名蹟乎伏日消得紫綾半臂據跋當是自詩及圖得之然使非履吉墨妙恐清寒亦未必侵入公肌骨也履吉書效虞永興其一波倔彊正自王彦超重摹廟堂碑來若得唐搨本效之當無此失王雅宜書雜詠卷王氏跋一履吉行草自山陰父子來王元肅云履吉作此時病已甚然時時偃卧以指畫腹曰祝京兆許我書狎主齊盟即死何以見此老地下前輩用心如此何必鍾太𫝊可念也履吉行草得之大令為多若右軍恐不甚似病中猶以指畫腹蓋酷意在書矣吳人言履吉書日進詩日退不虚也王履吉白雀帖王氏跋一履吉先生養疴白雀寺訪故人王元肅虞山不值作此歌元肅拏舟追及之因以二丈許桑皮縱筆滿卷為贈蓋月餘而履吉物故當是絶筆也又二十餘年而元肅為雙鈎入石云余有此石本是徑三寸餘行書而間用素師自敘法忽出一二行徑五寸字米元章亦時有此法大約由縱筆中乗勢為之耳若稍有意恐遂不入格此幅全是大令風骨微出入永興比之平日筆更覺顧盼有姿履吉年不滿四十亦既臻此使天假之年亦何讓祝京兆蘭摧玉折可痛可惜詩稱緘書報不遇此云訪或係誤余在禮部時與沈瑞伯王家馭同觀此帖瑞伯書法主趙吳興甚不取履吉曰此帖有何佳處祇是取媚時眼絶無古法瑞伯去家馭曰此終是佳筆何得云爾家馭又謂此蹟今歸王陽徳叅知陽德宦吳中得佳蹟數種此其一今觀跋當是庚午嵗後公以贈陽徳耳失弓得弓何必在我此猶龍公去其人之論然此卷書者王姓所贈者王姓購得者王姓今轉贈者又王姓則是終未能去其楚耳書訖囅然王雅宜長恨歌王氏跋一履吉艷冶書白歌雲卿穠麗書陳傳敬美秀潤書外傳子求巧密作圖皆與玉環姿態相稱王履吉書江文通擬古詩王氏跋一江文通擬古詩如逸少臨宣示帖形勢巧密勝於自運惟古别離李都尉二章差不似耳履吉之于虞永興亦似文通擬古書法姿態既備結搆復不疎蓋晚年得意筆也擬古惟文通最高無但陶謝諸章彷彿逸少擬宣示即逺别離李都尉猶是米元章摹書手若履吉之于永興則稍得其層臺緩步遺意尚乏骨力果出得意筆亦是文通自運詩耳陳道復赤壁賦王氏跋一此道復過醉時筆雖得失相當而遒偉奔放有出蹊逕之外者唐文皇云當今名將惟李勣薛萬徹耳勣不大勝亦不大敗萬徹不大勝則大敗以語文太史及道復當各領取一將印也道復書大約山野但不係山野貴人猶稍有真率意司冦引李薛作平論初讀時黙為徴仲稱屈然英公赫赫千古即婦人小子皆知徐懋功若薛將軍則問之青衿生且或不識以之當陳或亦是流品朱射陂卷王氏跋一壬子冬余以使事道維揚朱子价為書二卷其一為近體旋失之此卷多齊梁樂府語雖不無小出入而宛倩穠至不失箕裘云自後時時寄余詩然絶不可入眼至九江集幾落行卷中笑海豈文通才頓盡耶朱子价余猶及見之詩多效六朝體此卷謂是齊梁樂府語固是合作蓋見時人學盛唐未似欲出其上不得已逃而之六朝嘉靖中年多有此風然此公用力極刻深其詩殆無一字無來厯但多以難解為竒又似故以失粘拗句為入格用意亦覺少偏初有池上編一帙用修所批選甚精後稍縱雖或不無得失若謂落行卷中笑海則似貶太過書極服膺枝山乃行筆却絶類雅宜率以緩懈取態與詩可謂兩絶馬太史卷王氏跋一此卷為余書束封紀行可二萬言皆行楷遂無一筆放軼蓋余酒間嘗譏之故耳孟河公書學懐素尤主聖母碑然失之太狂其狂亦多出有意以故雖稍有逸態而乏雅趣此卷皆行楷謂以酒間譏之而然良然渠有一行卷贈先公亦皆小行楷亦縁先翁不喜其狂草故然却是舍所長就所短卷在余手後為人持去陳子兼卷又詩牘卷王氏跋二首跋云余甚愛陳子兼書每出紙素子兼輒欲書已作余甚苦之此卷余索書曹子建詩子兼不伏罵乃别録蜀中諸篇見遺次跋云此一卷陳子兼詩及尺牘書法極灑落然皆數千里外筆耳子兼書肉勝以書子建語似猶未稱若書其詩又似詩未稱以作尺牘或庶幾耳俞仲蔚書王氏跋一俞仲蔚舊為余小楷歌行一紙行草及大書古選體各一紙合為卷藏小酉館云子敬作精書以貽謝太傅謝批尾還之物固有遇不遇也仲蔚書自米氏派來骨力古勁而形狀不甚悦人司冦公與交最厚至於書有存有不存其評語又或與或不與不知何說物固有遇不遇若仲蔚書恐藏小酉者未足為遇其歸之他人者或未為不遇也俞仲蔚書金剛經王氏跋一余見褚石本又於項吏部處見栁真蹟皆小楷而栁尤勁挺有風骨今年春仲蔚為余書金剛經一冊微用米顛筆而八法種種不乏其得柳為尤深云凡書金剛經者吳山吳興併仲蔚而三皆法寶兼墨寶仲蔚果有柳米筆若書金剛經謂與眉山吳興皆為法寶兼墨寶則似過楊秘圖雜詩王氏跋一秘圖名珂字汝鳴吾邑人少為諸生即有書名晚愈矢意狂草法人品絶高𢎞正以前不可知若邇年以來當為逸人第一流胡梅林少保舊令餘姚稔知汝鳴後為制府意欲汝鳴入幕下謂倘來謁即隨以厚幣汝鳴竟不往少保有碑欲得汝鳴書之而難於言後禦倭海上過邑城駐龍山使幕客故與汝鳴交好者誘之來山間遊已胡公燕居服猝至不得避因留共飲讌談既洽幕客諷以寫碑事汝鳴乃為寫贈之金卒不受此風今豈可得再見也弇州公與汝鳴不識面此跋數語美刺皆中即如為汝鳴傳神可即錄入續高士傳可陳鳴野詩王氏跋一山陰陳鶴鳴翩翩狂俠高位置恒自稱中國陳鳴野云楷法用墨絶肥壯而無鋒頴若龜鼈之縮項足行草殆似枯枿敗蔓縱横道上而云出自魏武鍾太傅顛旭狂素良可笑也此卷所書絶句中如夜深池上弄琵琶萬里星河月在沙莫怪尊前彈出塞只今邊將未還家却自有唐調可喜也鳴野與先君交余數見之翩翩任俠四字得其為人其詩學劉隨州長七言古近體其佳篇如夜深池上等語殆不可勝數不勤勤藏稿稿多散失其真書多肉草書多骨然皆不出法度外遇其合作時亦咄咄露神采肥有骨痩有姿此跋介蟲縮項足枯枿敗蔓之諭亦得其似然似摘其病譏之或未見其得意筆耳先君不喜狂草渠與先君往來詩帖詩軸皆真書或微帶行絶不作草外國書旅獒卷王氏跋一今制四夷館有譯字生習諸外夷字厯九年於史館前考試字法無誤生為序班已官者遞進二品嘉靖前購來諸夷書甚多學者憚其繁時時盜出毁其籍今惟蒙古學不廢字多橫寫而直讀餘各夷書母籍多失或間止一二葉存畧識數十字耳遇夷人來則賄通事人問其意别造語譯之要不失事情而已其實非本字也報書亦多偽作夷字以欺我人不惜外夷笑此旅獒文雖籀草爛然恐亦多非本字不知梵迦盧視之云何扇卷王氏跋九扇卷甲之一至甲之四扇卷乙之一至乙之五兩漢以前尚篆𨽻多用之章疏檄牒晉以後尚行草多用之簡札邇來此兩則率胥人代書其自書者軸卷冊扇四種及赫蹏小簡而已而扇於日用尤切尤堪賞玩其敝者或用為軸為卷為冊為屏余感司冦扇卷因效為一冊殊橫濶不便置几案又書扇時自有行款法今改為橫幅則傾斜失度又扇自别有一種風度改作冊亦失本真且翰墨在扇間即如花木在庭除亭館在岩谷天趣恱人如右軍書姚姥五字扇大令畫烏駮牸牛書牛賦扇至今赫赫照書畫間何反改從幅紙列此又何異削圓方竹杖重漆㫁文琹耶若謂不宜以供揮暑則但可置之笥篋中日取展玩與卷冊同用而不失扇書本趣似更簡便耳此扇卷九軸當以希哲徴仲履吉為一等壽承公瑕輩諸專家為一等吳中稍諳八法者為一等文人詩人别為一等名公卿士大夫又為一等書畫跋跋卷一
