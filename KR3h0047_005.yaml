body:
  text: 書畫跋跋續卷二明孫礦撰墨刻祕閣續帖王氏跋二一跋云右祕閣續帖第三第四卷此帖既不易得而又皆右軍書多縱筆變體極可愛內四月一日帖及後右軍諸子書稱𢎞白黃長睿謂為僞帖欲去之甚當第文壽承跋尾以為中數帖類米老所臨者則非也此帖刻于元祐中米老書學尚未著不應其摹本已達中禁當是唐人臨筆耳次跋云續帖第九第十所謂賀知章者似二王雜帖語今已歸賀不可知此帖刻於元祐中彼時人主尚幼是何人司其事跋謂刻帖時米老書學尚未著不應摹本已達中禁正未然也郭氏爭坐位帖書史不云係二十年前所臨者耶以其名未著故所臨者人或遂以為真或謂為唐臨壽承云云想以其類元章腳手耳真墨蹟與唐臨當有辨若摹唐臨本入石恐雖逸少復生不能别也逸少敬和隔日二帖汝帖亦屬之賀知章想出賀所臨耳泉州宋搨淳化帖王氏跋一今年始從吳中得此宋搨完善本以較余所藏大觀絳帖雖少遜比之他刻大徑庭矣凡泉刻則五卷智果而後缺十餘幀其它不爾也此帖無但五卷缺十餘章其八卷首止法帖二字不云第幾下晉王羲之書四字作草舊石甚有筆意可喜其搨皆用濶簾竹紙甚易辨近來時行者僞筆甚多非昔石矣數年前聞晉江有一家造屋於土中掘得帖石不甚完云是舊石李戶部開芳曾惠余一本細玩之似亦是翻刻者但在今石前耳索靖月儀帖王氏跋一今年冬得黃熊所攜索幼安月儀帖一卷按幼安真蹟為宣和殿所藏而先已刻之祕閣續帖中米元章與其友人書謂月儀帖不能佳而黃長睿遂未信以為贋物獨董􅓉稱其筆畫徑密他人不能睥晲然亦是唐人臨本也月儀帖是古帖然恐未必出幼安後人以結法稍類幼安載妖一章遂舉以歸之索耳大約近唐人所為其搆法亦可玩第筆意則全失耳米貴筆意故謂不能佳董謂筆畫徑密則以法求之耳今東書堂帖中亦刻有小半筆意更湮第所云徑密者㸃畫間尚有可尋真定武蘭亭王氏跋一此帖乃五字損肥本余生平所見非少俱不能及雖以摹搨之多小有剝蝕而風彩逈出諸本上遍考古證凡五處皆合若管弦之盛上不損處有小龜形與是日也第九界行頗肥痛字改筆不糢糊興感之由由字下類申列叙之列其如徑鐵則可不待訟而勝矣凡宋人蘭亭辨證大約為薛道祖别摹一石而發蓋彼時秖此一僞石觀其劖損五字正恐自迷眼耳至南渡後好事者家刻一本則凡辨證所記悉摹入石若執此以證之不正墮其網乎在彼時或紙墨明暗新舊不同猶可辨若今時則皆為宋搨明者新者悉暗舊矣有得南渡佳本有不以為定武初搨者耶得薛摹本澄心紙廷圭墨又不驚詫以為古搨之絶奇者耶此跋謂取極于損本似得要領無但未損本有兩種即南宋所刻亦必不摹損本故凡宋搨損本類多真也然余曩日曽問莫廷韓蘭亭孰佳渠云潘仲菴方伯者佳其帖近重摹出五字損然細玩乃類木本又既稱吳靜心所藏顧又竄入獨孤帖中九跋則損本摹搨於元時又增此一番新意矣甲堅則兵利為之符璽以信之則并與符璽而竊之此訟又安能片言决也此卷為陳直齊物以松雪索之而重然張貞居謂松雪稱獨孤而外有趙子固倪仲剛吳靜心三本而不及直齊則此本應是竟未曾見也宋搨蘭亭王氏跋一跋稱在明是靖江朱光祿虛谷也此本紙色搨法既是北宋物乃於堯章偏傍結搆不盡合則正係道祖私摹本珍重珍重勝偏傍合者多矣右蘭亭選王氏跋一定武石既是貞觀時貴重則當是歐陽率更手鈎填朱入石者若謂出歐陽臨本則當時真跡具在既不惜令諸供奉摹搨矣何不即以摹入石而乃率更蹟耶此意昔人未道及余偶揣摩應爾未知然否宋搨樂毅論王氏跋一按此論乃右軍手書以貽子敬者至梁武已疑其為摹跡而陳文帝時賜始興王貞觀中進御十三年命起居郎褚遂良排署至中宗朝太平公主擕出以錦袋裝之後變起咸陽老嫗竊得為吏所跡迫而投之㸑下宋有二石本其一祕閣所刻其一高紳學士家所藏蓋它摹本之壽諸石者也此帖乃光堯太上於損齊手搨付石而石工及紙墨皆修內司第一品精緻流麗精彩射人而結搆柔緩豐肉少筋不待再勘本色畢露矣家弟有黃庭經一卷與此及戎路表正同余故能辨之齊梁間人及米元章似皆謂大令書過右軍不然也子敬筆法全祖此論緣右軍素法多嚴峻內押獨此論乃外拓而多姿子敬幼時效之其所入深後乃益變而自成家皆此法為之骨然則子敬之超逸乃所謂得聖人之一體耳此刻今有兩種一種肥而行濶一種瘦而行狹余所見寶晉齊東書堂皆狹本停雲館兩紙皆濶本狹者局促少趣停雲後幅稍徑然風韻不及前幅沈瑞伯謂前幅字雖小局面實大大有㫖此兩幅皆在吳中不知落何人手論石莫如宋高紳家最古然其本不完至海字止今世行本無海字止者則高本不傳久矣元符所刻是以唐臨本摹入石者董􅓉謂不逮舊本今司寇此本謂是光堯搨則豈能加于元符第停雲二刻不知出元符出光堯未能臆定然要之此論模搨尚少于黃庭倘購得佳本當為小楷第一王右軍文賦王氏跋一覽右軍書目原無載士衡文賦此亦一舊搨雖筆意圓媺而少國士風豈南渡後光堯重華與我明周憲王戲草耶跋謂圓媺而少國士風今東書堂帖中有宋太宗書此賦筆法正合此評得無即此本耶司寇公疑是周憲王然則或即東書堂舊搨亦未可知李靖上西嶽書王氏跋三一跋云李衛公上華嶽書粗豪不成語斷亦後人附會之談而結法却秀頴有唐人氣次跋云上華嶽書文尤拖沓一無意人所擬撰其書却有意出入右軍永興間然右軍避家諱故以正為政而此云聰明政直何也三跋云此不見正史意者影響之談如虬髯客傳類耳虬髯傳果影響之談若衛公此書則或非出傅會第有之亦不足為衛公奇也英雄固時有此等事衛公後功業顯故傳不然亦山谷間一妄語耳宗聖觀帖王氏跋一此碑建于武德九年二月內給事中騎都尉歐陽詢撰序侍中江國公陳叔達撰銘觀以祀文始真人尹喜者神堯常幸其地用幣焉故其徒相與侈大之其文詞稍雅淨而𨽻古亦遒媚可愛疑即詢筆也𨽻甚淳雅饒古趣猶是漢法第恨無受禪折刀頭徑力耳後有二行小字跋謂中統時新此觀嫌其字畫褊淺命工鎪剔此乃所謂洗碑法筆法經此十無一二存者矣可恨可惜其風格不峭峻者以是耳今存者字畫尚細料原本必更細蓋亦是石鼓勒法中統者元世祖初嗣位未混一時年號也歐陽率更化度碑帖王氏跋一書法自率更而始變晉體然謂之楷則誠楷也醴泉銘最大最易得溫虞公碑次小次易得雍禪師碑最小最不易得第其結搆精緊風華奕然體方用圓以徑藏媚則雍禪師而外諸碑瞪乎後矣余生平慕好之而三購本皆不能全第一本可讀者二百三十三字第二本僅二百十九字藏之徐文裕公家後有陸詹事子淵胡中丞孝思跋詹事數行精甚蓋其時已極重之二本俱佳不能上下而彼此互有無此不可曉也第三卷凡四百四字中間亦可讀而結法不如前豈在宋時有翻刻本耶或云有馬生者得善本臨搨而梓之者也姑用以裝尾余嘗謂漢魏時𨽻乃正書鍾王小楷乃𨽻之行章草則𨽻之草也若楷書則斷自歐陽始點點畫畫皆具法無一筆遷就從便意正與𨽻同法正與行草相配也若云行草在先則章草亦在鍾王楷先蓋各自創為法耳今吏楷皆是歐派其俗處乃在筆弱不以體方也司寇謂變法自率更始謂之楷誠楷良與余意合若柳元祕則又具篆法然是篆之行褚河南孟法師碑銘王氏跋一此孟法師碑乃中書侍郎岑文本文諌議大夫褚遂良書也首脫唐京師至德觀主八字尾脫年月銜名三十三字碑叙脫百餘字詞脫二十七字當是割表後歷世久遠贉池零落故耳第的然唐刻唐搨本波拂轉摺無毫髮遺恨真墨池中至寶也考褚公以貞觀十六年書時尚刻意信本而微參以分𨽻法最為端雅饒古意余嘗於黃熊所見而絶愛之恭差未成貿今歸曹進士繩武相去里舍不百武得朝夕寓目一何幸也此乃褚最有名碑恨余未見華嶽昭應碑王氏跋一右碑序頌華隂主簿盛􅛫為故相許國蘇文憲公頲祈雨獲澍而作者也侍御史劉升書書法八分頗遒美而乏漢意聊為録之此全是唐𨽻不若宗聖觀猶有漢意第細玩筆法乃全規模蔡中郎第取勢太巧翻致乏古趣耳若史惟則書則肥而壯又與此不同易州鐵像碑額王氏跋一右易州鐵像碑頌開元草七年崇文館校書郎王端撰易州録事蘇靈芝書端此文多頌故太守盧暉德政詞猥㫖瑣不復可解靈芝此書遒徑有逸氣然令景龍間虛和之度掃地矣宣和譜謂其有成就頓放當與徐浩雁行戈腳復類世南夫季海誠有之以擬二王永興吾未之敢信也譜又謂靈芝嘗為易州刺史郭明肅書候臺記宋時入邊外邊外人每以墨本詣摧場需絹十端始易一本妬者竟碎之今此碑幸尚完而求其所謂十絹之直理不能得一也於行體中取莊法亦自李北海來第小拘又微帶俗不若成德軍之流動自快也率更如彼方整乃不涉拘此行體却拘王士則不怒張而肉中藏骨此筆筆加力乃力反弱以此知作字自有一段天機非可形似間襲取也蘇君負書名或者全作楷佳所謂十絹易一本者疑是莊楷耳圭峯禪師碑王氏跋一圭峯禪師宗密法門龍象第以多所游講著述一時不能無疑於達磨慧能之宗㫖而裴丞相休獨能知之然至纍千言而為之辨則亦贅矣是時柳誠懸以書名天下僅以之篆額而自書文者深欲有效于密也書法亦清徑瀟灑大得率更筆意余初得此碑時絶愛之以其秀媚而精緊又别出一風致且有墻壁及後取而臨寫乃覺其拘且力弱形體雖微似歐却全不得歐法歐結體雖方整其實筆筆含飛動意安插得宜所謂體嚴而用和此則刻核求工往往不能稱意又乏其筆圓之妙所以不得佳然裴素負書名此碑想翻以有意失之若縱筆作北海搆法或當勝惜未之他見也文筆甚弱談佛自是此公當行禪理吾不能知第觀所序密公傳教原委知爾時流派分明如此非鑿空撰出自可嘉尚今時即不能然然雖有聖師亦不能使弟子皆得慧解此又存乎其人東坡乳母銘王氏跋一此刻在黃州近有人于土中得之蓋子瞻親書於石者以故比之他書尤淳古遒徑其用墨過豐則顔平原之遺軌也此書醇雅且含媚第穩有餘尚不能如醉翁豐樂之跌蕩有概也石今見存然傳者尚少喜雨亭表忠觀二刻王氏跋一坡公作喜雨亭記在鳳翔軍事推官年可三十餘作表忠觀碑在知徐州年可四十餘喜雨文雖爽俊而不盡脫書生習書筆故熟而不無沓拖意若表忠結法謹嚴而姿態自足故應以年事作階紀耳公此碑顔體大書世所盛行而少有傳其小者尤可貴也表忠觀小字良不易得不知刻在何所喜雨碑應在關中奈何不聞彼地人道及豈為唐碑所掩耶坡公行草定惠院海棠詩刻王氏跋一坡公好書定惠院海棠詩真蹟留人間凡十數本而此其醉書贈張房元明者于疏縱跌宕間自緊密有態大槩如良馬春原驕嘶自賞故不作欵段騀駊步也余以壬戌七月望登赤壁歌公前後二賦旋訪定惠遺址求海棠而不可得覽公此刻不覺悵然麻城一友為余言東坡所賦海棠定惠院乃在其縣今黃岡者非也緣兩邑皆有此院人但知坡謫黃州故即以黃岡為是耳其說似有據然亦未知然否永福寺碑王氏跋一按至元十三年常福生以饒州降授其路總管達此寺至延祐六年而碑始立相去四十三年矣其文與事俱不足道獨趙文敏書為晚年筆其規摹李北海遂無一筆失度不止優孟虎賁之似而已往事已非那可說想文敏丹石時不能少此感余素不喜松雪碑刻以其勻穩處近俗獨此碑清徑瀟灑深得李北海雲麾碑筆跋謂無一筆失度果然松雪他事姑無論若此碑或不書亦得定武蘭亭王氏跋一余所見定武蘭亭前後無慮數本而致佳者五其一在潘方伯允端所後有趙松雪十五跋而實非獨孤長老本蓋時有吳氏子見獨孤本而乞松雪書之者最後一跋可驗其二在余所為松雪執友陳直齊物蓋松雪從人乞直齊藏本不得而陳氏之後人用以併裝于尾者其三在家弟所亦有元人題跋其四乃賈秋壑為制置使時得之前輩劉菊莊祕監者不知在百二十卷中作何甲乙紙墨差更明潤聞今在項元汴所其五當為今詹博士東圖所藏後獨無舊題識又若裝潢人去其石龜跡然第六行之稍濶與它針眼丁形蟹爪之類則了了可辨識者以為五字損本無疑也詹東圖辛卯歲以南銓考績入京曾示余此卷索余題跋余生平未見定武真本項子長少參曾與余言二本一松雪所寶獨孤本一趙子固水濕本一本已購得一本方圖購之未得也上海潘方伯參軍兄弟各一本華亭顧光祿一本此三本皆有摹石由摹本辨之參軍者神色流動第一光祿者筆勢徑媚㸃畫間有六字與他刻稍異第二皆五字不損本其石上裂路並字殘剝處纎微皆摹出方伯者似木本宜居第三而莫雲卿極稱之以為最佳云是五字損本其行欵比彼稍狹而裂縫一同殆不可曉內四跋松雪為吳靜心題與獨孤十三跋稍同是也而九跋又全與獨孤本同其字畫行欵大小俱纎毫無異若松雪書兩本不應全同若此且前九月草六日一跋接後十四日跋正順而中插入者有草六日至十月三日六跋何月日倒置耶今云係文敏手跋則斷為臨出者無疑矣跋既僞石本焉得真司寇乃首舉之何也此外又有唐摹二本其一乃豐存禮摹入石者意全在取勢雖稍怒張不圓淨而筆意宛然謂河南臨本或近之想其真跡决當妙其一則穎州舊石以石理稍粗故㸃畫間不甚徑媚規模大略與豐刻同而改塗七字俱空又首行在癸丑三字次行稽至修七字三行長此字四行竹字直至下八字亦俱空不刻然轉折相應處絶得作字勢若定武刻則尚有安置不勻若不可解者而此內同字右直帶毛足字後字末筆拋擲不異手寫欣字末波頓筆若失誤然尤有天趣不知係何人刻何緣在穎州後有永仲及墨妙筆精小印按海嶽書史有蔣永仲亦好收古物想即其人也而余同年友朱吏部廷輔曾惠豫新搨一幅云石今現在太學細玩儘有致其偏傍考證與姜白石所記皆合而字形視潘顧本又微異似是宋時依考證别刻本國學諸公亦不甚貴重之東圖本正與相同但是舊搨耳司寇以當五佳本之一或不無為東圖曲筆然無舊題識去龜跡兩語亦稍寓微辭要之辨蘭亭者必具九方臯天機之識乃可若拘拘在形似考證間恐愈細愈誤寶晉齊帖王氏跋一寶晉齊帖者宋禮部員外郎南宮米芾元章手摹二王以下真跡入石者也凡閣帖所載俱置之元章自得右軍破羌諸帖與顧虎頭畫維摹天女故其名齊曰寶晉云人皆謂元章特妙臨摹又工作古書畫色以真贋本并示人人往往不能辨此帖雖古意藹然而不能脫米家腕法譬之康崑崙琵琶寧堪段師再聽余此疑不可解覽東觀餘論謂此公好觀古帖而議論濶疏好摹古帖而㸃畫失真然則前輩固已言之彼好事人語何可盡信也寶晉是米顚齊名據此跋則是此老手摹閣帖所遺二王以下諸墨蹟此老既工書又自真蹟上摹出必應出閣帖上管太學允功曾購得一本許借余觀而尚未克乃楊用修又云寶晉齊曹日新所刻何也豈重摹耶抑帖名偶同耶宋時尚有星鳳樓帖甚佳皆摘取二王佳帖刻手亦工不知司寇何為尚闕此種書畫跋跋續卷二
