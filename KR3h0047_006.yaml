body:
  text: 書畵跋跋續卷三明孫鑛撰畵蕭翼賺蘭亭圖王氏跋一余嘗聞趙太史用賢有楊儀憲副舊藏蕭翼賺蘭亭圖後為文徴明待詔所書呉說傅朋跋偶借閱之太史遂舉以見贈深愧其意悉輟年來酒鎗茶具之類為報所見古賢名跡多矣未有能過此者第傅朋跋内云辨才出右軍蘭亭相示翼既見即出太宗詔札以字軸置懐袖間閻立本所圖葢狀此一段事書生氣揚有自得之色老僧口呿有失志之態此恐未為實錄攷何延之記乃是辨才出赴人齋翼遂私取得之何嘗于初見時即奪取也口呿不合正為蕭生指摘蘭亭瑕疵不能無甚口耳其謂出閻右相竊又有疑此畵大抵根柢延之記辭當右相時恐未著聞即有之是文皇所諱寧敢著筆攷宣和畵譜載御府有呉侁畵賺蘭亭圖今本無御題璽記又稱顧德謙在江南時以畵名偽唐李氏云前有愷之後有德謙其最異者蕭翼取蘭亭圖風格特異但流落未見此本豈即德謙筆耶傅朋語多孟浪獨所記收藏承傳甚明在宋時推重已若是今當何如余仍乞待詔子休承補書何延之記于後休承年已八十餘雖時時見拙筆未隤家聲按公前四部稿有宋搨蘭亭跋謂以圖在趙太史處因舉帖歸趙兹何乃復因借閱遂得圖耶公素于畵家來歴攷究精兹據宣和譜疑出顧德謙筆似近是第謂蕭侍御為文皇所諱閻相不敢着筆則似落邇來腐語套古人作事不欺人此段風流文皇必更以自憙謂勝于辨才應募若見此圖必當拊掌自快又何諱耶文皇方且賞房相賞蕭賞老僧夫豈局促自隘且延之方遣男呈本開元帝閻相圖之夫亦何懼若傅朋跋與延之記牴牾則所傳聞異詞是未見延之記作圖其出閻相手更為有証奚必出德謙耶夫子杏壇圖王氏跋一大廷尉陳公玉叔寳藏其父憲使所貽夫子杏壇圖出入必奉以偕至蜀而敎鐸所振與文翁相後先今年宦遊金陵以就世貞得一恭展吾夫子據磐石坐而鼓琴有穆然深思之度七十二子或環聽或追趨雖各自為態而左準右規不失誾誾侃侃意行筆精𦂳設色古雅品在神與妙之間獨程鉅夫跋謂為呉道元則吾未之敢從道元生平以神氣勝運筆衣縷若菰條所謂呉帶當風者與此絶不類或出陳閎李思訓手聲價何必减道元鉅夫元初為大官常廉訪江南者不當在裴晉公前第晉公遺墨吾故嘗見之元和八年公方自舍人為中丞何暇辦此蠅頭楷宣和御押由來在書畵贉首今書之跋尾與印文皆譌玊叔苟能割愛去之余當用海岳菴例改題曰唐名人畵杏壇圖元程鉅夫跋玊叔許之否凡為人跋書畵最難但說是臨本便已不快此跋五節辨駁明係指為贋作其欲改題為唐名人畵猶是姑婉轉其辭耳苐不知祖何本來果是唐畵摹出猶為可存恐但徑係近時人偽撰則但須作今道元觀更不必致辨裴程矣晉公子重耳出亡圖王氏跋一少保銅梁張公率其子錦衣君某某輩來請志銘所贄玉帶重錦悉歸之獨收此一卷乃晉公子重耳出亡圖據跋或以為李伯時駁之者以行筆粗細不類或以為趙子昻則有思陵小璽在徐察其筆力精𦂳遒密不事鉛華而自具一種生氣乃至馳騁追逐轉盻耳語之狀無有絲髪遺恨當是北宋以前第一手所惜者此圖當有二十餘幀今存者十幀耳而三皆不可考其可考者僅重耳之出蒲僖負覊之私謁與齊桓公具賓主而多從馬齊女與舅犯謀醉公子寘之車而出之秦宗女之來尚者五人既渡河舅犯辭而投璧于河介子推中流舷立而笑之及以車騎冕服返晉而已諸圖故當大有致惜乎其不為完璧也觀跋中贊羨語其品固應在前杏壇卷上此圖傳世者少應是佳本伯時子昻俱所不必論要之上去周可二千年其衣冠車船等無所本若何創作如但是任意寫出雖筆法入妙無足貴也宋徽宗雪江歸棹圖王氏跋二一跋云宣和主人花鳥雁行黄易不以山水人物名世而此圖遂超丹青蹊徑直闖右丞堂奥下亦不讓郭河中宋復古後有蔡楚公元長跋雖沓拖不成文而行筆極楚楚與余所藏題聽阮圖同結搆次跋云據蔡楚公題有四圖此當是最後景耳此圖應係畵院供奉人代作宋名人山水人物畵册王氏跋一雜宋名人山水人物畵一册有曰趙大年雲山者峰勢出沒罨靄中草樹映帶下為清流白石不减南宮父子有李唐春江不老者古松據大石欲攫峽口崩流滙為怒濤陵㟁直上百歩未巳于諸畵中最為獅子吼有曰劉松年溪隱者山田者翠屏削立雲表孤莊枕清漣平疇交逺風各極其致有曰馬遠觀梅者老挺疎枝秀出物表對題御書一絶句沓拖不成語復不成字休承定以為宋高宗余謂高宗必不落夾乃爾當是光寧所題也又有松下揮翰者一老人據案絶似猶龍公覺天骨與天機並秀又有曰觀瀑者不敢當棲賢三峽或於天竺六橋間雨後得此微尚有曰夏珪遠浦歸帆者三樹掩映斐亹天際一帆斷岫明㓕自足好致有曰趙千里水閣納凉者當是狀其邸中景耳六月閱此薰風自來令人忘暑有曰金谷園者寫五十里錦障宛然在目以無名欵屈署此殆不减陳閎李思訓有曰栁州者以二月間輞川小沜西湖麯塵拂拂恨少青帘㸃綴曰高閣觀濤者則錢塘一曲耳有曰寒山拾得者偃蹇自恣可掬想為世尊作貴輔疲津梁不得不托魚服以逃有曰閻次平小景者嵐頂􅋾􅋾當作叔明鼻祖其它綠樹豐縟甚近自然有曰次平松溪别業者尤精勁可愛乃知唐伯虎周臣于此取之不盡有曰李嵩内苑圖者或光堯德壽宮冷泉小景耶若以擬宣和延福諸位則大寂寥有曰松下鼓琴者大具悠然自得意内不見署名而人物冠服都雅恐是馬和之有曰松間醉臥者令人作糟邱侯想有曰雪閣者險而瘠絶惟小具暖㡌足曲肱耳有曰霞嶺扁舟者漁舟欵乃入高栁夕陽中宛然孤鶩齊飛境有曰風雨泊舟者雖晦霡霂而不作陽侯怒舷底足濁醪便不妨倚枕聽敲篷滴瀝有曰採蓮圖者有曰栁陰放棹者意甚佳小恨剝落有曰劉阮天台者大類前金谷而自然勝之有曰高閣燕息者麗敞静好而不作五侯炎色其晉公午橋白傅履道甲乙耶署名不能雅或休承别有據聊因之右為幀凡二十有七其可考者僅八人後二幀則空繡其一是滕王閣景右嚮而虛其左塡以王子安詩序其可辨字百之一二其一亦當是閣景左嚮而虛其右所繡字猶細若蚊睫以攷韓退之所為記復不合竟不知其何文也畵品精工之極與書俱不可望蹊徑况敢雌黄昔人稱薛夜來為針神而唐季女仙有盧眉娘者於一尺生絹繡法華經七卷今此三寸絹僅得七百字唐文似亦不足多詫也此跋述畵中景歴歴在眼若使善書者登之屏即可作展卷觀宋畵香山九老圖王氏跋二家弟自秦中歸手一卷相示云得之朱大叅孟震者攷之似是香山九老圖多正綂以後不知名人跋僅有咸淳時一僧復誤裝于後而雪齋老人者至目為趙大年筆大年長山水小景汀洲蘆雁不言作人物及界畵樓臺也畵史稱劉松年有九老圖此豈其筆耶吾生平雅慕樂天自納節來頗治弇山園以希十五年後耆英之盛而今復厭且棄之矣兹與吾弟約異時肖吾貎必不為樂天如不為僧贊寧者當為百三十六歲之李元爽哉海後跋云九老中獨香山居士小解事人或謂山仙宮有居士一院居士不首肯曰歸即應歸兜率吾意頗與之合審爾當貌我作十三歲兒騎黄犢吹笛三生石傍也洛社會是千古佳事宜為圖内惟白傅知名餘俱不甚著然所賦七言排律俱佳信乎唐時詩道盛也弇州公詩文過白傅其襟懐風度彷彿似之苐兹時果有此八老恐公亦未甘與為會此即稍遜跋乃願為僧贊寧及百三十六歲之李元爽後一跋又欲作十三歲兒騎黄犢吹笛三生石傍大約眼前志願稍足便念長生及來世亦常理耳李伯時姑射仙圖王氏跋一列子稱藐姑射之山有神人焉肌膚若冰雪綽約若處子然不言其乘龍御氣而此李伯時所貌與遜功帝所題謂為姑射仙像攷宣和畵譜亦有之當不誤也後有紹興圖記及賜朱勝非四字當是以故相領宮觀侍講席沾此葛楚輔跋筆意殊遒美苐稱紹熙三年尚書左僕射按公以四年始自元樞稱右丞相而此云左僕射僕射之不為僕射者十六年矣楊廉夫陳道復後先鑒定以為眞跡二公之筆或老而勁或放而雅更的然可寶也桑愼等三跋亦佳故為題其後此圖後敬美以寄余畵亦佳第筆法不甚似李伯時又宋兩帝題識及印章頗潦草不令人快然欲偽作佳印章及工好題識亦不甚難也葛相跋風度自勝顧奈官銜誤何豈古人亦或借稱雅銜如今人席漢唐名者耶楊廉夫跋似眞然則此卷即偽亦是元時物矣古人作畵皆有意此圖姑射仙意何取又何所據作乘龍御氣皆難强解安得與深明畵理者談之摹古畵王氏跋一右集古畵摹四本合一卷其一為顧凱之女史箴内當熊一段顧本乃是五代人摹筆後聞在嘉興項元汴所未及摹先乞陳方伯子兼略節本傳數語以俟今年秋始得請于元汴之兄少叅子信足其事其二為閻立本蕭翼賺蘭亭圖其三周昉擘阮圖眞跡得之陸司空與繩其四王摩詰奕棋圖有宣和題識而不甚眞似是畵院筆然亦工緻此卷舊藏陸太宰全卿轉入崑山顧氏後復為袁繩之憲副所得余别見摩詰所為序及與其弟縉裴廸三詩意甚愛之因從繩之借摹而乞俞仲蔚小楷題序詩于後摹出仇寔夫之子以故大都得十之八九譬之禊帖不减歐褚臨跡也昔人謂畵可摹書不可摹摹出畵亦即可賞何必眞也此所云摩詰奕棋圖者隆慶己巳時崑山顧氏曾攜入京欲售之朱忠僖索千金忠僖酬之三百不肯曰往清明上河圖是其家物彼時實獲千金此二寶同價忠僖曰彼時買者欲取刻契于時相非此無以重之豈特千金即再倍之亦不為重今我但取為案上清玩即此三百亦聊酬汝遠來意耳若據實言二百亦已多矣顧猶執前說畱數月竟不售持去于時翟德夫孝廉與其事向予道之云圖中有四人一即摩詰一其弟相國一其僧兄所謂曇壁上人者也一裴十廸無但畵筆高妙其相盼笑語狀宛然如生有棋子墜地一童子拾之摩詰自有序道其兄弟乆别復會意及相國裴十皆有詩且約余至其寓當呼顧來共觀之偶參差不果至今恨之今此跋謂别見所為詩序愛之幷所云精工古雅之意可尋而生肖流動之意難學者與翟語皆符當即是向攜來京一本不知何時歸之袁憲副其得値能如朱太保所酬否也當熊千古奇跡虎頭畵聖此眞希世之寶賺蘭亭風流獨絶可亞之惟擘阮事味稍短此則獨以畵傳耳豳風圖王氏跋一此卷為豳風圖五幀林子煥作子煥于書畵史俱不載而畵筆頗遒𦂳可雁行馬和之小篆系詩尤淳雅可重解大紳每章以行草釋而後跋之沈瑞伯謂古人左右圖書凡詩書皆有圖因言關雎則畵河洲上雙鳩及荇菜桃夭則一桃樹甘棠則一棠樹柏舟但舟在水中君子偕老則止宣姜一像而服飾無一不合大約以簡淡妙有極難畵者皆巧于取意雅而不俗後曾在姊丈吕膳部處見數幅惜畵手不佳今此豳風圖則景物甚多殆不勝畵矣圖亦應有所本非子煥自創出若覓得古本詩書兩經令公門下士如尤如仇等一一臨出集為册更命善書者作小楷書經文副之固自快人清明上河圖别本王氏跋二一跋云張擇端清明上河圖有眞贋本余俱獲寓目眞本人物舟車橋道宫室皆細于髪而絶老勁有力初落墨相家尋入天府為穆廟所愛飾以丹青贋本乃呉人黄彪造次跋云按擇端在宣政間不甚著陶九疇纂圖繪寶鑑搜括殆盡而亦不載其人昔人謂遜功帝以丹青自負諸祗候有所畵皆取上旨裁定畵成進御或少增減上時時草創下諸祗候補景設色皆稱御筆以故不得自顯然是時馬賁周曽郭思郭信之流亦不至冺冺如擇端也余在京師一故知家見畵屏風有十餘扇主人云此清明上河圖也因穆廟命工加彩飾因乞於内殿諸供奉令渠搆出者雖筆法絲毫無承受然規模大略是矣黄彪初作此贋本時跡甚奇云但借一觀三日内遂圖成者彼時能眩時貴目惟以非舊裝為裝工湯姓者指破當時亦秪惜二十金賄耳此圖細于髪而能暗記潛作之固亦斵輪手也今司寇惜張擇端在宣政間名不著今黄彪亦與之何異世間非無奇技但苦不遇耳人才亦當若此蘇黄小像王氏跋一古人不可見得見其像良足慶幸第既得其眞像即須託高手臨數幅更摹入石使廣傳乃為快古畵王昭君圖王氏跋一昭君以良家子困掖庭不勝牢騷憤鬰慨然請和蕃又用其法配呼韓邪子生二女與張元呉昊何異而書生弄筆往往深憐而重與之則可笑矣昭君事載漢書及西京雜記甚明此乃劉中壘父子所記夫焉有誤其云自請行者乃出後漢書不知傳聞自何人應未足據其適單于後甚能為漢和輯邊塞至所生女且入侍元后此正如士君子抱才德乃見蔽于讒佞貶謫遠方尤能為國家保土化俗如李衞公之欲變黎然作詩者深憐而重與之自是情理安得引張元呉昊為比使張呉二人能使趙酋稱臣奉貢豈不亦宋之忠臣乎且昭君何曾如中行說敎單于叛漢哉司寇此論欲在翻案然亦過好奇矣獨漢元帝以斬郅支故使呼韓畏懼再來朝因求壻漢氏願保塞外傳之無窮威德遠振乃千古大快事今吟者或乃用和夷為嗤似為負寃余十五六時曾作反昭君怨三絶句一長歌今止記一絶威振隂山肅恩行瀚海春前宫賜美女不是事和親語雖不工然于事為核趙子惠藏石田畵虞山三檜王氏跋一趙博士子惠居天台萬山中喬木世家長松八桂璀璨怪偉按圖求之故自不乏何必區區一虞山殢也七檜皆梁時種至宋而腐其四宋人為補之云昭明太子手植者誤昭明足跡未嘗出建業百里外也近有人自常熟來者云此七檜俱已枯甚可懊惜宋時人猶能補其四今遂乃任之可見今之人好事又不如宋遠矣跋稱昭明足跡未嘗出建業百里外恐未然古人事固有不盡記者若但據陳編遂欲翻案恐渉以夢証夢劉氏藏甲申十同年會圖王氏跋一甲申十同年圖余所見凡三本一本于大司徒益都陳公家一本于太保呉興閔莊懿公家一本于太保華容劉忠宣公家其序皆太師長沙李文正公手書而公所賦詩視諸公獨夥又多代人書此圖自𢎞治癸亥至萬歴己丑蓋八十有七年矣而衣綦猶若新犀玉參差青紫輝暎眉宇奕奕有生氣試一指問之其師師而坐衎衎而食者將李文正揮灑内制之暇乎抑劉忠宣戴恭簡親承天問之後乎閔莊懿抗三尺而得遂志者乎王襄敏平蜀寇而旋凱者乎謝文肅講誦絃歌之餘晷乎無論其人不可作其時不可遘而其事亦不可再不佞貞叨第丁未于今四十三年矣同榜二太師一太保已前逝今在朝者僅四人藉令三相君無恙沉嚴若太乙貴神其肯甘末坐以與諸卿佐周旋若李文正者哉其肯不厭筆札之役為諸卿佐九書其文若詩者哉此㑹比洛中耆英差彷彿而𢎞治之視熙寧殆過之劉忠宣可伯仲司馬文正富文忠今為忠宣之後人比部君書此聊寓執鞭之慕云此圖既係當時所繪何不如蘭亭標出銜名使後人挹其丰範何乃混列為圖徒使企慕者想像揣度乎跋所云三相君沉嚴若太乙尊神良然古云人情似紙番番薄今昔雖互有賢邪然要之薄之一字則實不可返此諸公亦庶幾宋洛中比然宋時投閒今乃當路則我明勝矣仇英九歌圖王氏跋一仇實父圖九歌凡九章章各有徴仲待詔書余所見數本皆闕禮䰟而此則併國殤去之其儀從人物都不詳僅雲中君有少雲氣河伯持杖御一龍山鬼乘赤豹乃類虎而已山鬼殊窈窕令人消䰟其他種種有生氣待詔意似草草而筆勢汎瀾可愛余豈謂屈子偶歌此後人各自出意摹寫其繁簡工拙之不同宜也此卷筆雖簡而意足視他本不啻勝之余舅氏見湖翁有此圖云的是龍眠眞跡後有小篆書九歌文不著名姓所圖東皇太乙儀從甚盛崑山張石川銀臺屢向舅氏緩頰欲割取其後幅小篆舅氏不肯後又在安福張符卿程處見一本則甚簡惟有雲中君龍駕帝服稍具儀從湘夫人有一木數葉落山鬼乘赤豹餘皆止一像微摘歌中語黙注少景不知何人筆然頗饒古淡趣今觀此跋似亦是簡本古盡尚簡此稿本想傳來乆遠若夫筆法之妙則余不甚解畵不敢强分别仇實父臨西園雅集圖王氏跋一余嘗見楊東里先生所題西園雅集圖乃臨李檢法伯時筆有崇山絶壑雲林泉石之致與此圖畧不同此圖僅一古檜一怪石一立壁捉筆書者為子瞻學士從旁喜觀者王晉卿按卷對竚者蔡天啓倚樹睨者李端叔彼圖則有張文潛而無端叔此圖據方石畵淵明歸去來辭者即伯時握麈尾觀者蘇子由握蕉扇者黄魯直撫肩立者晁無咎捉石者張文潛按膝者鄭靖老彼圖有端叔而無靖老益以陳無已若摘阮之陳碧虛與聽阮之秦少游說法之通圓大士與聽法之劉巨濟題壁之米元章與傍觀之王仲至則所同也彼圖有名姬二曰雲英春鶯而此皆削之楊先生又云曾見劉嵩年臨本無文潛端叔无咎噐物小異而僧梵隆趙千里亦嘗摩之此則吾呉郡仇英實父臨千里本也余竊謂諸公踪跡不恒聚大梁其文雅風流之盛未必盡在此一時葢晉卿合其與長游者而圖之諸公又各以其意而傳寫之以故不無牴牾耳實父視千里大有出藍之妙其運筆古雅彷彿長康探微元祐諸君子人人有國士風一展卷間覺金谷形穢矣此圖今臨本頗多余曾見數本然亦不甚相同其文雅風流足可亞蘭亭比之金谷良非倫也李伯時似是即景繪者其他本或是晉卿别乞人圖又或彼時善畵者慕其風而想像圖之亦未可知要之伯時本佳今須得臨伯時本乃可貴耳海天落照圖王氏跋一海天落照圖相傳小李將軍昭道作宣和秘藏不知何年為常熟劉以則所收轉落呉城湯氏嘉靖中有郡守不欲言其名以分宜子大符意廹得之湯見消息非常乃延仇英實父别室摹一本將欲為米顚狡獪而為怨家所發守怒甚將致叵測湯不獲已因割陳緝熙等三詩於仇本後而出眞跡邀所善彭孔嘉輩置酒泣别摩挲三日而後歸守守以歸大符大符家名畵近千卷皆出其下尋坐法籍入天府隆慶中一中貴擕出不甚愛賞其位下小璫竊之時朱忠僖領緹騎密以重貲購中貴詰責甚急小璫懼而投諸火此癸酉秋事也余自燕中聞之拾遺人相與慨歎妙蹟永絶今年春歸息弇園湯氏偶以仇本見售為驚喜不論直收之按宣和畵譜稱昭道有落照海㟁二圖不言所謂海天落照者其圖之有御題有庾金瓢印與否亦無從辨証第睹此臨跡之妙乃爾因以想見隆凖公之驚世也徐奉常正夫太師文貞公冢孫也為余言渠家有海天落照圖數本太師不貴此等物多為人乞去或以餽人有最下一臨本尚存猶自可喜其所圖日光之閃爍明暗及水中日色海濱人瞻望與夫薄暮人爭赴家市中人收拾市物形狀踴躍如生不可畢述今跋稱秪實父摹一本則華亭所得者豈又仇氏之耳孫耶湯君邀友置酒泣别小璫倉卒投諸火可歎可惜而實繪林佳話若但用贋本貽守公又或獲重貲而歸之朱此常事耳何足紀述世人又或言此奇物為造物所忌類有此患此又不然凡物有成必有壞古名跡鍾王顧陸等今多湮滅未聞盡遭此厄其諸俗畵俗字遘會祝融陽侯者亦豈盡無以不足言遂無人道之耳司寇得湯卷驚喜亦不知果是仇筆否使盡見文貞家數卷必當更有月旦眞本既亡臨者孰為最肖自唐歴今八百年中間善畵者多安知無别臨本若得宋臨本固應勝實父也李郡寫旅獒圖王氏跋一李郡出所畵旅獒圖索題内大酋之狀貌瓌奇飾裝瑰異與諸小番之怪醜么瑣且俱能戢驁傑為戚施種種情性得之苐所謂旅獒者大犬也見孔氏傳疏甚明又左氏公嗾夫獒焉杜預註亦云猛犬也今乃畵作一綠狻猊大約如近代所貢者然不作黄色若佛書所稱青獅則尾大於斗又其種乆已絶不聞作貢郡五指如懸槌少加問學亦何必減蕭世誠職貢閻立本王㑹耶為題於後以朂之西旅所獻獒正今西番所貢獅子獅有九種獒則其最下者耳余嘗觀京師諸古刹壁所繪獅其首尾毛雖視今西苑所畜者小異然形狀大畧不甚遠所云青獅尾大如斗者似是特創出怪形非眞物也李郡此畵或亦有所本未可盡非書畵跋跋續卷三
