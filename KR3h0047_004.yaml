  - {type: page-break, offset: 0, content: '', id: KR3h0047_WYG_004-1a, image: WYG0816/WYG0816-0112a.png}
body:
  text: 書畫跋跋續卷一明孫礦撰墨蹟右軍鶻不佳帖王氏跋一鶻當是諸孫小字為此帖連白石枕鄴中戰場諸蹟濮中李少師柬之家物米元章之父阿奢以奕勝獲之遂為米氏物後有尊德樂道印見元章書史甚詳今則割為一卷而有開成二年柳公權記一條豈全卷題字亦隨之而割耶結體比它蹟形勢稍廓落而遒聳雄邁有威鳳翔霄神驥追影勢余老矣後先所見右軍父子乎筆唐臨至八本能不悲喜敬題於後字之妙惟在運筆故得見墨蹟一行勝墨刻千行况右軍蹟又最上神妙者乎今司冦自矜後先見右軍父子手筆唐臨至八本可謂奇幸第按諸跋右軍前三帖及此并後褚臨蘭亭共五本大令祗送梨一本就中真蹟右軍二大令一而前此月帖跋云疑是米臨則唐臨亦止二其三本不知為右軍為大令於何處見係手筆係唐臨徒令人作望梅想以余所聞華東沙氏有右軍袁生姨母初月三帖大令草九日一帖疑司冦未之見文壽承氏有大令地黃湯又姑蘇某氏有右軍裹鮓朱忠僖晚購得右軍快雪時晴此豈司冦所及見即所云八本之三耶此七帖傳聞惟袁生快雪係真蹟餘皆唐臨華氏帖今蓋歸項少參子長云此鶻不佳帖跋不言購得不知是誰氏物帖割跋亦分割自是常理書史稱李孝廣收得右軍黃麻紙十餘帖所記帖語白石枕等共七章此帖幸存餘帖今在何所似未曾入石妙蹟杳然令人悵望大令送梨帖王氏跋一敬美弟自燕中歸得大令此卷後有柳誠懸文與可二跋考誠懸跋蓋併右軍思言叙卒何期但有長歎念告十二字俱誤以為大令故有劍合延平珠還合浦語米元章鑒定之遂拆為二卷而子瞻所題家雞野鶩同登俎春蚓秋蛇總入奩君家兩行十二字氣壓鄴侯十萬籖蓋右軍思言帖尾也元章左袒大令故不謂為然而誠懸跋後細題又一帖十二字連之語皆為元章削去恐後覽者以誠懸跋語致疑若大令筆雖稍有剝軼而存者猶自煜煜射人元章所稱天真爛熳故不虛也誠懸結搆淳古生平鋒鍔斂盡隱然有羮牆思吾弟其善有之萬歷庚辰敬美以江右臬副入覲遘疾乞致仕余在驗封為力請於冢宰不得遲至三月十日仍赴江右有詩四首寄謝余乃不知其次日早得此奇物也敬美書家當行矻矻數十年捐資搆古真蹟至兹歲乃始獲此晉法書一紙耳元章書史載其辭云今送梨三百顆晚雪殊不能佳是十二字而柳跋云兩行十字敬美亦跋云十字而費五十金且損五六此帖今刻臨江二王帖中今下送字缺顆字則元無書史誤增耳無送字而云送梨帖當是舊標題云爾也柳後細題一行元章削去可惜據書史有貞觀半印梨氏印王文正孝先跋今司冦奉常俱未言及能無剝蝕否書史又云劉季孫以十千置得其子以二十千賣與王防迄今又幾四百年雖割去右軍一幅價增止五倍亦不為甚重第劉在日米曾約以歐陽詢二帖王維雪圖六幅正透犀帶一條硯山一枚玉座珊瑚一枝相易因硯山為王詵借去不果率更書摩詰畫彼時何價廉乃爾此帖不知後何時復歸元章蘇跋屬右軍米跋奈何不存而與可跋乃存也古人用墨皆濃濃最難敬美謂子敬誠懸與可墨色濃淡前後如倒置謂古人今人不相及非徒用筆即用墨亦然良是第謂凡稱右軍真蹟墨瀋昏淡者皆贋品則恐未盡然何者濃墨遭水濕亦不無落色耳隋賢書出師頌王氏跋一史孝山出師頌係古章草法在宋時有兩本天府志索幼安所謂銀鈎之敏而人間則甚推蕭子雲余舊于文壽承所見一卷上有祐陵泥金御題征西司馬索靖書與宣和瓢印蓋天府本也第黯􅀢不甚可别細玩其行筆處亦似微蹇澀往往有楓落吳江之恨今年秋家弟敬美購得一卷其大小形模相倣佛而結法特加詳密古雅墨氣如新又有太平公主胡書王涯僕射永存珍祕二印越國公鍾紹京半印楮尾米友仁敷文鑒定以為隋賢書遂入紹興內府余竊謂二蹟皆自幼安臨出特紹興之所入者佳而宣和之所藏者小次耳小米不能别所以而槩以隋賢目之余良幸獲再睹此希世之珍所小不滿者子雲奇蹟遂以永絶文壽承晚年於燕市無意中購得索幼安出師頌價三鐶耳好事者多往索觀云字已昏暗不可識就明處定睛視久之乃稍可辨㸃畫若筆法則祗在影響間壽承後摹入石余曽見搨本亦頗饒古趣第不見所謂銀鈎之敏又多滲蹟似若曾經水漬者然壽承時已七十餘昏昏默默若何摹出目力可謂强亦可謂妙手矣敬美此本不知得自何人未曾與余言司冦謂勝文本當由墨色鮮明耳小米槩目以隋賢并司冦謂自幼安臨出恐皆屬懸斷但果係宣和紹興真物亦即是書林至寶矣以此觀之世間神物沉埋舊家敝篋者尚不乏也褚臨蘭亭真蹟王氏跋一唐人臨右軍禊帖自湯普徹馮承素趙模諸葛貞外其嚴整者必歐陽率更而佻險者咸屬褚河南河南蹟尤多米襄陽既於書史稱得蘇沂家第二本以為出他本上然考之是雙鈎填廓耳書史又云右軍筆精大令日寒二帖薛丞相居正故物後歸王文惠家文惠孫居高郵并收得褚遂良黃絹上臨蘭亭一本乏資之官約以五十千質之後王以二帖質沈存中而攜褚書見過請售因謝不復取後十年王君子居高郵欲成姻事因賀鑄持至高郵以二十千得之此本藏深山民間落黃拾遺熊手以百三十金售余後有襄陽題署備極推與且云是王文惠公故物辛巳歲購之公孫瓛與書史語合按蘇家本於崇寧壬午閏六月手裝此則壬午之八月手裝耳至今年為萬歷丁丑上距裝裱之歲蓋七甲子安得不六倍其直也又有李伯時一跋雖真蹟而似非題此卷故剔之管子安褚本曾以示敬美敬美詫生平所未見即欲攜歸與司冦賞之時子安不肯彼時似尚未得此本也據跋管所得是蘇沂家本公所得是王文惠家本第管本余猶疑其自米臨本上重臨出此本寧詎是河南手臨乎司冦固具眼人第有一真本斯贋本易别若俱是贋本則所謂一種僞好物者未免以貌似眩離婁矣顔魯公書竹山潘氏堂聯句王氏跋一唐太師魯郡文忠公在吳興日宴客於竹山潘氏堂聯句而手書之凡十九人如處士陸羽僧皎然李觀房䕫輩皆知名士而所謂粲顓須者于公為子姓皆有文行官爵具家廟碑中公此書遒徑雄逸而時時吐姿媚真蠶頭鼠尾得意筆大較與家廟頡頏而此乃手蹟又當遠勝之第宣和書譜實載之目録而考無祐陵御題及宣和瓢印前僅冠以緝熙殿章而後有米元暉鑒定按緝熙殿理宗朝所建也雖隆凖宛然能無邯鄲子輿之惑乎哉不知靖康之變玉盤金魚散在人間雖以光堯懸勇爵餅金購募而應者拆洗去之小米能别書不能别所以或為諱其自至理宗日始加以祕殿章識耳余既書此人或笑余直當以公法定真贋不當瑣瑣出處令後人目以為黃長睿也此詩無宣和印識當是佳臨本何者靖康變後御題無所忌正當借以為重何為剪去第今人作必當贋宣和不贋緝熙以其祗有緝熙章知是北宋時臨本非近時僞物正可貴也摹本尚可辨佳臨本絶難辨八法定真贋恐即魯公復出亦未易言宋名公二十帖王氏跋一右宋名公簡札合一卷翰林學士李宗諤送從表兄詩中有云銅魚四明守當是知明州也宗諤字昌武饒陽人故丞相昉之子仕至右諫議大夫其稱學士當在景德二年後呼表兄為腹兄不知何所據老米謂宗諤主文既久當時試士無易書例故爭為肥褊朴拙以投其好今考之果爾然則公書雖不見賞專門亦負時趨耶范仲淹者字希文吾吳人有二帖遺尹師魯舍人此其一也跋者多宋元人吾僅留尤袤袤常之無錫人以祕書監終諡文節軾者蘇軾字子瞻睂山人此寄久上人帖古雅為生平尺牘最黻者米芾吳人以乳媼蔭得官止禮部員外郎此送提舉通直詩結法雄爽有逸致而不至作生平佻險其書黻則郇公行押體也又絶句一首無姓名而有緝熙殿寶考其詩是黃庭堅語庭堅字魯直豫章人由史館纍謫宜州卒追諡文節此書結搆森然詩亦婉致所謂春來詩思何所似八節灘頭上水船紹彭者薛字道祖中山人號翠微居士與弟嗣昌輩俱有名所謂河東三鳳者也此與趙大年借墨帖古氣浡浡遒徑中蓋余所寶三帖之一也沈與求字必先德清人以知樞密院卒諡忠敏自謂屏蹟里居當是知潭州丐祠時也世忠者韓蘄王也字良臣慶陽人以三鎮節致仕卒史稱其目不知書晚歲忽有悟能作字工小詞據與司農總領帖當是太保領元樞時耳而結法頗遒麗恐其時尚未入悟或佐史筆也允文者虞字彬甫仁壽人以左丞相兼樞密使出宣撫川陜進少保封雍國公諡忠肅此公蓋南渡名臣吾以其慷慨議恢復近張魏公而識時宜勝之書法出鍾成侯雖不能精詣亦自古汪藻者字彥章德興人仕纍禁近後以顯謨閣學士謫死藻有文行饒志節其書亦出入米襄陽衡者葉衡金華人以進士十年取相位以宰相片言得罪人多疑之書雖不免墨豬而有拙意且以力勝王十朋者字龜齡樂清人年四十七狀元及第所與書極辨者不知何許人想亦工佛法者公可謂能衛道矣蔣璨字宣卿紹興中為戶部侍郎敷文待制史不載載書史所題冲寂觀二詩極俚淺而書筆圓媺翩翩得晉人意冲寂觀在陽羡乃其香火地王淮字季海永嘉人以左丞相樞密使罷為大觀文卒諡文定劄子當是答故相或執政者張綱字彥正丹陽人嘗至大參以資政殿學士致仕卒諡文定用太常駁改諡章簡此劄似得致仕恩謝執政又為其子先容耳范成大字致能吳人以大資領祠卒諡文穆其書最得二家法此小草亦離離可愛孝祥者張字安國烏江人以詞翰名弱冠及第官顯謨閣直學士卒樓鑰字大防鄞人以大資領祠卒其書辭黯然天真之痛札亦稱之了翁者魏字華甫蒲江人贈太師纍封秦國公諡文靖此書倉卒為密戚弔慰故㫖惻而辭絮筆亦草草張即之字溫甫孝祥從子以父孝伯蔭補官至直祕閣壽八十餘此行體不足言然却不墮惡道此諸帖大約以人重非真能書者蘇黃米三家似當别出不宜雜置此中韓蘄王晚雖稍有悟亦豈詎工詞翰所作小詞及字恐俱出代筆惟以其趣味可賞故人遂許為真耳汪彥章長於四六然嘗力詆李伯紀謂饒志節或未然東坡手書四古體王氏跋一坡仙所作煎茶聽琴二歌南華寺妙高臺二古中間大有悟境非刻舟人所能識也南華詩最後作考其書是海外雞毛筆所揮染故多纎鋒大抵能以有意成風格以無意取姿態汝南公主志枯樹賦余見公墨妙多矣未有逾於此者東坡詩儘有自得處第才太高未免信口道以此稍違大雅耳此諸詩大率從禪解中來跋所云大有悟境蓋亦以禪理言也余未見坡翁此卷亦未見汝南志徒切健羡蘇子瞻札王氏跋一附蘇原札千乘姪屢言大舅全不作活計多買書畫奇物常典錢使欲老弟苦勸公卑意亦以為然歸老之計不可不及今辦治退居之後决不能食淡衣粗杜門謝客貧親知相干决不能不應副此數事豈可無備不可但言我有好兒子不消與營産業也書畫奇物老弟近年視之不啻如糞土也書畫奇物謂不啻如糞土良是第甘食美衣及貧親知相干亦孟子所謂於我何加者若果食淡衣粗謝絶貧相知杜門日把玩書畫亦何不可蘇長公書歸去來辭王氏跋一契順吾吳定惠院行者院今為寺尚在吳俗藿靡乃有此奇人與奇事惜猶為名使非行腳本色而錢世昭紀聞則謂佛印了元有一札附契順與公公跋語了不及了元豈故略之欲以見契順重耶了元札大要謂權臣忌子瞻為宰相耳人生世間如白駒之過隙二三十年功名富貴轉盻成空何不一筆鈎斷尋取本來靣目又曰昔人問師佛在甚處師云在行住坐臥處著衣吃飯處沒理沒會處死活不得處子瞻胸有萬卷書下筆無一㸃塵地位不知性命所在一生聰明要做甚麼計蘇公得此當汗􅉡􅉡下三日不應漫然都不及也佳臨本自是寶物所謂下真蹟一等者也跋謂契順攜有佛印書中大有針規語不應漫然都不及按公此幅字自是為酬契順路費計彼時曇秀亦嘗至惠州坡曰公還山中人必索土物何以應之秀曰鵝城清風鶴嶺明月坡曰不如將幾紙字去每人與一紙其為契順書此辭亦是此意耳了元公應自有詳書答何必於此及之坡老洞庭春色中山松醪二賦王氏跋一洞庭春色中山松醪二賦實此公酒經之羽翼成而絶愛之往往為客書所謂人間合有數十本者余與敬美所見石本一則草而瘦一則楷而放與此蹟頗不同此蹟不惟以古雅勝而姿態百出結搆緊密無一筆失操縱當是睂山最上乘觀者毋以墨豬蹟之可也坡翁小文字每多俊快可喜况此是說酒用以助翰墨姿態尤為當行此外尚有酒子及濁醪妙理二賦若兼得公書之并酒經共為一卷日展數過亦何讓李謫仙三百杯山谷書昌黎詩王氏跋一生平見山谷書以側險為勢以橫逸為功老骨顚態種種槎出獨此録昌黎送符城南讀書詩小行體盡斂其怒張之氣而為虛婉與蘭亭異體同用尤可寶也昌黎木强語山谷愛之第昌黎晚節貴盛故其談讀書之效津津然山谷以筆札得罪流離放逐生兒愚魯亦是佳事何必强之讀書耶放筆一笑自注此書是真蹟而經水漬以故不得佳生兒愚魯亦是佳事此是極聰明人自誇語山谷伏波神祠詩臨本王氏跋一山谷書劉禹錫經伏波神祠詩最為奇逸有瀠洄飛舞之勢後有張安國范致能李貞伯文徴仲諸跋皆佳初自華東沙氏售于吾館甥叔陽意忽疑之持以見畀偶以囊澀不能應得旬日留托王君載雙鈎而俞仲蔚填廓之雖不盡得其妙比之搨石尚少一重障也卷今為嘉興項氏以重價購得此真蹟價須幾何致令司冦公囊澀不能應雙鉤廓填亦即是鏡中像第不知二公長技能入唐人室否薛道祖三帖卷王氏跋二一跋云翠微居士薛道祖書學最古法最密而世傳獨最少惟道園亦自恨之十五年前余嘗得其上清連年實享清適四帖以示文仲子仲子大快以為所睹惟晴和二像隨意吟三帖不謂復遘此真足以軒輊六朝追踪漢魏今年忽于元馭宗伯所見此三帖不覺失聲歎賞居月餘偶及之則云偶以寄吾家馭矣家馭亦不甚鑒許又月餘而家馭自留都輟以見貺次跋云此大三皆與大年者蓋宋室令穰也畫品超絶與道祖翰墨契甚深吳文定跋惜其不列於四大家為之扼腕道祖之先少保嗣通者書法有舅氏褚登善宅相時人語云買褚得薛不落夾而道祖與米元章實齊名故元貽之詩云世言米薛或薛米猶言弟兄與兄弟然嗣通筆怯不逮登善乃得列歐虞四大家道祖品高無遜元章顧獨不得與蘇黃四子並者嗣通䟤跋墨林旭素顔柳尚未出而道祖時四子數已滿故也與道祖頡頏者章惇蔡京卞俱有可觀以人故不齒云唐四大家蓋或云歐虞褚陸宋四大家其蔡是蔡京今易以君謨則前後輩倒置恐君謨不甘若云蘇黃米薛固自穩當米趙四帖王氏跋一右敷文閣學士米元暉書一紙翰林學士承㫖趙子昻書三紙敷文所跋乃其父元章臨唐陸柬之帖今臨帖已不可見矣敷文奉㫖鑒定故結法精密遠勝他作夫以一小臣之臨筆而至厪萬乘之寶藏思陵之好尚可知也承㫖與幼住菴主赤牘前後纍數十百紙此牘皈向尤切結法尤婉麗可愛歸田一賦出入河南北海用意小過所與直翁書內云自冠便知讀書屬文中間不幸為雜好所分如彈琴繪畫吹簫等日夜不休爾後覺吹簫不甚佳最先棄去次知琴之為理甚長而世俗皆不解於是極意討論既得其說亦棄去而獨於畫未能忘情而人不知其用心之苦此等語非直公實録亦風流有味昔人謂於藝當學可傳者勿學不可傳者可傳者謂詩文書畫等也不可傳者謂奕棋握槊琴阮簫笛等也昔夫子稱游於藝夫亦以怡吾性情足矣何必僕僕為身後名哉翟孝廉德夫又謂彈琴勝於奕棋作字勝於彈琴此則取自適意視前論為優今子昻謂棄去簫次棄去琴獨於畫未能忘情此自是風流俊人語雖自悔實自矜第云知琴之理甚長得其說棄去恐亦是未能得耳既得安能棄又古洞簫三十六管今人鮮解吹凡今所云簫者蓋長笛耳子昻所謂不甚佳者簫耶笛耶元暉席父名其書似未得與趙並論蘇長公三絶句王氏跋一蘇長公畫竹草草數筆不倫不理而濃淡間各自有天趣書筆只兩三字帶誠懸餘俱本色蒼徑之中媚態雅韻靡所不足七言出律入古有聲有色有味第不當於驪黃之內求之余幾欲為東圖和此韻既而放筆曰不若容此老獨步此跋於長公畫竹及詩字皆極其贊頌曰天趣曰不當於驪黃之內求之似是醉餘逸興淋漓信筆揮染者極令人企羡曩日共東圖論書畫時恨不及索觀之米元暉手書詩王氏跋一米禮部芾壽止四十五而其子敷文至八十二書法則不啻箕裘此敷文所書詩敘語後缺一行詩六章前缺一行紛披老筆遒媚險譎是晚年最合作筆詩句云我今將及古稀年可證也若其語之沓拖潦倒不無南渡門面老顚家風元暉詩余未見據所記一語果是胡釘鉸類若元章詩固自有工者楊用修述其望海樓一篇云雲間鐵瓮近青天縹眇飛樓百尺連三峽江聲流筆底六朝帆影落樽前幾番畫角催紅日無事滄洲起白烟忽憶賞心何處是春風秋月兩茫然精密而流快是晚唐佳境何得概以沓拖潦倒目之趙松雪書千文王氏跋二一跋云右趙承㫖千字文不言是何年書當是至元以後延祐以前無疑也蓋其功力既完精神正旺故於腕指間從容變化各極其致中有疏而密者柔而徑者生而熟者緩而緊者出山陰入大令傍及虞褚不露蹊徑正以博綜勝耳文待詔乃謂師李北海吾未敢薦也三十年所見千文真蹟多矣紹興董氏智永真草從規矩出風度當為第一本三辰顧氏懷素草從風度覓規矩當是第二本此卷折𠂻二僧間具體而微不免居第三若趙模時代雖古而韻不足鮮于樞骨力雖强而氣不清四五之間尚為幸矣次跋云今年六月有故人以趙文敏公千文來售者初閲之則潦草酬應厭倦筆墨之意可掬為再三過時時得佳字重玩之則結搆波䇿有不容言之妙文休承謂生平見公草書僅二本此本尤佳絶蓋公以至治二年壬戌四月草八日書以六月辛巳捐館中間閏五月十八日曾跋子敬十三行洛神賦謂老疾不能作跋雨後稍凉書此蓋去書千文僅二十日耳是宜其有厭倦色而老手斫輪運斤成風之勢固不容掩然公自是翰墨緣且盡矣余置書畫緣亦於今日盡臨紙黯然低徊久之望日曬書題大凡詩文書畫等晚年則力量進所謂年是年力然精神周密却不如少年時書畫道成雖不若詩文之焦勞第衰邁時潦倒或亦不免但就其漫興中詩文則氣格深厚書畫則姿態淋漓皆有一種天趣正是大不可及今司冦評松雪此書云酬應厭倦云運斤成風曲盡老手之妙第自謂置書畫緣於此日盡不知是何年語此後果能不再購名蹟否松雪歸去辭書畫王氏跋二一跋云趙吳興書歸去來辭極多獨此為第一本妙在藏鋒不但取態往往筆盡意不盡與余所伯寶枯樹賦結法相甲乙余平生見蘇長公鮮于機及公書此辭不少然見輒愧之自己卯冬决策不出明年棄家作道民稍堪一舒卷然陶公好酒乏酒資余好酒酒資頗不乏而年來厭謝杯勺以此竟輸公一籌人間世貴人嗜書畫若渴獨此辭以見諱得免近始屬吾弟敬美敬美倦遊且歸矣歸則遠出吾上再能作趙公書步陶公辭第畏酒一籌亦恐不免輸却貴人嗜書畫若渴獨此辭以見諱得免大是快事快語宜對之進一觥松雪洛神賦王氏跋一趙吳興洛神賦乃中年筆不甚經意而時時有法外賞十行後姿態溢出宛然驚鴻游龍也歎賞之餘為題其後余少時曾於友人卞孝廉應龍所見松雪書此賦是絹素上書最蒼徑多姿態卞友日置案上臨寫贉池半已脫落絹亦多浮起憶其風骨似是晚年筆視此中年者未知孰勝松雪手書十五詩王氏跋一趙吳興自謂此十五首不讓唐人中間致語如北來風俗猶存古南渡衣冠不及前白鷗自信無機事元鳥猶知有歲華平生能著幾緉屐負郭何須二頃田白露已零秋草緑斜陽雖好暮雲稠南渡君臣輕社稷中原父老望旌旗故國金人泣辭漢當年玉馬去朝周其用意使事間出唐人表所以不及唐人亦坐此若書法則密不掩態媚不勝骨上可以入大令室下亦據北海客右矣據題元祐五年書付從子玠是公為翰林學士承㫖最承恩日也蓋六十有四歲矣以故書法入化境子俊者玠父也公集中有倡和詩其書如王謝家子弟雖散髮躡屐亦自有貴門風據所録六聯皆以新巧為工謂用意使事出唐人表所以不及唐人亦坐此果也南渡君臣輕社稷中原父老望旌旗是傷故國語玉馬去朝周豈自道耶如此則視金人泣辭漢者愧矣二詩俱未見全篇不知為何作天命改易人力豈能奈何要之不仕可也若易主則凡希聖賢者皆不當仕又無論帝胄矣趙吳興真草千文王氏跋一永禪師真草千文後先散施江左僧寺蓋千餘年而余於會稽董文玉侍郎家覩八百本中之一本自恨此生如值阿閦國一見不再見今年在敬美弟處獲睹趙吳興此紙所謂煥如神明頓還舊觀者非耶跋尾皆國初名士如宋承㫖父子王待制胡山長蘇太史吳殿學名腕中有眼者吳興他書於永師似尚有仙凡之隔今司冦乃以頓還舊觀許之余未見此本無敢臆斷損本三君法書王氏跋一前一紙為天全先生送景寅參政聯句三十韻行體遒美雜有褚米法跋尾始自放天真爛然而至後一紙水龍吟慢則筋骨姿態種種橫逸或鋒利若錯刀或虬健如鐵絲最合作書也又范菴先生錢塘三律縱筆自喜神采奕奕射人此翁極謂人奴書而亦不免有豫章吳興意然至曩時所謂院體一掃盡之又西涯先生楊子洞庭二律為陸水村公書未及畢而以酒至解是時陸尚為御史未幾先生大拜陸遂不敢請而跋其事跋今在名賢遺墨中余後先四得之合為一卷以便批覽蓋天全西涯二公名位相敵而范菴以風節翺翔其間不肯下一當合也天全書固有飛動勢二公尚法而此特縱遂皆為生平極意筆二當合也為詩三為詞一而首皆缺有二字者有二韻者有小半闋者三當合也夜光之璧不以損而减朗况余所得皆照乘者哉因題之曰損本三君法書此三帖正以損本奇據跋皆三君得意筆則尤可賞也內長沙相二律為陸冢宰書以酒至暫停後大拜陸遂不敢請其事尤可紀釋氏謂今時為缺陷世界昔人云寧為玉碎無為瓦全兩公相業似之獨范菴名位稍卑差得自完若以墨寶言則又當武功為首矣文正好書此楊子洞庭二詩何少宰謂前無李杜或未然然要是此公精到語余從兄都督公有此二挂幅曾稔觀之詩正與字稱三吳名士筆札王氏跋一諸名士筆札吳文定原博祝京兆希哲王太學履吉陳太學道復各得二紙沈山人啓南李太僕貞伯顧尚書華玉金先輩元玉陸詹事子淵王中丞履約王吏部祿之彭山人孔嘉各一紙又有名承舉者號癡翁者皆白下人考其筆意似亦隱君子也吳公後不完札與希哲後談瑣事一札道復小詩筆意俱更遒美華玉結搆精密子淵尤雅俊而不能無意元玉履吉翩翩自快履約行邊時書寄履吉者所及時事縷縷其謂江陜二省程文冠諸省蓋一時郎署名手也祿之與履約札謂舉筆目眩閏之則成雙筆且屬不可聞衡翁語劇可笑蓋是時衡翁踰八袠尚能作蠅頭楷故也祿之自是草草吳興如一束枯枿而已孔嘉虎邱詩既不俗而書筆流利不作睂山體驟看之未有不以為文氏者吳文定不完札何以不入前卷名曰四君損本耶陸文裕書固每以有意佳孔嘉不作蘇體良難得者姜立綱書王氏跋一故姜太僕立綱書此四子全文句讀各有圈甚精當是先朝春宮進讀本也結法圓熟端徑妙不可言初見絶以為沈度學士書徐覺其波磔處小露鋒鎩乃敢定為姜筆噫嘻今兩制諸君不復能辨此矣米元章謂但如布算子便不是書今書家多祖其說不知篆𨽻元布算子者也米又以吏楷嗤徐季海近弇州公見字稍方整者亦率以掾史目焉不知古所云𨽻正今吏及掾史也右軍蹟今幾絶矣近代能得其筆法者惟趙子昻姜廷憲二君趙之祖右軍人猶知之然亦不免算子之誚若姜則語八法者率不道矣余在李伯玉家見姜小楷真精工之至畫畫有筆驅遣如意其姿態全從筆中出宛是聖教碑法伯玉家又有樂毅論臨本精密而流動絶有骨力文夀承極賞之曰泛看止如此然欲效之即一波一㸃亦不易到此殆唐初人所臨沈瑞伯亦以為然韓禮侍存良亦有一本行欵紙色俱相同云是馮承素等所臨余愛其運筆淨又沉著瘦而有筋亦謂是唐臨本後余壻劭之見都城一前輩乃云非也此乃姜廷憲手臨者耳此言大有理余聞之恍然心服姜書力原深宜夀承云不能到也今司冦謂初見以為沈學士此徒以字形方整言沈法祇從趙變圓熟是其所長無右軍筆法細玩無意趣然姜亦有一種學沈者豈此四子全文正用沈法者耶姜雖為吳子所嗤然自致身金紫今其遺蹟在京都價亦不减希哲履吉效之者多白衣躋貴顯亦可謂遇時者矣有人作干祿字書應以為凖國朝名賢遺墨王氏跋五一跋云右有明名賢遺墨第一卷二十人故翰林學士承㫖太子贊善大夫金華宋文憲公濂與徐大章書修謹甚筆法尤遒密可愛楊鐵􅐟先生維楨七言律一章足稱散僧入聖先生會稽人元儒學提舉也以其嘗預史局且卒於洪武八年故收之胡仲申先生翰亦金華人此書亦貽徐大章者頗極推許之致張羽潯陽人所作雪樵傳事與文皆清逸而𨽻法則韓擇木𣲖也王遠無鍚人革除靖難間兩為翰林學士解公縉一名縉紳吉水人此六絶句懷南安舊遊作也墨氣勝而結搆小疏從子禎期臨右軍一札七十餘尚供奉史局胡文穆公廣題漁父辭劍圖記公廬陵人建文中狀元及第贈禮部尚書再贈少師楊文貞公士奇贈東管公一律一絶句徑筆紛披與語俱老公初名遇以字行亦廬陵人華蓋殿大學士贈太師胡頤菴先生儼南昌人進太子賓客致仕楊文敏公榮建安人謹身殿大學士卒贈太師金文靖公幼孜初名善以字行臨川人武英殿大學士贈少保三公同官內閣而同為胡文穆題漁父圖曽公棨梁公潛亦題此圖曾書法尤自精雅可愛亦吉水人甲申狀元及第梁西昌人李忠文公詩勉凡二紙其一跋江母傳其一題陶靖節度履圖清忠徑節風表百世而結法乃婉媚有致王文端公直泰和人文安公英臨安人同舉進士歷禮部左侍郎典內制無弗同者海內稱為二王先生詩律筆意亦無不同陳文定公敬宗詩亦題昭關圖小楷斐亹饒晉人意公之負臨池名固不虛也魏文靖公驥蕭山人書精緊有腕力以南京吏部尚書致仕卒年九十八睂壽為我朝文臣冠陳公璉挽李士文序詞翰清雅公東莞人以禮部左侍郎終卷凡二十一紙而江西獨得十之七云次跋云第二卷錢文肅公習禮臨江人以禮部右侍郎致仕此蹟一挽章耳公品清貴故留之楊公翥吾郡人纍進禮部尚書食祿不視事年八十五卒所書梅軒記為陳有成作其辭翰皆頽然長者高文義公榖揚之興化人以兼東閣大學士致仕卒贈太保書法妍婉令人作留侯好女子觀于肅愍公謙錢塘人以兼太子太傅兵部尚書中讒死贈太傅此詩乃題黃子久江山萬里圖者以不切于圖故割置此馬公愈臨胊人狀元及第卒贈尚書張文僖公益上元人以侍講學士死土木難贈學士二公皆登內閣不躋極品所題城南書屋詩為戴文進筆徐天全有貞吾郡人初名珵纍官華蓋殿大學士封武功伯削爵謫金齒放歸卒送僧素菴住持宣府彌陀寺乃少年書而中有塗乙筆殊秀徑林學士文題張氏手澤記辭翰皆質勝學士閩人商文毅公輅淳安人三舉第一人及第謹身殿大學士卒贈太傅韓襄毅公雍吾郡人纍進右都御史總兩廣諸軍此二札皆與吾鄉練綱御史者韓公推賞獨至蓋才氣合也彭文憲公時安福人狀元及第之明年即入內閣卒贈太師所書乃挽章而有高誼舊為鄉里重直言曾感帝王尊語得非為李忠文作耶劉參政先生昌吳縣人弱冠登高第今題宋江山簿推恩告身而疑其制不能考何也太子太保吏部尚書贈太師三原王端毅公恕報少保閔莊懿公圭一札筆頗謹細恐佐史為之以公名臣第一不敢不存也太子太保兵部尚書贈太保青州余肅敏公子俊一詩似于嚴郡謁范文正公祠作華蓋殿大學士贈太師宜興徐文靖公溥一詩則卷冊中長語也刑部尚書盱江何文肅公喬新與郁秋官札乞琬琰集春秋纂言懇懇楷法極謹細無一筆苟正與志傳所載合太僕寺少卿長洲李公應禎初名甡放舟一律亦得小致語此公以書名而波拂間時露崛强殆類其為人翰林院檢討白沙陳先生憲章大儒也誤稱閔公為憲副而旁注一長字豈與閔契深不規規世法耶國子監祭酒冰玉羅公璟以趣朝賜麵小詞寄陸釴太常筆法頗欲學宋仲溫而未成長禮部右侍郎方石謝公鐸為人作一詩不知何題而頗清雅卷亦二十人帖如之而吾郡稍稍有餘者三跋云李文正公東陽二札書筆俱清麗公長沙人𨽻燕中戎籍纍官華蓋殿大學士卒贈太師倪文毅公嶽一札乃寄同年閔莊懿公圭者太常少卿陸春雨先生釴哭用常一排律過亨父故宅一律翰林院修撰張滄洲先生泰哭子五絶句皆銷魂語也二公皆吾州人皆負文學用常不知何許人太子太保兵部尚書劉忠宣公大夏二札一與郁公即前卷所謂秋官者一則其子華容令余外大王父也贈太子太保戴恭簡公珊一札寄閔莊懿者二公皆孝廟晝接賢臣想見其時為之慨羡屠襄惠公滽在吏部數行要閔公出郊過談且云有奇果一品未薦竟不知何物也公鄞人贈尚書新安程公敏政贈太子太保常熟李文安公傑各有詩投吾州陸文量而山莊二絶有味乎言矣文量名容吾州人有經濟才思元子桑悅常熟人負才而躁為柳州通判故其語曰鷓鴣道我行不得杜宇勸人歸去休又云投荒此日無言語不與宗元競柳州雖𢎞曠不足而㫖趣亦悲切矣書尤縱誕可惱海釣蕭顯山海人按察僉事書名倣佛張南安而圉圉未稱雪賦禁體復步險稱奇宜其都不成語也吳文定公寬蓮溪挽章作蘇體極古雅謝文正公遷卷冊語耳王文恪公鰲與楊循吉一札有前輩風度文定長洲人文恪吳邑人連舉壬辰乙未會狀及第文正餘姚人則乙未狀元也吳至禮尚謝至戶尚謹身殿大學士王至戶尚武英殿大學士俱贈太傅三公年位聲實伯仲也刑部尚書贈太保洪襄惠公鍾一札乃撫順天時致閔莊懿者贈太師順德梁文康公儲一詩乃宮坊時送王冬官者新建伯餘姚王公華一札乃宮諭時簡閔莊懿者閔時長中臺也刑部尚書贈少保林貞肅公俊南京禮尚贈太子少保邵文莊公寶各詩一紙其書一欹細若焦螟而著剛徑一粗濃若蠐螬而表儒雅卷二十人凡二十二紙而吾郡得十之四四跋云南京吏部侍郎泰州儲文懿公瓘次韻雨花臺一律詩拙而微有句書拙而微有筆吏部尚書贈少傅太原喬莊簡公宇題戴文進畫歌歌語步驟起伏全自李長沙𣲖流出才小乏耳書亦如是太子太保吏部尚書陸公完吾郡人其書亦李長沙詩跋也𢎞正間賞識如此禮部尚書贈少保毛文簡公澄吾州人狀元及第其與王父書談公私情事皆實境而筆尤拙贈太子太保吏部尚書泰和羅文莊公欽順毛公榜第二人也家書一紙寄仲氏按察叔氏中丞者南京禮部尚書贈太子少保華亭顧文僖公清為陸太宰賦也適園詩甚有致與羅公筆俱清徑贈新建侯王文成公守仁一絶句毋論公理學勳猷巨公詩秀拔有致閲至此大醒人目南京吏部尚書崑山朱恭靖公希周也適園詩亦為陸太宰賦者公生平不作一行草筆南京兵部尚書贈少保無錫秦襄敏公一札乃撫楚時與臺使者贈尚書王文定公瓚送王父歸田一章其書似學高間辨光而不得筆應天通判長洲祝先生允明書家龍象也一札雖草草亦自有天趣江西提學副使北地李空同先生夢陽陜西提學副使信陽何大復先生景明文章家麟鳳也吾嘗見李先生寫七尺碑大有顔平原筆何先生倣李長沙而指小滯三詩出語便自不凡工部尚書贈太子太保建業劉清惠公麟生平于尺牘留意此札書筆尤得聖教風吳縣東橋顧璘才名與劉公伯仲而詩語尤俊此則小竿尺耳亦見一斑公官至南京刑部尚書前翰林侍讀學士贈學士鄞縣豐公熙三詩戍閩時作也辭筆俱清密有致其子坊以南考功主事謫歸坐事後易名道生才藝亦跨竈而狂邪之行家聲隤矣此札多風語可笑翰林院待詔長洲文先生徴明與王中丞履約書甚詳吏部尚書贈太子太保吳江周恭肅公用書一紙南京兵部尚書贈太子少保增城湛文莊公若水詩一紙贈禮部右侍郎崑山魏恭簡公校尺牘二紙二公雖齒懸絶而一時成進士又一時以道學鳴者也考湛公詩蓋年九十一矣魏公牘蓋與周充之侍郎父子此卷二十人得二十二紙最多名賢大夫而亦多書家者流吾郡仍十之四云五跋云武英殿學士贈太保崑山顧文康公鼎臣一紙乃與王父司馬書也詹事兼翰林院學士贈禮部右侍郎陸文裕公深早朝及禁中觀雨詩二首詞翰俱清麗然比之公生平差為落夾太僕少卿王南原先生韋雪中簡顧英玉詩僅小有致先生館試詩有雕欄十二晝沉沉畫棟泥融燕初乳句傳縉紳間今似未能稱太僕少卿邵康僖公鋭在江藩時一札與周充之侍郎南京户尚贈太子太保武進周襄敏公金亦嘉靖中能臣也詞翰故自楚楚前翰林院修撰贈光祿少卿新都楊公愼與姜龍憲副札亦自一斑翰林院修撰進賢舒公芬與楊俱狀元及第俱有直諫聲貴溪夏文愍公言舒公榜進士也此札與其邑朱令者公時在政府貴態浡浡辭旨間而結法却老蒼有李西臺風詹事贈禮部左侍郎東廣黃文裕公佐所為擬天寶宮詞六首實嘉靖宮辭也詞筆俱婉麗今少師太子太師建極殿大學士華亭徐公階與余往復書札頗不少而此則見貽詩也公名臣而詩翰亦自穩密都察院右副都御史吳興王公守一札是行邊後寄其弟履吉者右春坊右贊善贈光祿少卿吉水羅文恭公洪先一小札乃與吾師李觀察者此公極有翰墨聲以小故圉圉不快陳太學道復長洲人一律四絶語平平耳而散草古淡在懷素林藻間吏部員外郎長洲王先生榖祥小札數行亦可觀溧陽馬君一龍者余同年也仕至國子司業為余書紀行萬字皆小行割其百之一于此吳邑彭先生年游虎邱得五言律四首馬君狂草不堪與顚史作奴彭先生藁行眉山顰步而此皆能脫生平窠臼可重也其後三紙河南按察使濟南李攀龍于鱗福建按察副使廣陵宗臣子相詩各一江西左布政使吳興徐中行子與書一余所得于三君子者不啻數十卷而僅留其一以志感耳卷中二十人為二十紙而吾郡亦十之二司冦所購昭代諸名公遺跡富矣顧奈何無許禮侍成名巵言謂其結搆疏而醜是傖中小有意者或未然先文恪公極重許書今存有所書扇一柄秀徑多姿頗得右軍法詩亦流快有錢劉遺調恨不獲質之司冦公又姚吏侍洪謨近在檇李其書逼趙松雪甚有骨力何為亦不見録祝京兆書成趣園記王氏跋一祝京兆希哲為華光祿尚古成趣園記幾三千言狀其峰巒池館紆餘曲折之勝不遺餘力其書法頗出趙吳興然吳興遒而媚京兆遒而古似更勝之余初得一本付駿兒為楷式八月自金陵過里中華之宗人叔達强以投余輒去追而返之不肯納稍間校前本行欵大小不甚遠而結搆微有出入然各遵其妙豈光祿有二子京兆各為書一本耶華之園餘八十載不復可踪跡而此記尚存言之不可以已也如此庚寅歲司冦公曾遺余此卷真體微帶行數之幾可得三千字徹尾無一懈怠敗筆逸筆俱不傷其妙最媚最蒼最密最散驅遣自如全以渾脫勝不拘拘步趨古人而古意涌浡毫穎間生平所見祝京兆書未有出此上者跋謂法頗出趙吳興亦其章法跌蕩處倣佛似耳至其幽深無際乃得之鍾太傅謂遒而古勝趙不誣也上方微腐前一段全缺者三字微損者五字裝潢亦不甚精今云有二本則余所得當是叔達强投本其付幼公者不知何若既云各遵其妙必微有不同安得並展較之園亡矣賴此記存而記又賴字以傳不朽者寧獨言哉祝京兆諸體法書王氏跋一祝京兆擬古以下四章擬黃庭春遊二章擬蘭亭差小若閨懷則曹娥洛神之流耳古言一跋擬章草跋及古調亦然而微涉仲溫然皆古雅有深趣昆福寺以下五章鋒微斂六宮戲嬰圖以下三章鋒微露然姿態自勝不知誰擬要之自晉人流出朝元引以下九章擬眉山秋夜以下四章擬雙井小米山水以下二章及渡口一擬南宮中間微雜一二已筆蓋不欲為韓幹似也修夕詞以下六章結法與黃庭並觀余老矣所見京兆墨蹟不下百餘本未有若此之種種臻妙者真令人心折內所擬歐顔峭者病姿莊者病韻二家本自難學毫釐千里少損連城京兆書大約得之蘇黃米趙者多其氣格亦略相上下擬南宮謂不欲為韓幹似果然若歐顔則流派原不同今云二家本難學非也間架方整蹲筆緩趨最易得畦徑世聞難學者惟鍾索二王耳黃庭蘭亭曹娥洛神即百重繭追之恐終為壽陵步也古書似亦得不似亦得古文似亦不得不似亦不得是針祝膏肓語京兆聞之必大憤悶然詎能不心折祝京兆書太白傳王氏跋一太白歌詩既奇其人與事又奇不敢望司馬子卿手作傳李延壽亦小快無奈宋景文于喉咽間作囁嚅語令人憒悶幸而有祝希哲書之差足快也宋景文唐書步驟孟堅以尚簡古故每每讀之不甚快以作太白傳良非宜然整齊收斂亦頗有法延壽南北史雖姿態穠郁然秪長于敘碎小事稍近傳奇小說且靡曼乏裁使紀大事未必勝景文也文徴仲手札王氏跋一右文待詔公徴仲手札二十八紙中多與趙梁父陸子傳二先生者趙先生之孫某陸先生之館甥也裝池成卷俾余題其後昔顔魯公貴至八座而乞米乞鹿脯于李太保豈魯公臨池不公若抑巖穴之苞苴更饒于廊廟也若二先生者賢于姚麟殿帥多矣文衡山手柬跋云文待詔與韓懋賞及祖父三代手札大要是謝餉物語耳韓能寶之且乞諸賢題識以侈之賢于蕺山姥姚殿帥多矣司冦兩跋皆謂寶之者勝于姚殿帥按魯直所云乃是韓宗儒每得坡一帖即于殿帥姚麟家換羊肉十數斤然則姚正是收買蘇書者何為冒此誚也宜云勝韓宗儒乃是三吳楷法二十四册王氏跋二十四一跋云吳郡宋仲溫書趙文敏閣帖跋陳文東書聖主得賢臣頌法全倣永興精熟可愛又書張懷瓘録章草三品人名氏韋續五十六種書懷瓘十體斷內章草一條雜正行體而皆有小法所臨急就幾于優孟抵掌釋文小楷尤精後書葉夢得及自撰小跋皆與前三書筆同高槎軒季迪所作眠雲軒詩翩翩度驊騮前書法亦近仲溫特小疏耳姚道衍廣孝書所作凡十首得意句小楷亦楚楚而自謂筆不佳故多偏鋒吾吳詩盛于昌榖而啓之則季迪書盛于希哲徴仲而啓之則仲溫若文東則雲間之破天荒者二跋云沈學士民則凡三紙其一為孔子世家其一為金氏墓志銘王贊善汝玉撰其一字稍大為諸葛武侯出師表沈大理民望字最小為虞書益稷篇夏太卿仲昭以書供奉者四十年而始為吳文定公書此一紙太卿公業已老矣而精謹乃爾令人肅然盧中令為已凡二紙一種德堂記一拙齊詩皆遒徑而不克去俗為可恨三跋云拙齊銘一賦一詩三楊宗伯仲舉為銘錢山人子書為賦杜山人用嘉陳山人紹先劉少詹宗器為詩其詞與書法俱伯仲也徐武功元玉二紙其一臨褚河南哀册文其一東原生傳東原生者即杜用嘉也書傳後者吾吳周鼎伯器結法亦瀟灑又國初亦有一周鼎伯器者檇李人文行亦相類非此伯器也四跋云李太僕貞伯凡二紙一紙臨蘭亭記而行筆皆趙吳興公生平以奴書誚吳興此何也陳言疏謂中書舍人多至八十餘員蓋當時傳奉之敝人所蹙頞救嗉者抗言之無隱吳尚書原博王醫師墓表中有塗乙然無一筆潦草呂翁墓表字稍大俱步趨眉山而時時有鍾意蔡九逵孔目嗣命議以禿筆取徑姿盡骨全大抵李吳純綿裹針蔡則强弩透札然李不盡汰俗吳不盡汰濁蔡不盡汰生以此小有恨耳五跋云祝京兆古近體詩十五首是行卷上公卿者中多曹娥洛神風格又元日早朝排律及雜詩二首皆早年筆演連珠并序十三首卿巒風木行一首尺牘四首皆中年以後筆駸駸逼歐褚黃道中致甫字說稍大約齊閒録又大則皆晚年筆進可入元常室退亦不讓伯施所謂幽深無際古雅有餘明興一人而已黃道中致甫者吾故人淳甫初名字也為其尊人五嶽山人乞集序潤筆因以畀余六跋云祝京兆勸農圖記赤壁賦著思録序或似率而密或似拙而巧信乎書家上乘也惟赤壁一賦峭健而小涉佻耳勸農圖記又自超駸駸在趙吳興上舊有文待詔畫一幀余姑割愛去之而留此書七跋云祝京兆梅谷記比之勸農帖差大成趣圖記又大于梅谷本作正體微取行法以助姿耳遒徑古雅中媚態溢發天真爛然真墨寶也八跋云文待詔徴仲書皆小楷其一為余録早朝近體十四章是八十四時筆也其二古詩十九首極有小法是八十八時筆也又一條三行射禮有鹿中云云尤精甚而考據典核偶于散帙得之附于後其三晝錦堂記結力遒徑是六十七時筆也其四拙政園記及古近體詩三十一首為王敬止侍御作侍御費三十雞鳴候門而始得之考其年癸巳是六十四時筆也九跋云文待詔甲子稿詩凡五十二首文八首極精謹可愛而不甚脫學究氣是時年僅三十有五聞公每歲輒手書其詩文前後凡六十餘册皆為徽賈從其家購之徐博士榖昌落花七言律詩十章是未見獻吉以前語小楷如新鶯未成長音羽宛宛自見春意贈仇東之二絶句則皆進于是矣待詔又有致仕三疏中不無塗竄而結法亦佳家弟乍目為公稿本費十鐶得之以示余偶章簡甫之子藻見而摩娑不已曰吾父筆也十跋云錢文通公原溥書陳氏碣銘蓋宋仲溫流也張南安二五言律皆倒韻而語亦平平南安多狂草吾吳人又不好收之今此小行雜楷法幾于優鉢曇花陸文裕子淵小楷尤不易得今此尺牘凡四首中間行法十三楷法十七居然有北海吳興風度其語却多凡情可笑張侍郎文光者陸公門下士也陸薦之貴溪相得供奉永陵第不為臨池家所許而此蘭亭序特楚楚如士人所恨不堪三復耳十一跋云王履吉閔已賦進學解千字文皆精入永興三昧然不如拙政園一記四詩張琴師傳渾渾有鍾太傅意使人愛而復敬之然又不如退之琴操使人敬而不便解跋尾仲蔚與家弟評此君書若訟而皆有訟理故兩存之十二跋云陳白陽復甫千字文屈原傳各一紙此君字不楷楷不易小而吾乃兼得之又陶靖節詩三十七首尤覺以拙勝十三跋云楊憲副夢羽法駕曲三章為故相夏文愍代筆耳老腕遒而少姿王考功祿之與其弟履吉尺牘精謹有法後有陳履常墓志銘及答同年伊侍御書皆稿草兼正行結法倣佛吳興陳方伯子兼三槐堂銘蠅頭體秀而少遜骨蜀中詩自云倣鍾太傅古雅而微乏韻陸尚寶子傳金剪行張烈婦二章全得麻姑壇法而以色澤傅之遂為一時書家冠詩調亦典麗雜文二章中多改竄而筆法亦清徑文博士夀承為余書五子篇五子者謝榛李攀龍徐中行梁有譽宗臣併余六也為篇凡二十有五壽承此書最為圓熟豐妍十四跋云文休承學正為余書沈宋蘇杜諸君七言律二十二首是七十九歲筆而精謹雅麗逾于少年時又書嵇叔夜養生論及蘇子瞻續養生論清俊而微佻卞彭孔嘉山人書余廣五子詩及近體數首是古高麗繭能于率更內斟酌溫徑精澤光彩動人若晚途則一束枯草耳許元復太僕一紙老筆圓媺所書龎居士傳語尤可喜黃淳父居士前一古體永興之有鋒鍛者後十二詩是晚年筆差小退周光韜叔初出道復而此書醉鄉語酒德頌精嚴有古意程大倫子明全摹徴仲而鸚鵡鷦鷯兩賦風斯下矣十五跋云俞仲蔚為余書少陵七言律四十六首皆隋珠卞玉得柳誠懸度人經意又一紙書見贈古體八章稍加圓熟已上皆六十以後書又一紙近古體凡十四章尤精謹可愛周公瑕為余書王維李頎崔皓高適岑參七言律三十四首鄭嵎津陽門行一章皆精雅工緻又自作詩二十章字形稍大筆亦稍放紙有宋經箋蜀箋高麗繭皆余山房中舊藏勝于魚文側理多矣十六跋云徐奉化伯臣書黃庭內景經一紙時吐鍾意初為飛鳧人加染古色雜識舊印以希重價余一見而辨以示其子文果泣曰先子得意筆也又黃彪遺我參同契用趙吳興贋識客多以為吳興也割去之留于此冊蓋重其文也伯臣筆生然久看逾雅彪甚熟然久看逾俗此書所以重乎人品也十七跋云顧德育牡丹一賦結法酷似徴仲惟老密處有别耳袁提學魯望七言近體十五首辭與筆皆流利而乏古意王逢年舜華詩十三首政如吳中子弟輕俊而不受繩墨書亦如之張伯起書李供奉絶句五十二首又李杜高岑律體十一首雖天趣小渴而規度森然毛豹孫書王江陵絶句二十六首亦自楚楚十八跋云王學士錫爵書郭景純遊仙詩七首筆法秀穎依稀有翡翠蘭苕狀家弟提學懋書周詩不能盡合大雅而老健足風骨莫太學雲卿書中唐律錢左司七首劉隨州九首韋蘇州三首皇甫兄弟四首郎士元二首韓君平四首盧綸員外二首司空圖侍郎張元真子各一首清麗有態殊足與詩句雁行其自作近體瞪乎不倫矣王太學稚登書王右丞七絶十九首書不能稱詩其書所自造七言律草三首雅相當矣十九跋云王太學衡書司馬長卿大人賦王好仙道故筆意翩翩近之又陳思王五言古體張茂才元舉陳山人爾見各得十六首又謝康樂十章則徐太學益孫筆也少陵歌行為文茂才肇祉書者十三首二十跋云此冊皆杜少陵七言歌行陸士仁得十四章文從先得十一章顧紹辰得十四章錢允治得十九章皆近時名筆端雅有致陸當擅場佻側寡情顧風斯下矣二十一跋云楷筆得吾州王應寶吳郡章藻仲玉因乞王書盛唐歌行李嶠宋之問郭元振各一章張謂崔皓各二章王維李頎岑參各三章高適四章章書李白十六章後有餘簡會張元凱子豫見過書近作十七首二十二跋云唐人絶句婁孟堅得王勃以下七十二首徐奉禮兆曦得朱慶餘以下三十二首沈昌期得賀知章以下四十八首周茂才子先得杜甫十六首緣不相知檢故小有重者偶後有餘紙而康太學時萬尤山人道恆過此因戲令康書坡仙酒經一則尤書異域數事俱足鼓吹幽閒者二十三跋云莊子逍遙遊王履吉之從孫愼修書也書與文殊不相當華茂才之方書連昌宮詞琵琶行精密可愛吾從子士駰寫駱賓王歌行頗有致僧大林書所作平倭行一紙僧明因書顧歡袁粲明僧紹孟景翼張融酬往釋道優劣事見南史明因與余善是方袍中之粗有意者金用元賓婦書履吉白雀詩凡三十二首元賓為履吉上足故書法亦因之綿麗多態而閨􅀈之氣未除昔賢紀六朝唐詩俱以僧及婦子殿尾吾故仍之二十四跋云此册皆石刻宋仲溫書七姬瘞志烺烺人目高季迪詞與楊用修跋得其情矣祝希哲王文恪墓志精整端嚴剛柔克濟毛夫人志銘運筆差圓形差匾書家最上乘也陸翁墓碣字稍大而最古元常之典刑矣二君子書為我明第一而此又其手勒石者不妨用此例存之也此即前十册復以續所得增入重裝者內高季迪一紙真是奇跡此公詩當為國朝第一人無但吳中今筆法又近仲溫良可賞也吾意季迪墨跡不當雜之此中宜與獻吉仲默君采昌榖等列為一帙間窗把玩足可當華林園遊緣此諸公於八法亦微有窺又加之以高妙之詩詞兼此二奇自是藝林墨寶非高崇文比也祝文諸名家不待言其十三卷以後則大約司寇同時諸人書皆翩翩一時之秀其書亦余所習見其十九卷以後則又邇來少年書內惟陸士仁者曾見一碑刻餘皆未見然俱當方進之勢未見其止後來成家不知屬誰氏耳題豐存禮詩後王氏跋一豐存禮傲睨一世而傾倒嘉則乃爾信乎為才服也計其書時當已病辟痱無一筆不顫而猶有山陰典刑詩雖不能整栗而命旨綢繆宛然建安遺韻也昔裴成公病劇回盼一語猶能使夷甫心折今得無類是乎司寇夙昔殊不滿存禮前附名賢內一紙猶謂宜汰削秪以附學士公後今此跋乃極口贊頌山陰建安既是第一流評語至謂無一筆不顫以比于裴令之病劇回盼則尤是傾倒心賞與平日持論頓異以此觀之可見公服善且處心甚平曩昔刺譏之言乃是隨吳人短長取唇吻間流快耳豐存禮手札王氏跋三一跋云其論書稍推文太史祝京兆次則陸詹事而于馬一龍沈愷王逢元陳鶴楊珂沈仕皆痛詆醜擬不遺餘力二沈不聞有臨池名乃亦置喙何也其評沈仕謂如夏四倚主夏四何如人當是一貴家僕豐或曾見侮耳人言此君憨定不虛也然行筆最遒徑結搆亦密比之生平書最為合作留此以備一家沈青門仕其書亦學二王以入行卷中侑其畫及詩亦自稱苐未成家耳夏四乃文愍公幹僕一時氣焰甚張曾闌入司封署雷司空時為正郎朴之一十以此謫外名亦以此大起此等僕時時有之存禮作此評時應是貴溪當國時也存禮書學極深顧所書乃有絶不佳者殆不可曉然尺牘類多工此跋謂比之生平最為合作以此知司寇平日所見豐蹟或是偶不佳者又或係贋筆狂草等耳章藻摹琅琊法書墨蹟十卷王氏跋十一跋云右章生摹晉右將軍會稽內史逸少正書凡十幀為法書之第一卷內臨鍾太傅力命宣示二帖皆宋搨祕府佳本按宣示為丞相始興公寶愛以授右軍右軍以授王修修死從殉遂不傳傳者乃右軍别臨本此必渡江後購之人間而手摹之者雖其軟美膚緻得之思陵居多而不無山隂隆準且又修內司致佳本弗忍去也外景樂毅俱有完本不完本三復之餘覺不完者差勝二書見駁通人至有以為吳通微王著筆者此中尚可容虞褚數人不知通微輩能辦之否苐欲以為貞觀內府及鍾紹京家藏則未敢必也曹娥碑憔悴宛篤東方朔贊遒逸瀟灑楊用修云霜寒其右軍之懿乎不能多行而意自舒綽有餘告墓文以乏佳本故所摹覺圉圉國史異纂云真本具年月日者江寧瓦官寺鴟吻內藏物歸之岐王不久而火失之世所傳者藁本不具年月日者耳此本乃有年月豈岐王未火之先有勒石耶二跋云右摹王右軍雜正行體為法書之第二卷內臨鍾成侯墓田帖凡五行蘭亭三序其一定武損本一唐板本一褚摹真跡本皆余所珍祕者板本字稍粗行亦高闊而饒波發翩翩風流與聖教相出入褚摹本後有米元章跋與書所載正合長風帖在淳化成侯跡中獨黃長睿以右軍年少未變鍾體目之甚當它若玉潤來禽何如極寒奉橘鯉魚雪晴轉差蘄茶受鵝石脾小祥增哀轗軻十四帖皆灼然者長睿謂毒熱為唐文皇所臨元章謂頭眩為虞永興别跡雖似各有據然永和祀遠鮮有不出唐人硬黃者奈何獨齗齗此一則也僧懷仁集聖教序記及心經雖不無偏傍輳合或不必盡本筆而字體行模精整雅潔遂為法書之冠臨池者至今利賴之三跋云右摹行草為法書之第三卷破羌成都清晏此郡山川講堂都邑九日七十雪候𢎞逺知念言叙若耶晚可安善道意時事兒女諸從昨見譙周餞行參朝明府草七謝生中郎女虞安吉宅圖東旋清和遷轉草八噉麵積雪足下秋月狼毒西問又西問自愛安西得告小大佳向久委頓六月還里信云知君腳中深慰日午小園龍保臨書凡五十六帖內破羌一帖是米家船至寶最為神妙真足壓卷而它書多出貞觀內府琅琅有名之筆黃長睿置喙亦少第謂餞行一幀乃賈曾送張說文蓋唐人集右軍書為之而此則其殘缺者又謂深慰為文皇所臨與第二卷毒熱同餞行書法實神妙昨見君亦集成然亦用此例小園子一帖元章强排作大令謂其小縱耳抑何待右軍之狹也此郡逋弊元章以為豫王懷祖者而長睿駁之事理誠然當是與謝安石安石在右軍治交甚篤晚可真蹟在余所僅影響耳四跋云右摹右軍行草為法書之第四卷知問諸賢官奴採菊服食後服食十七日逸民裹鮓卭竹後卭竹擇藥月末帳民豹奴敬問飛白又後飛白丹陽太常熱日朱處仁鹽井胡桃龍保黃甘六日胡母豉酒虞義興筆精司州嘗新麥秋袁生來居還鎮得見敬和七日隔日近日五日謝光祿徂暑月半敬豫長風謝生十一月皇象遠婦君晚嘉興奉停凡五十六帖淳化閣帖敕字十七帖與臨江石本相間錯皆烜赫著聲者官奴乾絲鬱勃有飛白勢虞義興得見三札芒穎射人豹奴獨擅章法遂為行書辨鐘部一證裹鮓袁生真跡余曾於朱太保處見之或云是唐臨耳五跋云右摹右軍行草為法書之第五卷散勢昨得連不快小佳反側月半草二草三虞休建安一日侍中敬豫清和追尋臨川小大太常鄉里可耳母子草三帖皆得之淳化及臨川者內元章以一日一起歸之伯高追尋歸之大令長睿皆不謂然山陰二帖是石泉公進御者鋒勢遒鬱徑利不可言省書罔極想佳東比不得眠各可諸患大多患十四日熱甚出都敬問諸賢江生西中郎勿殺生末春四月有理北軍雨晴遠近草三帖從祕閣續帖中録出者吳興大周嫂夜來公孫得書政履六帖從宋搨雜帖中録出者尤崛奇出人意表內末春全是章法與豹奴類它若淡悶干嘔及此月二帖在余所二謝書一帖于江右人家見之然皆唐臨本也六跋云右摹右軍疑跡為法書之第六卷如正行筆陳圖二帖皆出自江東李王所正書瘦徑與歐陽率更並驅幾不可辨行筆尤自豪爽宋人俱不以為的獨米元章紀之云紙緊薄如金葉索索有聲趙竦得之於一道人章惇借去不歸大抵非李王所自辦可證也張懷瓘列嵇叔夜于上上品之第二云吾嘗有叔夜草絶交書一紙非常寶惜有人以右軍二紙請之吾弗與易也此卷後有湘東所進絶交書晉右軍云云而祕閣續帖則直定之曰李懷琳他若適得書知欲東差凉奉對屏風奄至此穆松先靈柩慈顔噉豆初月蔡家平康闊别足下時事集期旋洛荀侯小大佳闊轉從阮公月末蒸溫白耳諸帖皆從淳化搨出而元章長睿俱掊以贋本理似有據故别為一本七跋云右摹晉中書令獻之字子敬書上卷為法書之第七卷多行正體內小楷洛神一紙又不完本十三行一紙考趙吳興孟俯謂得之陳集賢所十三行僅二百五十字係晉麻紙為天下法書冠又謂宣和書譜所藏未有柳公權跋語係唐硬黃紙臨本白騎遂本在鍾部考之唐開元中滑臺人家應募進御者乃大令所臨而誤屬之鍾為改正置此九日帖見石泉公寶章集辭中令呈結法極似李北海當北海從此中一𣲖流出耶乞假一表與霜寒並美高出辭令此後有相過右使節過思戀不審又思戀及夏節操之衛軍靜息夏日後思戀天寶十一日昨遂腎氣仲宗黃門外甥冠軍可必諸舍阿姑承舍月終東家後操之復不審嫂等鄱陽鵝羣敬祖凡三十二帖風神燁然逼乃公奈何髭聖辱之枯枿飢隸耶敬祖鄱陽重見閣帖第五卷而長睿謂敬祖為承祖子武岡侯協字不相及協右軍之從祖昆也以歸右軍乃當而筆小不類鵝羣風骨氣概極為蘇黃諸賢所推而長睿以險遠斥之又舉帖辭崇虛劉道士語謂山陰崇虛館乃宋明帝泰始時造後大令六十年固也崇虛既是觀宇佳名何必山陰又何必至泰始哉八跋云右摹中書令子敬書下卷為法書之第八卷皆行草內諸舍諸女授衣奉别想彼承姑願餘滅書阮新婦奉對得書兩元度慕容前者鬱鬱桓江州疾不退來恆省前書鐵石後鐵石元度忽動新婦鴨頭九阿姨斁奴後鄱陽不審極熱冠軍服油轉折還此西門日寒追痛疾來知汝不數都與彼人孫權等諸帖最雄俊奇崛有致而黃米諸賢往往加喙按宋自元嘉以後有戲學部此必一時諸賢或取大令父子語或集其書作之不必至旭素也九跋云右摹法書之第九卷內平南將軍武陵康侯􅛫字世將五紙㑹稽內史贈衛將軍薈字敬文四紙開府儀同三司贈司空簡穆公僧䖍贈太常懿公慈字伯寶各三紙揚州刺史華容文昭公𢎞字休元二紙右軍諸子自大令外豫章太守操之得二紙又有中軍將軍循及渙之等各一紙史稱右軍七子知名者五人元之凝之操之徽之獻之而不及渙之黃長睿則謂渙之為右軍子而云凝之得其韻操之得其體徽之得其勢渙之得其貌獻之得其源長睿博精不减倉曹此當有的據可補史傳之漏長睿服膺則在平南簡穆正書啓事而頗以劭廞三帖為贋豈所重在方雅而詘圓熟耶十跋云右摹智永真草千文為法書之第十卷永則右軍將軍之裔孫也於陳永興寺披染正行章草俱入張懷瓘妙品師嘗手書正草千字文八百本散諸江東諸寺此八百本中之一也後一紙閣帖誤收右軍部中今改正于此摹古帖亦是可喜物第從真跡上摹出乃可貴若止席影響於殘碑間恐終是戲筆耳摹蘇長公真蹟王氏跋一昨年悉取諸名賢文詞稗官諧史小有關于世者即筆之總得十二卷而家所藏公墨蹟石刻小楷藁行草聖之類為詩文巵語幾百番兒輩欲分得之而客有徐長孺章仲玉及吾從子駰素善公結法因名響搨大小彚為七帙藏之山房內煎茶聽琴四詠歸去來辭及跋王晉卿山水歌祭黃幾道文謝送梅花詩與久上人帖則皆于真跡搨出者以故幾若趙郎之見貌周昉併其性情得之昔之人評公書者曰墨豬曰畫字曰跋偃曰腕著筆臥舉不足以纍公舍此則所謂吃井水地無不寶愛公遺翰而余最心與者二評王履道云不矜而妍不束而嚴不軼而豪蕭散容與霏霏如初秋之霖森疏掩抑熠熠如從月之星紆餘宛轉纚纚如縈繭之絲黃魯直云東坡道人少日學蘭亭故其書姿媚如李北海至酒酣放浪意忘工拙字特瘦徑似柳誠懸中歲喜學顔魯公楊風子至于筆圓而韻勝挾以文章妙天下忠義貫日月之氣本朝善書自當推公第一二評誠為知言然公故非當家政自以品勝耳或又曰否否李丞相鍾太傅生身刀筆中來閭井之儈魁耳不中與㑹稽吳興作奴而何以鼎峙萬古也余無以應退而志于尾此所摹多真跡故應可觀蘇書在文人中信足稱雄謂以文而重公或未甘若云挾以文章忠義為宋朝善書者第一當非誣也李丞相鍾太傅能使秦皇魏武傾心應非凡品雖瑕疵莫掩然要之長處多若使王氏父子居其上恐二君未能自安此乃宋人評品今世乏真才正坐此等評隲多耳敬美書雜帖王氏跋一吾家右軍分甘青李二札右丞􅀈川一疏能于蕭散中作情景俊語蘇長公種橘帖亦庶幾焉仲氏敬美以黃庭小法書之時出入洛神覽之不待畢覺王著鮮於樞佐史矣右軍帖右丞疏果多俊語今刻尺牘清裁中亦俱係敬美書獨子瞻種橘帖未之見檢之集中亦不得不知作何語吳賢墨跡王氏跋一家馭提學出吳中諸名公墨跡凡十一幀內希哲書昌榖詩英英竝秀如兩玉樹皎然風塵外物徴仲抵掌玉局蓮花乃似六郎矣伯虎脫盡平生後一札筆意大似周越而詩不稱苐與夢晉俱不失狂奴態家馭此卷後乃以遺余希哲書雖秀媚出塵然是少年書尚未蒼古昌榖送仇東之二絶句即前司寇公託元馭相公臨出者書儘秀徑端密苐非當行耳徴仲效蘇體肉不勝骨未足當張光祿之譽伯虎三絶句果似周越是此公佳筆也余赴山東時遇驟雨此卷為水濕今已重裝王稚欽書五言律詩王氏跋一天下以才子歸稚欽先生謂若大紳子啓之傾寫不倦則誤矣搆結煆琢極有工夫一句一字亦皆有色澤此卷皆五言律尤是長城書法故不必成就而翩翩自賞宛有徴仲中年以前筆先生信奇人哉稚欽案上惟置文選一部隨人揭問輒暗誦無錯者謂搆結煆琢極有工夫然哉其書亦自當附季迪昌榖諸君後朝鮮三咨王氏跋一余所得朝鮮國凡三咨合為一卷其一𢎞治八年咨遼東都指揮使司護送賀東宮千秋節者其二嘉靖四十一年咨禮部進賀萬壽儀者其三則萬歷十一年咨禮部進獻慈聖皇太后儀者前後相去九十年更三王而楷筆謹細若一紙若玉墨若純漆硃色濃透而咨字行押似以牙刻刷而精為之潤色者其敬愼而能恆若此宜其享國之遠久也朝鮮書大都法趙絶善用墨真如純漆沈瑞伯謂是磨墨積硯上已乃用筆染水就墨中蘸起寫余曾效之不能似邇來惟莫廷韓善用墨趙松雪書大洞玉經王氏跋一趙文敏公書法妙古今海內爭效法之以故贋書百出信耳者多不能辨不知文敏書從二王李北海來而搆趙體今人從文敏書來而為今書那得遂無辨耶洞玉經是文敏合作傳于世多矣紛紛幾如聚訟而真蹟乃在參知王公所余一見驚歎不獨快其夙慕亦以自快隻眼先君有同年友周君諱感永嘉人富文學有氣節仕止縣令其子思友亦讀書善談論嘉靖戊午謁先君于金陵擕有松雪大洞玉經一卷出示余意若欲售者然且曰先人少學黃庭逼真晚獲此卷愛之更時時臨寫因指其標首趙松雪墨蹟五字云此即先人筆也又曰此原係一幅紙長可二丈餘因背者欲揭之壁無此高壁遂中裂斷甚可惜亦指示余傍有一友曰此價幾何周曰聞松雪在日每一字五分今經二百年宜更增但恐勢不能耳余時尚不甚知書但亦覺其勻淨可喜此經字甚多私計之價殊不資度不能償留十餘日還之近萬歷戊子管子安出法書數卷內趙書大洞玉經即向周氏卷也中裂跡宛然標首五字猶存蓋三十年矣感歎者久之玩其書覺穠媚有餘風骨未徑疑未是趙書去年壬寅復從子安子允功索觀之則愈覺骨力少料趙楷法不應止此今司寇為王陽德跋趙書此經謂右軍北海出入結搆中則當是松雪真跡無疑王亦永嘉人何松雪兩本皆落一邑中耶安得取置案上並校之書畫跋跋續卷一
