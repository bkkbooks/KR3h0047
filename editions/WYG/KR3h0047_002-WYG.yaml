body:
  text: 書畫跋跋卷二上明孫鑛撰碑刻淳化閣帖十跋第一卷王氏跋一吾意唐諸帝若髙若中不當辨菽麥髙既工八法中復能五言豈混沌一竅耶叔懐弟也不當先伯智漢章帝殘闕千文謂是集古章草如聖教序類良是字稍存體式殊乏古趣大約唐人所為字形大小正與石刻急就章相似疑即是集急就為之第未及字字細證對耳卷首想標曰漢章草因訛𫝊為章帝書亦不知誤自何人未必係王著妄署章草名當即由托始急就章耳張懷瓘謂章奏中用之亦一説其云呼史游草為章因伯英草而謂則是也長睿謂杜伯度善此書章帝稱之故後世目焉或未確東書堂遂改為杜操書尤無據晉武書元章定為孝武長睿據續帖中炎報帖筆法與同駁其誤余未見續帖不能懸斷然元章於李瑋家見武帝帖云字有篆籀氣象豈與此筆法異耶西晉無他宣帝即係仲達此則漢魏間書矣起稱之曰非宣帝名何縁𫝊為宣帝書宜在闕疑晉元後一帖及孝武札俱佳明拙康稚俱不佳安軍破堽數朝三書筆勢若一長睿指為偽作縁渠曽於秘館見有倣書一函蓄此疑在於胸中故動作無非竊鈇耳六朝革命雖多而時不甚相逺一時氣習亦多同無但帝王摹前軌即諸名士皆然即如詩歌使錯置之雖精鑒者恐未必能别鄭修容帖與破堽筆勢亦相似也唐文皇心手右軍其書允為帝中第一弔江叔叔藝韞二帖長睿辨為髙宗書於事既覈其筆法亦㣲不同如得大内書懷讓兩帖筆意清勁得右軍法的是文皇書使至一帖末署名是少年書㣲有未蒼勁處若比者昨日數帖字稍大者乃絶類虞永興米顛所謂學虞行書是也枇杷移營二帖長睿疑為髙宗想以筆弱故此則係揣摩似猶未確司冦公謂髙及中不當辨菽麥中宗誠然若髙宗則非特八法紹箕裘其政事亦有昭考遺風惟後為椒宫所制遂為人嗤笑耳中五言皆出婉兒手何嘗有一竅長睿謂宣帝子有叔慎無叔懷懷慎二字疑似應係摹誤謂宋明帖報休祐宋史休祐訛今帖中祐字甚明則當是餘論板刻誤耳第二卷王氏跋一此卷書多佳伯英知汝殊愁下三帖并第十卷大令桓江州下八帖米謂俱係伯髙黄則謂此係伯髙大令帖乃伯髙藏真等偽作然知汝及大令諸帖雖過縱肆却俱是晉人筆法秀媚有姿若長史則惟是蒼勁或兼有糺繞如今欲歸二月八日兩帖乃的是伯髙筆内憂字作長勢尤是髪濡真態伯英妙迹既絶此帖有祖希等語當併十卷八帖俱子敬書耳子敬幼學於父次習於張芝其逸氣超邁應得於伯英者多故書斷論伯英書謂惟子敬明其深指梁武及袁昻評伯英書云憑虚欲仙云驚竒今司冦公舉清澗縈洄龍獸騰攫等評謂此帖法具有之然此乃張懷瓘語懷瓘開元間人伯英書貞觀時已絶蹤懷何由見之亦是以夢證夢耳八月九日章草古勁中含逸趣或是晉人臨筆右軍臨宣示大令臨白騎皆有的據無容贅談長風帖為逸少書以札語得之亦是總之鍾六帖俱佳子玉賢女世將廿四日軟而近俗果偽筆皇象幽州箴古勁而虚和所謂恭而安真是神品後一表稍弱或臨或摹不可知然亦佳張王兩鉅公雖風稜髙利然構法稍疎以係晉人故落筆不塵耳元子亦然獨處仲素以豪上聞而結字乃沉著有法豈千人皆廢者類工嘔嘔耶世將二表精絶之至古而媚字字飛動是小變鍾法右軍所自出也敬和季琰安石俱行書妙品珣方回草書妙品書一涉魏晉詩一涉建安文一涉西京便是無塵世風此是藝文三昩評正可與蘇長公能事畢語作對第三卷王氏跋一此卷元章謂其多偽長睿亦然東觀餘論别有跋閣帖第三卷一條内稱備員秘館因彚次御府圖籍見一書函中盡此一手帖每卷題云倣書第若干此卷偽帖及他卷所有皆在焉其餘法帖中不載者甚多並以澄心堂紙寫葢南唐人取古人語自書之文真而字非故斯人自目為倣書非臨摹也此則已搜得真贜夫復何説然就中亦自有佳者如劉穆之羊欣兩帖風度固秀發山巨源啓事亦清古要之此諸偽帖俱猶有晉人遺意或即是李後主臨古帖亦未可知又王劭一帖多摹取二卷中王敬和洽頓首兩條内字㕘錯成文然則文何嘗真而字何嘗非又安得為一手書耶總是摹手未甚工耳庾氏在晉世濟忠義但才或未副司冦徒縁與始興相左故遂以亂天下大舅目之亦輕於持論矣二庾以古勝凝之兄弟俱有右軍遺範謂凝得其韻操得其體徽得其勢渙得其貌或未盡然索征西銀鉤超妙入神前一帖古勁謹密痕蹟莫窺後一帖稍縱然古意不失神采􅂱􅂱照人徐文長曰吾學索靖書久雖梗槩亦不得人並以章草視之不知章稍逸而近分索則精而倣篆非深於書學者無此解也簡穆兩啓匾古中含逸趣小楷之妙品比江郢帖更較饒醖籍璠伯莊兩謝坦之遂恬曇首四王及孔琳之黄米皆謂真果佳杜征南前一帖黄後跋及米俱謂是真刋誤徒以當時尺牘體疑之或未然第四卷王氏跋一元禮書有大令簡穆遺範休文不甚合繩墨而險勁自肆二公不著書名猶如此要之六代間人無一不能書也阮交州蕭征南兩條果即前卷偽蹟一手書司冦謂阮帖有激溜垂條飛泉奔流等勢造次未能解思話稍有大令法然不見所謂仙人嘯樹意子雲書有鍾法武帝最服膺元帝故亦重子雲此列子三章細玩亦儘有古媚趣其尾錐無力則是摹搨失真耳大凡摹搨真難於草小難於大此是小楷搨手大難著力其乏精采固宜陳逵前一帖佳薛八侍中當即是薛稷稷乃褚甥唐人稱謂多加尊一等故縣令稱明府縣尉稱少府薛想係門下省何官故以侍中呼之札中遷居要職擢任雄臺自是賀庶職語贊宰相不當如爾已也與家姪帖正一法何得妄分葭玉虞臨樂毅帖近俗想係偽山河帖集枯樹賦大運比年帖集碑刻前卷王劭一條正此類率更行草不佳當即只真書勝耳誠懸以真法為行亦有氣岸右軍帖有逸少白此以與弟稱字正得體前陳逵後一帖伯禮啓豈亦字耶李北海帖果與雲麾筆法同陸長史帖大有晉法長睿又謂其語不類唐陸既工於倣效多是臨晉帖耳第五卷王氏跋一倉頡書豈有𫝊至宋初者但觀此二十八字形勢似是所謂古文者唐元和中昌黎公曽得科斗孝經於李監家令賀跋恕寫此書或是𫝊寫古文好作贋古者因駕其名於蒼頡耳夏禹并吾夫子書亦俱有一二古文夫子書人𫝊是季札墓銘今惟有呉子之四字可識君字尚在疑似并餘七字俱須俟通篆者辨之大抵此等書俱出𫝊寫好事者以備古字形體非便謂真王著不以入第一二卷亦是𫝊疑意史籀書多係漢碑李丞相一章有斐君碑在無容復置辭矣程邈衛夫人的是偽宋儋書猶有齊梁間法古法帖似是臨二王書隋詔書已兆歐虞狹長妍媚意豈時代然耶抑二公在隋時書耶智果書亦祖鍾太傅但字小大真草間出不倫此何體耶豈即果創為之乎此梁武帝評已有薄紹之書王侍書不見耶何前卷摽作唐臣也何氏二帖果近歐然間有褚法是唐人學歐者耳未必歐筆也文姬書亦是唐人書胡笳曲語敬祖鄱陽重十卷大令帖而字㣲小是臨書耳孤不度兩段章草甚佳與十卷大令一章法同未定是何人書然非武侯筆長史謂史家潤色語良是素師書不類他帖或少年筆未可知真偽難辨移屋二章内有欣白字筆亦近大令米黄定為羊中散蹟當不謬然此筆勢甚勁快何嘗羞澁武帝評亦過抑矣第六卷王氏跋一自適得書至慰馳竦耳長睿謂除穆松秋中二帖餘皆偽作足稱具眼然内奄至此諸賢兩帖亦佳又省别具旦夕諸從得足下四帖同十七帖筆法皆勁密豈可謂偽作耶惟視十七帖風采稍遜後省足下云譙周兩帖亦然當是摹手不如唐耳米所駁偽帖大畧同而無此奄至等六帖較更入細獨疾不退一條重出十卷大令帖字形全同此豈嘗三字每字下各有一㸃亦皆同第字差小筆法畧異又潛損作潛處下無亦字何如下無云字然神氣覺彼勝此當是臨大令帖無疑乃米黄王三董狐皆不能辨出豈一時偶忽畧耶夫人蔡家二帖似亦佳不知米黄何為皆置駁賈曽送張説序集右軍書甚有態大抵摹搨出唐人自工濶别帖局促近俗米不駁而黄駁較黄為得連不快為永師一日一起為顛史追尋為大令元章何據長睿以吾老數語駁之良是廿日下三帖筆勢果可疑余謂卿與虞休條亦稍縱此皆㣲涉唐氣劉釋僕可耳定聴他母子是米作餘可定登非太常司州近因三帖俱佳袁生帖不如真賞齋佳第七卷王氏跋一皇象帖楊用修謂勿二非勿三也係石筆誤然此三字甚明恐是三思之三因促還皇象草故止之勿三耳此卷右軍蹟佳者多首兩帖甚淳古有韻得都下乃最有名札所謂右軍才畧以書掩者此類是也謝光禄下七帖俱淡古出塵初月下四帖畧涉俗無但語可疑劉釋作羲之皇恐皇字下乃是耳字難強作恐長睿作是耳釋亦未是十月七日昨見君係集成果然皇象一條字甚古勁勿三終是難通長睿謂不易可得過夏非當時語細味似是不易可得句過夏不甚憂又一句也若此七帖謂俱出依倣不無搜求太過太常帖肆筆中古色可挹承足下帖末有釋智永字米何乃注為子敬然仍非智水筆是唐人之下等者荀侯帖果可疑文皇臨二帖未有據小園子自動静下真似子敬書龍保下諸帖皆與十七帖同第八卷王氏跋一此卷帖多不甚著名而皆饒古色不甚悦俗眼當多是真帖似是藏民間後出者耳首章末罪字不分明或係摹搨誤運民帖内當慮叛三字俱有誤筆足下各如常特有竒態長睿謂唐人作殆不可曉一昨得安西與後一帖同而少九字訛一字此當是臨書也此蒸濕月半於大令果近阮公故爾帖太縱尊夫人帖力弱二公駁之甚是若濶轉適欲遣書二帖何縁亦有雌黄語元章定適欲遣為智永尤無據謝生帖已見前卷但少一下字不得執手手字中兩畫作波勢甚竒此郡帖内託字外臂是折釵股之法亦所未免免字今釋作忽亦恐是訛第九卷王氏跋一元章謂相過元度慕容前告並無名人偽帖薄冷益部並歐書然相過帖固佳長睿謂借匪獻之韻自可賞此評是慕容前告帖果俗元度帖似猶有姿態其稍覺㳫拖或摹搨失真耳薄冷寒儉近歐筆然陶隠居筆法亦類此益部復更疎逸二帖的非子敬或亦難定為歐也雖奉對帖雖真不佳廿九日帖長睿以昨遂不奉恨深為近世人語疑其偽然此帖見寳章集乃王方慶所藏豈偽耶以此知欲以札語斷真贋尤難也静息帖内外二字係旁註不宜填著行中甚是思戀轉不可言帖此卷兩見後條末闕二字不知二公何為不指出司冦謂黄持論勝米米以法黄以事差覈果然然米實在黄前黄所駁從米者多又更加證據何為不覈大都考據一種學問後出者多得以前人為之先驅耳此卷大令多行書風采煥發書斷云行草之間逸氣過父元章書史云天真超逸豈父可比書家尚姿態者多為左袒然其不及父處正在此所謂子貢賢於仲尼也第十卷王氏跋一桓江州下八帖司冦謂恐是大令創草良是第二卷已備論且此諸帖中凡少帶行法如胛痛官前甚急體恕等字全是大令風度顛史狂僧何嘗有此等筆也地黄湯帖唐摹本李伯玉曽于文夀承家見之云筆法真入神此刻帖亦得意筆并鴨頭丸不審阿姨兩帖俱佳承冠軍服油復面悲積還此得西問五帖不知米黄何據定為非真刻帖與真蹟不同摹手有工拙於此欲具淄澠古恐難東家帖筆態宛然二公無異説然極不妙之事一語甚俗恐晉人無此作何甄别鵞羣帖筆勢最蒼老然却是卧筆又險勁乏醖籍幾落顔魯公蘇長公窠臼余亦疑之第前地黄湯下三帖亦俱㣲帶此法沈瑞伯嘗謂余曰肥匾卧取勢此蘇體然寳章集内王僧䖍太子舍人四行形態絶相似可見古人體無所不有然則此怒狂勢又安知非子敬之龍爪書耶寺觀名前後重者多不必以宋明建崇虚館為證米謂鄱陽歸為羊欣無據五卷内重此帖乃又註云子敬可見亦祗是鑿空臆度耳淳化閣帖後王氏跋一今人類多稱淳化閣帖不知往時惟兩府拜日方被此賜元祐中親賢宅諸王僅搨百本遺人然雅已不逮至靖康朝即無論潭絳泉汝大觀戲魚舊蹟亦自不知矣包㕘軍此帖雖木本然紙墨古色隠隠指睫間而波磔督䇿之際無毫髮遺憾惟第五卷闕智果何氏等十一帖今泉石亦少此而宋刻烏鎮福清三山殿司皆棗木又云有脱落是未可知也跋稱舊蹟難得且引泉石殘闕及宋刻四木本脱落為説則包㕘軍此帖非閣本明甚所云古色隠隠指睫間固是權辭第不宜輕下毫髪無遺憾一語耳李鴻臚淳化殘帖王氏跋一余嘗謂閣帖雖係帖祖然本不佳何者凡摹搨自有别𫝊非能書者即能兼之王侍書祗畧知書其於鉤法尤草草但前此未有法帖陡爾摹出凡人所企慕名蹟俱在内其形體亦畧具又中草字稍大者或㣲得筆意安得不使人艷慕然魏晉來筆法決不止此今此卷帖賞鑒家皆謂是澄心紙廷珪墨無銀錠紋真初搨賜兩府本鴻臚兄伯玉銀臺云文夀承每過必索出摩挲移時其愛慕如此余過伯玉亦時時展之然細玩殊無運筆勢無但逺讓唐碑視邇來真賞齋帖猶似不及假使真蹟尚在使文氏父子及章簡甫輩為之決當勝也然則購閣帖者但取其是宋初物又魏晉構法彷彿猶存備一種古玩良足自快必欲由此究古人筆法末矣果羮牆右軍尚當於宋搨聖教序求之大觀太清樓帖王氏跋一大觀太清樓帖徽宗時以閣帖燬於火復取真蹟摹勒上石而益以秘閣續刻及貞觀十七帖孫過庭書譜總二千二卷甲戌秋八月余以俸緡四十五千得之長安市乃故太傅朱忠僖家藏物然僅卷之二四五八十耳明年復以十六千得第七卷為右軍書於呉中而缺首數行其他卷及續刻尚杳然也搨法精甚字畫稍肥而鋒勢飛動神采射人若淳化之親賢二王府帖紹興太學淳熙修内皆出其下云此帖不知何人所摹或蔡京或劉燾難以臆斷然却有筆意絶勝閣帖大抵徽宗於書學深其句當諸人皆過王著也余曽在李伯玉家見第二卷神采動人無一帖不佳近在楊太素給諫家又見數卷亦皆妙得筆勢良由摹手髙故以李鴻臚殘閣帖方之蔑矣獨唐元卿家有數卷是蟬翼搨却肥而少神氣豈搨手未工耶抑係重摹本乎丹陽孫志新曽託文休承章簡甫輩摹刻第二卷今石在崑山張銀臺家雖不及伯玉原本然比顧氏所摹閣帖固逺勝也司冦與豫章王孫貞吉書中所云𢎞治間丹陽孫氏刻太清樓蹟一帖即此絳帖王氏跋一此帖呉中黄勉之以十二千得之於市人割去卷尾却以泉帖淳化裝後勉之子淳父始辨其為絳帖仍割去尾裝而屬文夀承籖題其首後得五十千質之華禮部叔陽踰三歲復得三十千始真為華氏物而叔陽病甚寄余鄖中為别按絳帖凡十二卷其首卷倉頡夏禹至秦漢人而止今頗與之合而二卷帝王自章帝以至於唐髙宗五卷自梁王筠以至薄紹之皆缺右軍蹟亦失三之一其治頭眩方據東觀餘論知其為絳帖也昔人謂絳帖係潘師旦手自摹刻骨法清勁足正王著肉勝之失然潘未見真蹟祗從閣帖上摹出安得反勝原帖正如寫像者不見本人但從遺像中體出即使神采果勝乃去真愈逺耳凡字加瘦則多韻加肥則饒姿俱非本色要使并醜拙意鉤出斯得其神者也此帖為真絳與否不可知然真絳帖余曽見之固不甚佳汝帖王氏跋一王宷輔道守汝州因徧搜諸碑帖篆分𨽻草而節取之自皇頡夏禹以至錢忠懿郭忠恕得十二卷其所留淳化亦不過十之一二昔人謂為黄長睿所掊擊不直一錢噫令無長睿亦能與潭絳争價耶此石今尚在亦間有一二可觀者但其意以搜僻見竒割裂逞博或不無作偽意長睿所駁皆覈彼地搨手甚拙尤損神采若使呉中人用竹聯紙搨之或亦可備一種東書堂帖王氏跋一憲王不喜宋人書亦是偏處此帖無蘇黄米蔡蹟但有元人鮮于趙諸帖耳細玩亦未是摹筆祗縁鉤法未工故骨不勝肉石理亦似粗寳賢堂帖王氏跋一寳賢堂自晉靖王為世子時刻石於行欵次第頗不俗第石理既粗而摹刻搨三手俱不稱孝廟時嘗進御親為手書褒美之余舊曽購一本問楚中友人云是重摹絳帖及後獲見真絳帖殊不同此帖行欵髙正與太清樓帖相似疑即是摹太清樓然不及逺甚惟蘇黄米諸帖稍可觀想係真蹟上摹出耳真賞齋帖王氏跋一章簡甫乃邇來刻石第一手尤精於摹搨聞為華東沙刻此帖時既填朱登石乃更取原帖置面前玩取形勢刻成後再較對有毫髪不似必為正之葢刻石而又兼手臨者以故備得筆意内惟季直表係小楷亦尚未得逼真若袁生及唐摹王相家帖筆勢飛動真所謂周昉貌趙郎并得其情性者止下唐時書丹刻一等淳化太清俱不及也右軍袁生大令廿九日閣帖固俱有何能及此華亭顧氏摹閣帖其袁生一札就此體出便覺神采增數倍今人欲研精晉法此帖須日置案上第聞此石倭亂時燬於火然其初本不甚難購其華氏有搨佳本更有朱色華夏私印印在首幅呉中好事家多有之岳倦翁跋最核然内竇臮作竇泉燕涎作燕涏不知原誤書或摹搨時意改季直表後司冦公購得寳章帖項子長少㕘購得獨袁生帖未聞所歸廬山陳氏甲秀堂帖王氏跋一此帖規模大約與汝帖相近總是有意搜竒僻非真為字也跋謂惟蘇黄米諸尺牘可觀良然文氏停雲館帖十卷第一卷王氏跋一跋謂所摹二王小楷俱不離文氏故步良是葢字真而小摹手無所著力即游絲筆亦猶粗若純付之鉤填恐失真處或不美觀不得不稍以巳意潤之耳唐諸小楷亦俱不及原碑以原刻係書石故猶不甚失真余家有麻姑碑係正徳間搨者猶勝此内陰符真書最為小然却猶存拙意細玩頗有古趣豈搨手一時合作耶此原刻今不知在何處司冦公奈何亦未購得想其妙決不在郎官壁記下第二卷王氏跋一唐人雙鉤王方慶所進真蹟後有岳珂張雨沈周王鏊文徴明跋寳章集諸帖俱不及真賞齋李懷琳絶交書墨本在安福張氏余與張尚寳程同官禮部曽索觀張已許竟因循未果至今恨之後湘東兩行末右軍字乃是殘闕不了之語或是右軍嘗稱之或舉右軍别帖皆不可知徴仲據此疑為摹右軍書恐未然右軍書八面具法所以神此乃一筆書何得謂類右軍看其率意肆書正是潦倒粗疎態耳天監行下雲字當是蕭子雲可見古人押法第三卷王氏跋一顔魯公祭姪季明文稿昔人謂與坐位帖同法信然然此幅更覺饒態王家馭稱為妙極據徴仲跋聶文蔚出示則是江右聶貞襄司馬乃都元敬寓意編又稱海鹽張黄門静之藏此帖豈由張轉入聶耶抑别有摹本耶余壬午冬在考功有賈人持墨本來索二十千細玩亦是臨本而筆意飛動宛然壁折屋漏蹟内塗抹處一如草稿様畧無强作痕石本末尾饗字筆稍縱幾不似本字而渠本居然是饗字形及與石本對又畧無少異可見草書使轉之妙中間率意處神采奕奕難以盡述猶記穀字城字遘殘震悼等字俱是一筆揮成而畫畫安置得所蒼勁中含媚絶有勢末兩行亦無些苟簡意余絶愛之疑即是徴仲所臨其裝潢甚草草但一幅紙耳無二陳跋有三元人跋俱不佳詰之云陳跋割入他卷余許之十千尚欲増未定因留之案上數日時大計事冗渠來索金適倉卒無以應之姑還之及大計畢問之則已屬殷金吾矣金吾司徒公長嗣也即與二十千余深悔不早與價至今切切朱巨川告身喬跋謂見唐代典故之式良是第不落魯公姓字筆法又不甚似不知何縁𫝊為魯公終屬可疑林緯乾以紛披見態然尚恨無古法又筆勢亦不甚蒼古人書如此者恐尚多未為佳帖也右軍平安帖余在京時嘗過王敬美適飛鳬人以此帖來售尚未成因出示余云是朱忠僖家物索六十千前細書晉右將軍㑹稽内史王羲之平安帖十四字小幅紙原係卷頭簽識今亦背在帖旁敬美指示余云此宋思陵親筆王帖係縑素背處亦㣲浮起墨甚濃乍看若趙呉興豐人翁謂趙筆法入右軍室良然不誣字形與此刻相似而筆圓墨浄其使轉之妙亦非石所能𫝊然却有不到處率意處不若石之完善末一定字絶有勢此刻原不及也情字下闕一㸃絹復完好敬美與余相持莫能定敬美疑米臨余時未能斷既而思之此或唐人臨古人不欺人原帖想紙損因缺㸃臨者不敢益故缺若米臨決當補一㸃矣未知是否今司冦集中無此帖跋奉常集中亦無之應是疑其臨本還之耳然則帖固佳不當惜價不買也素師小草千文果平淡古雅然似不若陜刻之竒逸超絶今休承贊歎如此且云姚公闕後經數家無人賞識則想是骨勝饒醖籍此刻石祗𫝊其形質耳楊少師起居法無但紛披老筆亦儘有天趣第效之者須師其意若形體恐難步趨荆公書祗紛彼近似耳殊無此遒逸態也徴仲評商留諸人跋詳覈如此謂之熟元人履厯果然哉第四卷王氏跋一李西臺建中是規矩中字然無一種出塵意山谷評謂如講僧㕘禪最當正獻文忠皆鉅公中稍知書者原非當行無容深求杜草似勝歐真然歐公登二府後始學書晩尤篤此札云忽有伊命則是方權開封尹時尚未留意此道也潞公有姿態荆公書未工然亦非不能書者忠惠二紙未盡所長後一帖殊不圉圉媚姿秀骨宋人無兩末三行已是縱筆第公書却是有意勝無意蘇黄亦皆非得意筆蘇前一帖豪蕩自肆精采射人然似為雞毛筆所掣不甚圓浄後一帖力稍弱云江淮不熟當是守徐日書耳黄行書具四面法轉筆甚有態有顔魯公坐位帖意真書亦以態勝然稍覺未整密文定亦得乃兄法何得云但存故事米南宫書據虎兒跋云九帖然實止七帖想為人割去二帖也運筆以輕速取態然未嘗無骨風韻畧似孫過庭第是行家非利家使付之不知書人恐未有贊其佳者梅惇一札稍大覺更暢此真蹟徴仲既臨得之應在呉司冦何為未購得第五卷王氏跋一蘇才翁草法大有筆宜其名噪一時第尚不及君謨之秀而匀耳内稱李西臺不受三司判官即日拂衣復展前一札頓覺清風襲人又稱李中丞治杭市白集一部嘗以為恨佳事佳話堪置座右滄浪不失箕裘第筆力較軟覺不稱名豈此札偶出匆匆或摹手少劣耶舜欽二字大難識因此見古人署名大約類押字别作構法也邇來俞允文莫是龍亦類此温公馮相文正父子遺蹟如甘棠良是然范二公較優文正尤秀發忠宣全步趨乃翁㣲未密耳穆父方回少游參寥澤民端叔皆蘇黄同時從事翰墨間者書雖未盡工皆有可觀前與可一跋亦然覺少游獨勝少游未識東坡時嘗效坡書題壁間此帖却又㣲帶米法洞天清録稱其小楷逼鍾王今不知尚有存者否惜未得覩之林君復瘦金行草甚勁媚有態絶耐細玩凡書痩最難非筆法精熟不能跋乃訝其不稱名何也陳簡齋詩勝於書蘭亭石刻甚多不得薛臨真本無由見工拙據此刻頗覺力弱李元中圓熟有餘小楷勾填上石去真逺矣第六卷王氏跋一跋謂范文穆南宋人誤置前卷王定國錢穆父賀方回陳簡齋元祐政和間人誤置此卷今已經改正惟定國尚在此卷豈與少藴同一石不可拆耶米敷文雖乏扛鼎力自是書家定國務觀少藴致能子蒼俱有筆意其書亦俱有來厯少藴頗豪縱其草偃勢畧似絶交書乃司冦公獨以不佳評之恐未輸服定國近蘇致能近米子蒼有坐位帖遺意二張俱負書名于湖稍古雅樗寮果是惡札派然亦有骨力晦翁素留意書學此帖亦淳古㣲有坐位帖法但形不似耳姜白石書譜持論甚髙此書乃祗是書生面目不稱所論第七卷王氏跋一鄧文肅結體乃有似徴仲處殆不可曉伯機良近米當為壓卷必仁亦有態掲陳三小楷魯衞果也康里亦有米法周景達即子昻蘭亭跋中濟州驛亭相遇者其人想學趙但筆力稍弱耳王家馭雅工筆札余在禮曹時嘗歎賞之沈瑞伯曰此乃全是停雲帖中得來者葢停雲帖多自真蹟上摹出其人雖未必是専門然筆意宛然效之則筆不騃寫來自勁有勢今觀前卷及此卷諸公書法雖未工然却俱有筆比之閣帖覺易得師二王等固是千古準的但規格既峻又以板力代毫力妙處既不能得復拘拘必以圓渾間求之愈不似矣瑞伯固是解書語倪雲林清有餘第覺穉無力徐文長獨極稱之謂其從𨽻入輒在季直表中奪舍投胎古而媚密而散豈鑑以天機耶然第一卷中黄庭跋猶佳於文長所許猶近似第八卷王氏跋一俱趙文敏書文敏素工尺牘此與中峯和尚諸札圓熟多媚姿然骨力恨少未為上乗小楷亦祗是文敏本色去黄庭洛神尚逺司冦遽引儀鳯祥雲五百年一萬里語贊之似過第九卷王氏跋一宋學士居卷首當即是壓卷舍人雖小縱然淳古不及也詹孟舉南郡諸署書俱佳此小楷祗是穏熟是二沈所自出温頗雜有俗氣邪氣司冦何為亟許之解大紳豪氣滿紙然未脱俗禎期勁肆嗣仲珩開南安二沈以楷法貴顯然行書却勝武功法不勝意馬刑部何人豈元敬寓意編中所云馬主事抑之藏顔坐位帖者耶書不狂是力未至耳李太僕未能去邪去俗亦是詹宋二沈派何縁髙自許張南安徑四五寸草書有絶佳者去其狂而可矣此小行未展厥技何反謂以小故佳末尾章草三行似亦不讓仲温第十卷王氏跋一書述一篇京兆評國初至𢎞正名筆差許仲温民則而惡汝弼其所揚扢皆當味其㣲托固欲與呉興狎主齊盟矣書法倣章草不能造幽亦自不俗枝山十九首人多稱之余猶嫌其是一筆書且多匆促率爾意未是此翁得意筆也敬美謂此詩草法從懷琳絶交書中出看其風行草偃勢果類之書述章草非本色然却稍有姿其所評今人諸書未得盡見未敢隨聲附和停雲初本十卷止此今増入孫過庭書譜為第三卷又續以徴仲臨黄庭經及西苑十律為末卷共十二卷衡山禹碑王氏跋一此碑余曽見兩本然皆非舊刻其銘辭及篆法俱大類石鼓文舜稱禹汝惟不矜必不樹石自頌或佐禹者伯益之徒為之則未可知文詞難懸斷使有虞賡歌及五子之歌不列於經人亦未必無疑南楚好辭倚相輩不難作此但古人無此贋法水土平已乆復爾頌禹亦似無謂後跋謂不敢遽謂為秦以後最是𫝊疑定論第虞夏書皆科斗古文即漢人得之亦多不能讀今此篆形雖間有難識却去大小篆不逺恐非虞夏所遺豈文撰自禹時舊碑已亡周末時復以籀篆重勒耶安得夢魚首黄衣及長人挈古瓶者一詳叩之岐陽石鼓文王氏跋一小雅辭史籀篆或成或宣不可知然斷為姬周遺蹟無疑也孔子刪詩乃據在樂官者此詩或未入樂官不必輕置喙刻文細而淺正是有意為巧欲得妙手精搨乃不失真耳漢印有刻甚淺者亦是此意此石今雖在太學然已磨滅不可識若得宋搨本存之允為至寳嶧山碑王氏跋一昔賢評徐散騎有字學而書法不能工今所橅斯相嶧山碑僅得其狀耳求所謂殘雪滴溜鴻鵠羣游之妙徒想像於荒烟榛草間據鄭博士跋此碑乃取徐常侍模本勒石者篆書嚴整無轉折痕於鉤填易為功更加以石力愈覺圓勁但李丞相筆意無由得覩耳嶧山銘史記不載今獲𫝊於世者賴博士此片石也泰山碑乆已亡近忽搜有二十九字余曽搨得乃二世元年續刻自臣斯起至昩死請三十字中闕臣下一徳字其字㣲泐間有修改痕却猶少存運筆勢疑或是古刻再細玩傍乃有小楷字不知係何語為篆畫穿破未有篆在先而細書加於粗畫上者則亦似是唐宋人重勒者耳歐陽公集古録亦有嶧山刻然疑其偽云其字體比泰山差大自唐封演已言其非真而杜甫直謂棗木𫝊刻耳皆不足貴獨泰山頂上二世詔僅存數十字是江鄰幾自至刻石處搨者特為真其文與今余所搨正同特又今湮其半耳華山碑王氏跋一新豐郭香察書凡漢碑例不存書者名氏此小異耳泰山孔宙碑王氏跋一漢泰山都尉孔宙融父也張蕩陰碑王氏跋一後漢蕩陰令張君諱遷陳留已吾人景君碑王氏跋一漢故益州太守北海相景君銘今在濟寧州學見永叔明誠集漢司𨽻魯峻碑王氏跋一峻自司𨽻再遷以終今舉其雄者又為之私諡曰忠惠父皆門生故吏意也漢圉令趙君碑王氏跋一華山及景君碑余曽見𨽻法大約古勁餘四碑未見也官名不書見銜立碑不以終官名以前官髙者名今人每如此余嘗疑之乃東都亦已然蔡中郎書夏仲兖碑王氏跋一漢碑惟此最為完好其𨽻法多蠶頭燕尾筆與汝帖中中郎書數行相似亦未知果是中郎手蹟否此石今在永年余童時見一本後有嘉靖乙巳南昌唐某跋稱永樂七年修歲乆仆成化己亥前守秦公重建嘉靖癸卯築城之役為工匠所毁求之不獲乃取模書勒石亭上然則此碑葢模本也近來搨者欲贋為古皆以重墨湮此跋背後亦隠隠見之但糢糊不能盡辨耳後行建寧三年蔡邕伯喈書九字及銘下淳于長夏承碑六字皆後人所益碑雖重勒然字形不失出篆入真與漢他𨽻又稍别竒古遒逸絶有勢漢𨽻妙蹟賴此猶存彷彿桐栢廟碑王氏跋一集古録謂磨滅雖不甚而文字斷續粗可考次其所載僅十之六七云集古録祗云磨滅不甚而此本乃完善的為重刻無疑碑辭頗工乃昌黎南海碑所自出皇象天發碑王氏跋一嘗覽黄長睿東觀餘論稱休明書人間殊少惟建業有呉時天發神䜟碑若篆若𨽻字勢雄偉後又閲趙明誠金石録以為妖而不著其竒昨肖甫中丞搨一紙見寄跋稱肖甫中丞搨一紙見寄則碑今見在建業奈何不聞他人有搨者豈不合時好耶司冦後官留都曽摩挲此石否急就章王氏跋一此急就章稱皇象書無可據惟米元章書史云象有急就章唐橅竒絶在故相張齊賢孫山陽簿直清處此豈即其物耶此但存章草形體耳無論是皇象筆與否古意總已全失孔子廟碑王氏跋一碑字多漫漶其存者結體亦與受禪同差可寳也孔子廟碑甚多此碑不知在何地余未見受禪碑王氏跋一云是司徒王朗文梁鵠書太傅鍾繇刻謂之三絶碑一云即太傅書未可辨也勸進碑王氏跋一亦云鍾繇書與受禪畧同銘又二碑共一跋余始絶喜唐明皇泰山見此而怳然自失二碑余皆有之雖磨刓甚然字猶半可識真斬釘截鐵手也余不解𨽻法至覩此碑則把玩不能釋手明皇泰山銘何可倫惟夏承碑堪伯仲然此是舊石筆意猶大半存率更正書險折法多從此變出鍾太傅賀㨗表王氏跋一太傅賀㨗表一名戎路表歐陽公以二十四年九月内闗壯繆薨為疑黄長睿復以閏年駁之當無可措語矣第此亦非李懷琳輩所辦也此表閏月無可駁黄長睿東觀餘記載兩跋辨之甚詳甚覈葢闗壯繆於建安二十四年秋水渰七軍破曹仁至冬日中流矢解兵去此表葢賀仁晃此㨗非賀十二月吳之𫝊㨗也與史正合表中矢刃作兲刃是𨽻法初變體永叔誤讀作手刃因此生疑耳第長睿謂征南將軍即大帝却非征南正是曹仁仁𫝊甚明故云運田單之竒與徐晃并力表中語亦自了然何云大帝也書法比元常他蹟㣲佻然古趣自存其姿態乃更從古拙中溢出真所謂意外巧妙絶倫多竒李嗣真云鍾書如郊廟既陳俎豆斯在尚書宣示帖當之又云比寒澗􅂒壑秋山嵯峨此表當之第爾時漢帝在也而列侯於丞相輒上表稱臣殊可駭愕豈元常為魏相國於國主儀當爾耶余藏有一本後有楊娃皇妹圖書小印不知係印在真蹟上者搨本上者集古録謂有兩本字大小不同小者差類繇書此豈即小字本耶司冦後跋有謂出思陵手搨者未之見不知字形視此何若宋榻蘭亭帖王氏跋四此禊帖所謂蘭亭敘正本賜潘貴妃者趙吳興跋内稱吳中北禪主僧東屏有定武蘭亭此豈真北禪物耶第細看似木本及姜堯章偏傍攷證之仰字殊字列字云字頗可據他未必盡爾又中所注曽字乃作一鉤磔黄長睿謂押縫僧字之誤今亦不然也字形視他本差大而中多行筆後閲米海岳書史稱泗州杜氏收唐刻板本蘭亭與吾家所收俱有鋒勢筆活回視定本及世妄刻之本異矣理廟題作正本且有鋒勢筆活豈三米耶抑杜氏本耶次跋云莫雲卿甚愛吾此本以為在定武上而周公瑕不然之余謂昔裴逸民性𢎞方愛楊喬之有髙韻樂彦輔愛楊髦之有神檢此本之視定武猶楊喬之有髙韻而㣲傷檢者乎三跋云相𫝊定武為歐陽率更臨故楷法多勝褚河南臨則行法勝葢皆以其質之近為之耳四跋云此本初為周氏六觀堂物其家失之落拾遺人黄熊手熊嘗借張氏摹石搨得一紙作古色却割去真帖入舊裝乂攜示今沈尚寳申學士乞題尾質之吾州曹氏以真蹟一幅質周金華處最後事露曹氏却責令原卷而㑹金華歿復從其家購之始復合而售余久之而呉中有刻蘭亭序者文休承為題尾加奬飾以為不下定武細閲之即張氏石本耳以此知余所得之妙信非凡品也蘭亭刻雖多大畧不甚相逺似皆祖定武出惟褚臨本字稍大稍縱然欵段猶同惟此賜潘貴妃本則别是一規格若出已意臨寫不求甚似者余曽見重摹本甚飛動有勢此跋謂雄逸圓秀天真爛然良是第既云字差大多行筆又曽字作一鉤磔則與定武已全異又何誤認為北禪真物及取姜堯章偏傍拘拘考證耶杜氏收唐刻板本米海岳板本俱未及見難以懸斷理廟題作正本想亦以愛重之故非有的據周莫異議亦如歐楷褚行各以質之近為評喬髦裴樂真切諭也第右軍筆法内擫若以較真本此帖恐終不近宋搨褚模禊帖王氏跋二昔人稱宋榻蘭亭自定武外以復州為勝豫章次之劉無言重刻張􅊹褚模蘭亭為第三本今此帖稱張􅊹摹勒上石葢昔人偶未見􅊹原石耳所謂循王家藏本恐不甘復州豫章下也記余少時得石刻褚摹禊帖前四字為張即之書次為馬軾圖禇摹狀又次為米芾元章跋及贊於尾云元祐戊辰獲此書崇寧壬午六月大江濟川亭舟對紫金避暑手裝禊帖之下僅紹興二字御記及後有政和六年夏汝南裝觀察使印而已餘七印皆米氏識也英景間陳祭酒緝熙得此本謁館閣諸大老跋凡十有三雙鉤入石余獲石本後十餘年而陳裔孫以墨本來售僅餘忠安等五跋而増元陳深十三跋於前詰之則曰近以倭難竄身失後數紙耳陳秀書固尚未登石也余時不甚了了捐三十千收之又數年始獲此宋搨本内有范文正仲淹王文忠堯臣手書杜祁公蘇才翁印識及米老題贊與前本同異幾二十許字考之米老書史無一不合而光堯秘記敷文鑒定又甚明確始悟陳所得葢米本耳管子安臬副購有褚摹蘭亭真蹟余曽借觀月餘乃是四箱方冊截一行作兩行每方四行其凑搭處皆整齊完好無毫髪空缺崇山二字挖嵌尤妙渾然天成即如原在少長字傍者内觀宇宙兩幅失去以墨刻補之刻搨俱不甚工末有褚氏印及忠孝之家錢印後范文正王文忠二跋并元章跋元暉鑒定跋俱原係小方無割裂米筆類哀冊文極有勢後書壬午六月大江濟川亭艤寳晉齋艎對紫金浮玉羣山迎快風銷暑重裝詹東圖極愛之謂只此米字可直百金其前蘭亭字亦流動善取勢第骨力尚不甚勁無但右軍妄意謂即河南筆法亦恐不止此惟米跋果佳第細玩亦似雙鉤然表册絶精堅厚而和軟如綿今裝潢匠不能為也司冦意米老或嘗為别本以應人子安所得或出米手巵言中又有論褚模蘭亭一段証辨甚詳覈但稱張澂石本作閏六月九日大江濟川亭云云謂不應六月復裝一本定六月者為贋本第九月安得有暑可銷當是録舊跋但改月分偶忘去迎快風銷暑等字耳然則循王所得已是米臨本陳本無文正才翁跋管本無杜蘇跋世間善鉤勒手固亦時有恐此三本皆非褚真蹟陳管或又非米蹟不知司冦三十千本視管如何但不係石本上臨出或猶彷彿隆準王孫耳又宋搨蘭亭帖王氏跋一此帖前有故相李文正題額後則元杜本鄭元祐陳深諸名勝及明楊文貞跋皆許為定武佳派莫雲卿題尾云海虞有賺蘭亭圖逼真閻中令而禊帖不稱後歸趙太史汝師今春曬書見之因舉以貽汝師蘭亭敘結體全近今元常世將等古法至此一大變其妙處惟在字字飛動若不甚經意然亦不全無意其體是真行總只若屬草者然然筆法内擫結構最𦂳密雖佚蕩不拘而筆筆力到㸃畫間無一聊且意所謂周旋中禮從心不踰矩後來臨者欲求形似則滯而不得勢欲急取勢則又不易得肖總之皆不得筆所以最難定武刻余曽見數本似皆非真項子長曽示余一本乃潘司空子允亮所摹中剥落磨泐處頗多而字畫飛動神采射人與平昔所見諸本迥異項云此葢并剥落磨泐蹟一一鉤填毫髪不爽者以此知定武所以為時賞重正以其𦂳密兼佚蕩稍得右軍筆意故云最逼真世所𫝊楷法多太秀媚者皆似欲求太似翻輾轉失其真耳此本有元跋且俱稱為定武佳派不知能勝潘刻否余曽以潘刻告寮友南海黎君君華黎遂託朱山人於潘處乞得一本有潘小朱印與定武本絶似而神采却不及項所示者此又不知何也蘭亭肥本王氏跋一蘭亭肥本二前一本雖少剥蝕而淳雅饒古趣當是定武正嫡後一本則時刻中之小有意者留以備考定武刻人多謂瘦本勝敬美則云古人作字多肥故元常如此肥而彼時猶云胡肥鍾瘦凡碑刻搨多石漸磨損字乃減瘦渠在闗中親摩挲諸古碑證驗得之良非孟浪而趙松雪則又謂紙有粗細燥濕墨有淡濃輕重刻之明暗肥瘦隨之真知書法者正不在此其鑑尤精此二肥本其一既饒古趣即當是希有本不知敬美展玩時作若何評周邸東書堂禊帖王氏跋一蘭亭序刻周憲王邸中者凡五本其一為定武本二為定武肥本三為褚河南本四為唐橅賜本而其五復為定武本王所藏本未知何如且似以已意臨搨而不作雙鉤填廓媚潤有餘古勁不足石刻於畫尤逺泉石氣韻了不知所在而諸賢偃仰隗峨之意尚小可㝷以此知伯時自不凡其他詩及雜記真行數紙皆憲王筆蹤不能脱俗周邸帖大抵摹手未工此跋評五帖云媚潤有餘古勁不足良是的論摹畫入石比書更難此圖無别本賴此尚存梗㮣若得髙手出己意臨之固是一快司冦門下名畫士不之何不令作此圖以配潘貴妃本王右軍草書蘭亭帖王氏跋一此帖縱慢生穉即開元以前無之獨於督䇿處小近筆陣圖耳楊用修謂筆陣圖乃江南李李後主偽作及覽蔡予正跋尾謂陶穀學士得之主所蓋陶性貪而寡識又以豪壓李主所匄以奪無厭李故用懷琳故事作譌書裝潢古色戲陶此帖余曽見大是俗品宋搨黄庭經王氏跋一余所見多文氏停雲館本往往纎促無復遺藴以為真呉通㣲贋作及覩此宋搨乃木本耳而増損鍾筆圓勁古雅小法楷法種種臻妙乃知停雲自是文氏家書耳且通㣲院吏安能辦此狡獪耶曹君其寳之哉曹君本余未見曽在敬美處見所購朱忠僖家本此所謂増損鍾筆圓勁古雅小法楷法種種臻妙者果不誣舊榻黄庭經王氏跋一黄長睿以陶隠居翼真檢興寧二年南岳魏夫人授弟子楊君黄庭經使作𨽻字寫傳徐長史時右軍歿已二嵗為辨然隠居上梁武帝書云逸少有名之蹟黄庭勸進不審猶得存否長睿以隠居破隠居亦似痴人説夢也第唐人謂是換鵞經則可笑爾此木本宋搨摹拓展轉失真而中間尚存意態陶秀實跋云山陰道士劉君以羣鵞獻右軍乞書黄庭經此是也元章書史據晉史駁之云甚可笑今司冦亦因其説第自齊梁以來相𫝊右軍真蹟俱有黄庭無道徳黄庭初出不甚知名但云道經或遂訛為道徳經此祗由一人訛起後便相沿晉書雖係正史亦但采舊聞且記事但取換鵞為實至黄庭道徳間原無輕重又褚河南所録右軍書目内黄庭經下明注云與山陰道士夫豈無據開元時去永和未逺太白黄庭換白鵞句或别有所本史書承訛者亦甚多據真蹟為斷猶有準繩物我異觀豈不更相笑哉右軍筆陣圖王氏跋一筆陣圖語多淺俗斷非右軍所著然其來已久似唐人偽作者論書語亦間有可取第不得要領二本余俱曽見之覺真字類歐陽者稍勝周孝侯墓碑王氏跋一宜興周孝侯墓有古碑一通云晉平原内史陸機撰右軍王羲之書跋尾云唐元和六年嵗次辛卯十一月十五日承奉郎守義興縣令陳從諫重樹此碑後又有一條前試太常寺協律郎黄某書名與下書俱糢糊而書字㣲可推當是後人因陸機撰有空石妄增右軍將假王羲之書以重其價耳唐人碑多用此真行體葢祖聖教序來謂太常協律郎黄某書是也其文亦非平原筆似并陸機撰羲之書俱後人妄増者黄協律書何不佳惜多此蛇足右軍十七帖王氏跋一此帖後有勅字及解無畏褚遂良校與長睿語合葢宋人得唐本以精工刻之其鉤拓擫捺無毫髪之遺憾而且紙墨如新光彩映射真所謂山陰之適嗣者也十七帖張彦逺云貞觀内本凡百七行九百七十三字逸少草書中烜赫著名帖也内除來禽等二十字係正書其餘皆草書結體亦多相似彦逺謂文皇取其迹以類相從綴成卷是也黄長睿謂唐有兩石刻本一勅字本一即其所得本此外乃别有南唐刻賀知章臨本及王著本又有似南唐刻板本今此帖謂是宋人重刻唐本不知於何處辨之今世盛行兩種一呉中勅字翻本亦稍有筆意又一中州本乃舊刻不知以何為祖行欵俱與吳中本不同字亦渾勁有古意第乏運筆勢耳右軍真蹟多湮滅得此佳本果足稱嫡嗣宋搨臨江二王帖王氏跋一晉二王帖右軍上中二卷大令一卷前為二像扶侍者各二葢宋臨江石刻也黄伯思謂淳化閣帖多贋本惟十七等帖後有文皇勅字一卷最佳此本則汰去閣帖之偽者而博取諸家藏真蹟名刻命好手雙鉤上石掩映斐亹劇有生氣為書家一代冠冕此帖摹刻手原不甚工内重摹淳化諸帖俱不佳其中偽者尚多謂盡汰去亦未然右軍二卷惟薛氏所刻遷轉安善道意服食褁鮓五帖類皆有筆意此諸本所無信佳帖想薛本原精耳次則寳晉齋王畧淳熙續帖官奴兩章亦佳而建中靖國豹奴亦有古章草法可玩其云長沙新安者俱即十七帖皆不及原刻逺甚大令一卷尤多未善獨日寒范新婦二帖米老所稱自羊敬元右軍帖内辨出少存筆意惜刻手拙耳王畧帖米老詫其竒絶謂與稚恭帖同是神物故此帖用以冠諸首筆力精𦂳耐細玩可謂幽深無際第精神尚不甚煥發此葢内擫勝摹者不易為力故也世𫝊元章在真州謁蔡攸舟中蔡出王畧帖元章求以他畫易之蔡有難色元章曰若不見從某即投此江死矣因大呼據船舷欲墮蔡遂與之及攷書史則云在蘇之純家之純卒其家定直久許見歸而余使西京未還宗室仲爰力取之且要約曰米歸有其直見償即還余遂典衣以増其直取回仲爰已使庸工裝背剪損古跋尾參差矣痛惜痛惜夫米諱要刼或有之不應諱蔡為蘇趙疑據船舷事為妄𫝊米性素顛人又多好怪實者不𫝊怪者遂承訛競𫝊耳元章王畧帖贊道祖褁鮓帖贊俱竒陗快人聖教序王氏跋二一跋云此序為唐文皇記為髙宗作今以冠藏經葢序記僧𤣥奘求法事也始奘於武徳末乞往西佛地取經不許乃私從一賈胡闌出邊亡何賈棄之去幾死獨身越五峰謁髙昌王𫝊致西突厥可汗厯十餘國而抵鳩摩從胡僧戒賢習大乘論譯經語又之中天天竺戒日王所説法積十八年而以二象䭾爽經像還至涼州上聞手詔飛騎迎之令安夏阿蕳若譯經行世而父子相率為序記侈大之次跋云聖教序書法為百代模楷病之者第謂其結體無别構偏傍多假借葢集書不得不爾仲蔚謂出文皇手又經于志寧等潤色不無失真是不知咸亨中沙門懷仁摹集勒石唐世宰相有兼譯經潤文使者即其職也凡唐藏經卷尾皆有諸公名姓此何與于書而仲蔚乃以是病之陋一至此乎此帖乃行世法書第一石刻也右軍真蹟存世者少矣即有之亦在𫝊疑又寥寥數字展玩不飽惟賴此碑尚稍存筆意縁彼時所蓄右軍名蹟甚多又摹手刻手皆一時絶技視真蹟真可謂毫髪無遺恨今觀之無但意態生動㸃㸃畫畫皆如鳥驚石墜而内擫法𦂳筆筆無不藏筋藴鐵轉折處筆鋒宛然與手寫者無異如蘭亭諸刻得體者多不得勢得態者多不得骨流動嚴密二妙難兼而此帖中如趣流類羣領懷後遊閒朗之斯足㑹迹不無盡等字皆有體有勢有態有骨流動中不失嚴密具八面之妙以此想右軍筆法真是得心應手超妙入神唐宋以後雖百舍重繭不能得其一㸃半畫也果宋搨精本真乃無上至寳今世間存者尚多但能不惜價亦不難購果不能得即今闗中石倘得精手搨之猶應在閣帖上第筆法險峻無門户可入若求之形似間恐更逺惟把玩日乆稍知其用筆意能驅遣筆不為字所縳即不能似右軍庶幾換凡骨矣絳州夫子廟記王氏跋一絳州夫子廟記宋人集右軍書聖教序猶是真蹟中集者此又從序書及它石本摹刻形似之外風流都盡矣此無但由石本來其摹刻手亦俱不甚精第終是右軍字猶勝他俗碑耳攝山棲霞寺碑王氏跋一棲霞寺碑文及銘梁尚書江總撰至宋沙門懷則始集右軍書勒之石亦聖教序遺法也結體婉潤逼真第鉤捺處不得其行筆之妙耳此碑余初未見據跋云婉潤逼真謂應在翻本蘭亭上近吕甥孫天成寄一本來乃即懐則手書非集右軍也其效聖教體正唐末來僧家寫碑派不知司冦何為云爾謂勾捺處不得行筆妙果然銜稱陳侍中尚書令亦不係梁文王子敬洛神賦王氏跋一自宋來所𫝊洛神賦祗十三行乃章氏忽刻此全本不知原帖今在何所論姿態信有之第結構全疏尤多穉筆晉法不應若此恐是懷琳餘技耳碑刻借石力無轉筆蹟作贋本固自易瘞鶴銘王氏跋一潤州圖經謂為王右軍至蘇子瞻黄魯直確以為非右軍不能也歐陽永叔疑是顧況尤無據黄長睿謂陶隠居又謂即丹陽尉王瓚瓚腕力弱不辦此隠居雖近似要之亦懸斷也此銘佳處惟在字畫飛動然筆勢太縱隋以前恐無此法應是李北海以後筆顧況雖無據然唐人善書者多如王士則成徳軍等碑筆法與此亦畧相似大約唐人所書耳鶴死而瘞之銘之此等好事亦近唐人所為陶隠居入山帖王氏跋一帖語稱元帝乃晉元非梁元也若梁元則不甚相及不應稱帝號又邵陵王乃蕭綸當隠居卒時綸尚少不應載其詩姑闕以俟再考陶隠居僅見此帖字形長而瘦勁内稱𢎞景名似是隠居筆乃司冦公以邵陵王年嵗駁之又覺有據殊難臆斷許長史碑王氏跋一茅山許長史碑陶隠居著下有此一行隠居手自書則餘文乃隠居弟子筆耳長史名穆世名謐句容人祖尚呉中書郎父副寧朔將軍下邳太守謐仕至䕶軍長史散騎常侍得道卒年七十二此碑余所未見若果陶隠居撰必有可觀當覔搨本讀之大佛寺碑王氏跋一此碑在青州北門外大佛寺髙齊武平四年建歐陽公嘗守青矣而不載集古録物之顯晦固有時耶其書不能大佳然猶有漢晉𨽻分法文筆瑣冗是江右體中最下者碑陰又有李北海龍興之寺四大守遒偉而圓健猶可賞􅥬六一公金石遺文一千卷見集古目録者不滿四百此碑應在千卷中第無跋今無從攷耳智永真草千文王氏跋一智永書圓勁古雅無一筆失度妙在於藏鋒斂態耳余少時任尚書郎曽一見絹本真蹟於山陰董氏妙墨深入膚理滃鬱欲飛直神物也生時一字敵五萬今當不知何如耳此所云山陰之董氏當即是吾郡中峰少宰家不知此絹本今尚存否張子藎翰撰曽示余一本係是白楮紙已悉裁作條云偶鄉里人將來謂是王陽明先生所常學書者出數金易之真書圓勁而多骨草書轉折有氣勢風度尤勝徐渭文長跋定為智永蹟雖未可遽謂然然不亦唐人臨本斷非宋代以下人所能作也今世所盛行石本皆薛嗣通所翻刻石今在闗中王百穀曽贈余一舊搨本甚是古秀可愛項子長謂陜中本不佳渠别購有古佳本因摹之於石亦曽以搨本餉余然肥而弱逺不及陜刻也司冦續跋謂晩得木本古雅勝舊藏者而有薛跋又謂永師千文推史家碑安得悉取校評之書畫跋跋卷二上欽定四庫全書書畫跋跋卷二下明孫鑛撰碑刻唐太宗屏風帖王氏跋一文皇嘗作真草書古帝王龜鑑語為二屏風示羣臣今所存者草書耳文皇書真有晉人法其書真草屏風亦佳事第真蹟在宋時已不聞鑒賞則摹刻當在唐時此搨本今時罕傳應是宋物泰山銘王氏跋二記泰山銘唐開元帝製及手書相𫝊燕許修其詞韓史潤其筆以故文頗雅馴不猥弱𨽻法雖小變東京最為穠勁饒古意帝王假手臣下固常事第詞可潤色書則祗可代為之何由潤其筆使冩成而重加描補恐無但不能増妍將愈滯鈍矣此銘當是帝手書不然則是擇木特效帝作此肥筆耳孝經王氏跋一開元帝御書孝經後有太子亨右相林甫左相適之等題名韋邭公陟稱彭城縣男葢自吏部侍郎出為河南採訪始襲公爵此本封爾章斌封平樂郡公可補本傳之闕書法豐妍匀適與泰山銘同行押亦雄俊可喜此𨽻與泰山銘同一法第彼字徑數寸得以展其翔舞之勢此差小則祗覺肉勝耳凡𨽻字大則易佳唐𨽻肥尤宜大涼國長公主碑王氏跋一右涼國長公主碑小許公撰而開元帝御書書法過肥然㸃畫間自有異趣要之自唐變此體帝為最也碑詞大半可讀公主碑何勞帝書想以睿宗愛之故觀此可見帝篤於同氣且婉於承父乃爾跋云唐變此體帝為最然則前泰山銘何又云借潤於韓擇木耶兖州孔子廟碑王氏跋一右孔廟八分書唐太宗詔一通後有朝請大夫開州刺史髙徳裔刻十二字或徳裔書不可知也此碑不知今尚存否既有刻者名何為不著書者名唐文皇告少林寺書王氏跋一文皇圍洛城時以少林寺僧建功使致書存問且為䕶持之書法不甚工而亦不俗當是幕僚筆内世民二字行草是親押耳首有開元神武皇帝書後人所妄加也此書即刻於裴㴶所書少林寺碑上方當是勒寺碑時摹前文皇書置碑首耳謂止廟諱二字是親押良是今京署移文惟名係官自僉然則爾時已如此上横過又書云已上七字開元神武皇帝書細玩似是指上𨽻額武后書昇仙太子碑王氏跋一文似出北門諸學士手筆意軟媚無鐵椎椎悍馬時意氣且既為太子立碑而以蓮花六郎稱其後身得不穢千古青簡耶后書體素軟媚他刻皆然跋謂既為太子立碑何得以蓮花六郎為其後身嗤為穢青簡不知此雌何心子晉正自為蓮花君前身立碑耳司冦素滑稽善謔何至此忽落鈍根墮酸腐窠臼中虞永興孔子廟堂碑王氏跋二碑石刻在闗中首有相王旦書碑額葢舊無額武后増之耳至文宗朝馮祭酒珤請斷去周字而唐史遂以此碑為武后時立者誤也此碑五代時已翻刻故雖北宋搨亦皆非真本余少時得一本見其内頗多僵筆竊意僵近𨽻即妄認此為永興法及後見敬美亟稱韓宗伯家唐搨之妙因從韓索觀之則筆筆皆蹲注法轉折處特陗勁頗近歐書宛然手書狀絶無僵筆乃知僵者乃摹刻手拙耳倘得髙手取韓本鉤勒入石應勝闗中石九成宫醴泉銘王氏跋三書斷謂率更正書出大令森森焉若武庫矛㦸凡摹真蹟入木石者有五重障雙鉤一填朱二印朱入木石三刻四搨出五若重摹碑便有十重障矣真意存者與有幾惟鉤墨本及書丹碑祗兩重障然雙鉤隔紙一層恐尚有疑似失真處惟書丹則就筆而刻果刻手精真可謂毫髪無疑恨晉法失久矣惟唐法尚賴此數碑存今人舎唐碑不寶乃重價購閣帖及潭綘等謂之耳食不枉也此醴泉銘自昔有名最整潤多姿無一筆不妍亦無一筆不陗第稍覺太用意耳余曽及見宋搨本風度真是殊絶陜石今尚在然湮泐已甚筆稍輕處多瘦細乏神葢畫粗處刻深不易磨細則刻淺故日漸瘦耳以此知敬美謂碑文搨久乃瘦者果也虞恭公碑王氏跋一率更書温虞公碑得之鬻書人殘缺不復可讀第其字畫之妙不在醴泉化度下豐人翁謂中楷當以信本虞公碑為第一果然知書者謂佳不知書者亦謂佳真具有八面之妙但惜殘缺太多化度寺碑王氏跋一趙子固以歐陽率更化度醴泉為楷法第一雖不敢謂然然是率更碑中第一而化度尤精𦂳此碑亦多殘缺惟韓宗伯一本有五百餘字當是宋初搨本字畫亦饒精采絶為不易得體方筆圓在醴泉碑上第以虞恭公較之此猶覺少拘耳皇甫府君碑王氏跋一率更書皇甫府君碑比之諸帖尤為險勁是伊家蘭臺發源石刻在西安雖小荅剥差可誦耳跋謂此碑比諸帖尤為險勁非也歐陽蹲注多筆筆著意此碑則肆筆出之其陡折勢盡露正是縱逸耳然畦徑最明學歐者以此為門路乃易入歐陽通道因法師碑王氏跋一道因與𤣥奘同譯經者見髙僧傳碑文亦宏麗饒其家言然去簡棲頭陀不啻一小劫耳評者謂歐陽蘭臺瘦怯於父而險峻過之此碑如病維摩髙格貧士雖不饒樂而眉宇間有風霜之氣可重也余嘗謂皇象文武索靖載妖帖章草中鳥蹟筆者顔真卿家廟茅山碑正書中玉筋筆者蘭道因碑正書中八分筆者此未易為俗人言也謂此碑是正書中八分筆果然謂如病維摩髙格貧士則似未中筆法全歩武乃翁但腕力弱耳遒媚有之不見所謂風霜氣亦筆筆作意第未入圓境故痕蹟稍露其不饒樂以此亦有畦徑易學趙模千文王氏跋一趙供奉在貞觀中以書名嘗與諸葛真臨蘭亭刻石者此帖云亦是摹晉真蹟在呉江史鑑所匀整流便矩度森然恨結法小局促乏蕭散之趣耳此真蹟與禇河南哀冊文俱藏呉江史明古氏司冦購彼而遺此豈不重趙供奉帖耶據都元敬寓意編云是集晉人書唐初筆留至今固是竒寶何人刻石今亦不甚流傳禇書聖教序記王氏跋一余舊藏禇登善聖教序記婉媚遒逸波拂處如鐵線葢善本也後陜省致一紙輕弱不足言或以為翻刻或以為有二本第俱有可疑者舊藏本稱龍朔三年建按遂良以永徽六年貶州永慶二年徙桂州未幾貶愛州歲餘卒葢未嘗生及龍朔也豈遂良嘗書之至是始摹搨上石耶陜省本則云永徽四年中書令臣禇遂良書攷之本傳宰相表遂良貞觀末為中書令後羅永徽三年以吏部尚書同中書門下三品四年進尚書左僕射疑皆後人附益之耳陜西今有二碑一永徽四年建止有髙宗記無太宗序乃自左冩向右若倒書然者果輕弱不足觀斷是重摹本第後銜稱尚書右僕射正與史合不係中書令不知司冦何由據為駁一龍朔三年建太宗序髙宗記俱全但無兩答勅及後心經波拂處雖有鐵線意然字畫亦未甚圓浄似亦重摹者後一行有大唐禇遂良書在同州倅㕔十一字則絶拙滯與前字不倫的是後人妄益者跋謂河南公未及生在龍朔良是攷懷仁聖教係咸亨三年刻上去永徽癸丑二十年龍朔癸亥十年此文撰在貞觀二十二年應係永徽間勒石同州刻想在龍朔年是唐初翻本故猶不甚失筆意第後行姓名既係増出則何縁定其為禇雖筆法可玩安知非彼時善書者書耶永徽本的是近時人摹殊失真甚想懷仁本行禇石久湮滅耳庚寅歲余通書司冦公偶及此乃作漫語答似猶不以為然余因是得背古碑法昔歐陽公得智永千文搨本謂石有缺後人或妄補入所佳者字耳輒去其偽者二百六十五字不以文不足為嫌而蔡君謨猶云未能盡去今此諸碑亦惟以字重古人作字其行欵間大小疎密俱相應且中間亦間有糢糊文義已不貫串又何必碎裁作條僕僕補綴耶若碎裂恐未免失原行欵勢多參差不整今但須一行八字每幅四行依原紙裂開裝背至有一二字多餘者乃凑作八字行續於後則原碑形勢不失如此碑左起者亦易辨紙片俱整亦不易致傷損如欲存其文則小字别録一通於後如草帖釋文樣亦無不可此似得惜字法以告米元章必當擊節碧落碑王氏跋一絳州碧落碑篆書在石像背州將以不便摹搨别刻置廟中今本乃别石耳李旋之軰以為陳惟正李譔李瓘書不可辨按洛中紀異録稱刺史李譔為母房太妃追薦造像成忽二道士來云君刻石須篆書手我天下能篆者李異之聽所為則扄户三日乃聞化二白鴿飛去篆文宛然像背矣此涉誕妄不可信然李陽氷覽之七日而不思去習之十二年而不成其妙如此豈惟正譔瓘小子所辦乎余不解篆書然如此碑則絶愛之其筆法正與李監陽氷相似豈李篆果由此悟入耶然陽氷端整此則稍有運筆勢微近李丞相内有數字與常篆不同亦稍怪異乍覩之彷彿石鼓文第字形稍長耳雙白鴿事良渉誕妄然世間怪事固有彼時有如此篆手不應無聞亦不應祗書此一碑傳疑可也少林寺靈運禪師碑王氏跋一靈運碑者唐崔琪撰末云聖善寺沙門勒下殘缺二字當是僧書耳文淺陋不足道書法絶類聖教無一筆不似後世傾側偃卧以取姿態者其人材雖足稱要之有愧於此髠也唐時自聖教碑行勒碑者大半用此行體梵宇尤多然僧家故習字今猶爾但不能唐體耳此碑亦未為甚工跋中褒許似過御史臺精舎銘王氏跋一唐史稱梁昇卿善八分東封朝覲碑聲華為一時冠此帖亦可寳也獨御史臺持憲之地乃立精舎倡諸繫者禮佛懴悔昔獄吏命祝咎繇范孟博猶非之況佞佛乎崔中令湜固甚言因利結四方縁矣不知附禁臠事發曳銀鐺時佛亦當庇引之不為之一笑佛律視吾儒更嚴乃自昔憸人類多佞佛此何以故良由俗僧欲行其教以賈利别創㨗徑法謂由此可立躋聖位凡儒教中種種縳人者皆可畧故專心奉之如湜軰皆是彼謂有佛可恃他無足慮耳若謂必盡吾儒徳業又入上一乘澄凡慮消滅乃得佛則習儒已苦安得重加苦歐公集古録盛述湜惡行司馬此跋意亦同然湜兹時未必不思鋃鐺自斷也梁書自唐𨽻髙手以梁故即湜文人不嗤棄藝之能不速朽如此桐栢觀碑王氏跋一新桐栢觀碑唐崔尚文韓擇木書桐栢即天台别名道家所謂金宫玉庭洞天真境覽興公一章覺此頌寂寥耳擇木書於漢法雖大變然猶屈强有骨明皇酷嬖太真無所不似𨽻分體不免作豐容艷肥時狀老杜云書貴瘦勁方通神葢有感也計此碑當為拾遺君印可者昌黎科斗書後記稱大厯世叔父擇木八分與李監篆齊名欲書碑銘者多歸之然則豈獨拾遺印可哉尚書於𨽻學甚深匪但屈强有骨而已此碑在吾浙不知猶無恙否大智禪師碑王氏跋一此碑為唐史侍御惟則書竇臮賦述稱史書古今折哀大小應變聲價不落莫也其行筆絶類泰山銘而縝密過之知開元帝潤澤所自耳大智師北宗之錚錚者嚴挺之粗能其家言俱可存也此𨽻殊太肥又帶俗不及韓尚書逺甚司冦乃亟稱之何也云折衷應變云縝密玩之俱不得祗見滯濁耳張旭帖王氏跋一張長史肚痛帖及千文數行出鬼入神惝悦不可測後河滿子一絶係張祐作祐後張長史生可五十年余甚疑之既考知與此齋帖俱髙閒筆也閒書僧米元章欲懸之酒肆者然亦自佳耳伯髙醉後每以髪濡墨作草書今觀此千文斷簡神色飛動真可喜可愕然大約速由緩來勁從軟出所用筆似若今所謂水筆者正與濡髪同法惟是執筆有力故縱筆所如姿態自橫出然草法至此亦窮矣閣帖中伯英子敬兩狂草人或疑為此顛筆然彼雖佚蕩猶在法度内此則全越規矩漢晉法真棄脱無餘也肚痛帖似是健毫筆顧風度却少遜或刻手假力於石亦未可知髙閒亦祖長史法第微較俗昌黎贈序云逐其迹云善幻葢亦寓譏諷意張長史郎官壁記王氏跋一張長史以草聖名楷法獨有郎官壁記董逌稱其隱約深嚴筋脉結密又云守法度者至嚴則出乎法度至縱識者謂得長史墨池三昧此刻在宋已少吾呉僅有都太僕元敦一本尋入王文恪公家文恪親為跋於裝池之四傍余聞此三十年矣而始得之所藏九成廟堂化度諸楷帖皆辟三舎矣因敬題其後此楷法最有名碑恨無從得見呉中好事者多何不摹刻一本草書心經王氏跋一此草書心經刻之長安中云王右軍書非也雖遒逸而疎縱不入格不中懷素作奴况右軍乎見唐文粹乃駙馬都尉鄭萬鈞書張説序鈞尚睿宗代國公主字筆婉者也於書家不甚琅琅宜其然書亦有筆但無古法近代此等書固亦時有裴㴶少林寺碑王氏跋一裴懿公㴶書少林寺碑開元十六年建在嵩山裴少時負文筆號霹靂手而雅不以八法名此碑辭至沓拖不可讀而書頗秀勁多媚態得非時代為之耶傳不載階封此書銀青光禄大夫正平縣子亦可補傳之闕書果勁媚但石似覺少粗尚未盡其妙李北海雲麾將軍碑王氏跋一李北海翩翩自肆乍見不使人敬而久乃愛之云雲麾官銜也其碑有三一在闗中一在良鄉一在楚中闗中者乃李思訓碑雖殘缺猶可搨燕楚兩通今罕傳不知係何人碑想石亡久矣此乃李碑跋謂翩翩自肆果然然結構不密未是北海得意筆當時著名者亦不知即是此碑否岳麓寺碑王氏跋一題名稱前陳州刺史按邕謁上泰山還獻詞賦上悦㑹有讐人發其贜者張説忌之下獄論死許昌男子孔璋救之得免謫尉遵化此其赴謫時道書也碑文頗庸陋米元章評其書如乍當小民屈强生疎此語殊未當書故佳小佻耳余少時曽見搨本然磨泐已甚不知司冦所購者何若元章故輕於貶人若屈强生疎則與北海書全不似謂其輕率熟脱猶近耳此君文雖纎固是才子不然燕公何為忌之李北海娑羅樹碑王氏跋一法華寺碑王氏跋一東林寺碑王氏跋一北海此書本小束法度再經模刻雖鼻日無疑脂澤有加而天骨掃地矣視余晚自廬山歸東林程孟獳馳之以為竒絶即此碑也娑羅碑不知在何處余未見法華寺在吾郡然碑已亡寺嘉靖中尚存近廢為墓即得司冦本重摹之亦無地安厝矣想東林碑尚使程生驚賞用為悵然臧希晏碑王氏跋一右金吾衛將軍臧希晏碑朝議郎守衛尉少卿淮陽縣開國男賜紫金魚袋韓秀弼八分書文少糢糊不可讀書法亦清勁可喜唐𨽻固時有瘦者第古色終讓漢耳孫過庭書譜王氏跋一孫䖍禮書譜刻石凡三其一秘閣續帖末未有宣政印記者最為完文今不可復得矣余遊燕中有偽作古色以鬻者其刻亦佳而中有兩訛字葢秘閣之帖遺於後紙敝墨渝刻者承之賴以辨耳其一未有宣政印記而前缺一二字葢自内府出而末首稍刓破然自真蹟上翻刻故獨佳中間結構波撇皆在其三為文氏雲舘則影響耳跋謂兹譜刻石凡三然余少時曽見有江隂刻石本與停雲帖可相伯仲後在禮部時沈瑞伯持一舊本見示是背成冊葉首缺數幅構體絶勁浄與江隂停雲兩本絶不同云是佳帖余則尚恨其乏流動意然則是有五刻石也䖍禮運筆得輕法輕故饒態後半風韻更勝米南宫草法頗似之徐浩心經王氏跋一此帖意近而法􅗦米南宫斥為吏楷誠耳然不得不為眉山小庇之耳季海書用力亦深第字形不甚秀媚大約是時書耳司冦謂不能不為眉山小庇之然坡翁在日聞人擬以徐浩輒不喜小坡有跋亦力辨乃翁書非學徐浩然則司冦亦可謂枉䕶前嵩陽觀記聖徳感應頌王氏跋一聖徳感應頌尚書左僕射兼右相吏部尚書晉國公李林甫撰葢𤣥宗命方士煉大還於嵩陽觀六轉而移煉緱氏山太子廟九轉而林甫記其瑞者也書為徐浩古𨽻與帝𨽻法絶相類雖勝亦自有態可寳也人主夸大信非美事顧猶為處强第功業成後此盛滿一念不可不善自持耳帝王莫不希不死帝此時已六旬使擇日而登遐豈不為千古完徳懷素千字文王氏跋一此帖最飛動有勢第運筆太速於草法多失使非千文素師日後觀之恐亦將如張文定不自識耳此書以神勝佳處不在形似最難摹刻使唐人為之猶可兹石乃摹刻於成化間出陜西俗工手安得佳懷素自叙帖王氏跋一此帖如并州勁鐵北山迅鷹竒矯無前獨冠諸種然坐此亦不得與二王盟僅屈强江淮耳真蹟厯數相臣家歸陸冢宰近聞一總帥以八百金購之復入平津邸矣文徴仲跋此帖謂毫髪無遺恨恐未然中間譌筆尚多可恨者不止毫髪也第視千文㣲入規矩使轉處意態尚可求顧遒逸飛動則猶當讓彼細玩彼似羊毛筆書此似兎毫筆書以此氣韻稍别耳此帖乃徴仲手臨無但渇筆處鉤勒入杪忽尤更得其勁筆勢真不讓唐人技使千文亦使徴仲摹之神采應更勝也王荆公作字常忙昔人謂公一生那得許多忙事然不獨荆公藏真及元章亦多忙荆公祗係性躁二公則不係躁藏真是恐弱其筆元章是恐滯其態坐此尚未得安閒蕭散之妙然總之亦是未熟故論聖人必曰從容中道懷素聖母帖王氏跋一唐元卿謂此碑為偽筆可謂卓識雖云匀美清熟却㣲帶俗氣應是髙閒軰書耳細玩亦有數筆類自叙及藏真稿帖更俟具眼者辨之近張南安等是祖此碑法然此書却不渉忙撰碑者何人稱郭公為叔父應姓郭僧而書道家碑亦是異事懷素藏真帖王氏跋一跋尾周越書得其遺意蔣之竒有蘇黄法皆可重也此帖是用張長史水筆作顔尚書行押法内甚稱羡二公豈有意效之耶肆筆亂寫頗有不成字及類稚筆處然意態自妙葢草法力深故耳周越書僅見此此固佳何為彼時人不甚許之蔣頴叔是蘇黄前軰乃顧肯效其書古人服善如此恒山祠記王氏跋一唐河東公所書北岳恒山祠記公為相有武畧其書要非其至者特以故事存之耳河東公何人跋稱為相有武畧豈張公嘉貞耶當覔搨本讀之王清源碑王氏跋二唐朔方河東河西隴右節度使清源公王忠嗣碑中書侍郎元載撰門下侍郎王縉書載其女夫也所記事與史不甚異其文詞瑣冗無足多者縉書稱名家與李邕相伯仲司冦每盛稱清源公劄記謂無死當是中興元績然考之史亦未見如所言王相書罕傳此碑今在何地搨本亦少中興頌王氏跋一摩崖碑中興頌元結撰顔真卿書字畫方正平隠不露筋骨當為魯公法書第一唐文靡瑣極矣至結與蕭頴士軰方振之頌亦典雅倣嶧山諸碑碑今尚可搨余得數本皆有描補筆以字稍大故逺觀尤不甚失形勢然歐公集古録已稱字多訛缺徃徃為好事者以墨増補今又更五百年雨雪剥擊何得不更磨泐耶字端整第㣲乏風韻當亦以石湮損故安得歐公所云李西臺本玩之次山文極力追古固是昌黎先驅東方朔畫贊王氏跋一東方朔畫贊石刻在陵縣陵即古平原郡也故城址猶存今僅三之一耳碑已再刻余所得乃舊本雖小磨泐然其峭骨遒氣滃鬱奮張亦足辟易餘子余有一舊本字稍可讀然恐亦未是祖刻跋謂已再刻不知指何時言此碑在顔書中最為斂鋒多圓法細玩絶有媚處有歐率更化度虞恭公遺意當為魯公正書第一跋云峭骨奮張此以評顔他碑則可於此碑似未合家廟碑王氏跋一右顔魯公家廟碑石刻四面環轉在闗中後廟燬宋初有李延襲者語郡守移置之結法與東方畫像相類而石獨完善少殘缺者覽之風稜秀出精彩注射勁節直氣隱隱筆畫間吁可畏也此碑不但有玉筋筆其結構取外滿亦是篆法跋謂與畫贊相類殊不然此書鋒鋩最厲㸃畫間筆筆生峭想平原忠直氣似之此法在前鮮有是魯公創出者畫贊筆固圓與此正不同若麻姑碑或猶稍近多寶佛塔碑王氏跋一顔魯公多寶佛塔碑在西安有宦秦中者向余言唐碑石皆如玉其字皆直刻入深一二寸如今刻牙小印者然不似今碑但斜掠也後問之李伯玉亦不盡爾惟此多寶塔等一二碑為然所以經久不糢糊此是魯公最匀穩書亦儘秀媚多姿第㣲帶俗正是近世掾史家鼻祖又㸃畫太圓整筆冩不應若此米元章謂魯公每使家僮刻字㑹主人意修改波撆致大失真觀此良非誣又因此知顔書是腕著案書案亦大有力倚此為牆壁則折旋皆如意不致欹斜但作字時少減趣亦便無魏晉天然態耳今世所謂顔書率師此亦以其有牆壁易學故大抵字必帶俗乃入時眼乃盛行茅山碑王氏跋一魯公此帖結體與家廟同元次山墓碑帖王氏跋一顏文忠為元次山書中興頌歿又為撰碑文而自書之所以推許次山者至矣此兩碑余皆未見宋文貞碑王氏跋一碑辭内稱公雅善戲謔不常矜莊凡所談諧人輒疏取昔人見公賦梅花以鐵心石腸為怪故不足怪也碑今尚存予曽搨一本糢糊已甚不可謂構法與家廟碑相類宋文貞碑側記王氏跋一宋文貞公神道碑側記顔魯公撰書石刻沙河二公剛勁大節相埒書亦稱是真足三絶第其筆以取勢為主魯公平日作字或蹲注取妍或奮張為勁俱不免渉矜持無蕭散自在意此碑乃縱筆書雖無一毫帶筆却具行書法蕩佚自肆此由其楷法素精故一放手態即溢出想書時胸中亦自快也碑已少刓其輕畫處俱瘦細失真然是宋時翻刻石若唐時未泐本必當更妙八闗齋功徳記王氏跋一記文宋州將吏為節度田神功疾愈請禱此猾禆媚驕帥之常無足怪者第其時有可既也此既是猾禆媚驕帥之文不知顔公何為為染翰焉干禄寺碑王氏跋一余讀顔魯公家廟碑知公世有書學及覽顔秘監干禄寺書益信葢秘監於公為伯父其所辨證偏傍結構雅俗燦然書曰干禄葢唐以書判取士故耳跋尾句生亦翩翩邯鄲可玩也歐公集古録稱魯公書刻石者多而絶少小字惟此注最小而筆力精勁可法又云石殘缺處多世所傳乃楊漢公模本而大厯真本以不完遂不復傳然則司冦所得葢亦漢公本耳臧懷恪帖王氏跋一臧懷恪碑顔魯公撰并書恪再為王晙蕭嵩兵馬使積官右武䘙將軍封上蔡縣侯三贈而至工部尚書則以子希讓貴故也兄懹亮至左羽林大將軍懹恪有子七人咸顯而希讓至尚書節度使書法偉勁不減家廟而石完不泐尤可喜也唐史不立傳若非魯公書碑即湮滅無聞矣雖百朱輪何益與郭僕射争坐位帖王氏跋二余少則艷魯公坐位帖晚始得此佳本為之摩挲竟日意草稿耳乃無一筆不作晉法所謂無意而文從容中道者也按元章待訪録是楮紙用先豐縣先天廣徳中牒起草秃筆今此石刻中秃筆宛然此帖妙處乃在具八面勢怱促中却安閒自在葢縁楷法精熟至急用時但作帶筆真字姿態自溢㸃畫間徘徊掩映真有無限意趣元章謂詭形怪狀得於意外信然然總係唐楷法所以筆筆皆到不作風行草偃勢要只是多寶塔餘態司冦謂無一筆不作晉法又非也今胥史起稿賈人登簿亦每暗合此法亦以年久冩之熟自無意間得之抛擲處尤逼真但腹中無魯公楷式故不能若此沉著饒古意耳都元敬寓意編謂馬主事抑之家藏有米臨此帖内有元時袁文清桷跋謂京兆安氏嘗刻以傳世呉中復守永興以安氏石未盡筆法因再摹京兆永興皆陜中地名今石在陜中豈即安氏原石耶抑永興重摹者耶又謂安氏分柝時剖此帖為二至僕射指下遂平分為兩以石刻較之正居其半今此帖共六十九行僕射指處止十九行正得四分之一多二行豈馬所藏本又止半幅耶元章書史又謂内小行是於行間添注不盡乂於行下空紙邊横冩與刻本不同若是米臨本亦當作横冩乃是何袁跋未見言及此帖首十餘行尚覺屈彊未舒至僕射指以下乃始活潑飛動至皆有等威後又更渾化入妙結末數行筆已倦意已懈而餘興淋漓更出屋漏雨蹟殆若所云懷素自言初不知者若分得後半當是獲膏腴産矣袁跋又云嘗得坡翁搨本無毫髪失真蘇公見安師文帖時帖尚全嘗手搨數本書遂大進又云蘇本付瓘米本付瑾以免安氏兄弟之誚蘇本久不聞應已湮沒馬氏藏米本不逺今尚能存否元章極賞此帖謂石刻粗存槩耳何縁得臨木觀之是筆冩或尚存生動態也内尊者為賊所偪當是賤所偪又别置一搨下重使字想皆係原稿誤古人書皆手冩其正本奈何反不傳顔魯公祭姪文王氏跋一陳深陳繹曽文徴明三跋博雅殊稱是真蹟在永豐聶氏九可寶也祭豪州刺史伯父文王氏跋一此帖與祭季明姪稿法同而頓挫鬱勃似小遜末有緇郎題名可恨祭姪季明文前已見停雲帖中祭豪州公文余少時曽見一本於書肆中恨未買得其鬱勃頓挫視季明文果小遜然秀密似稍過之計魯公平日屬草當不下萬餘何郭僕射書及此兩祭文草獨傳豈果忠義哀痛有足相發兹所謂遇其合者耶楚金碑王氏跋一按賈氏談録言通微為學士工行草然體近吏中州士大夫效習之謂為院體此碑清圓有餘遒勁不足得顔尚書小許鉤磔便脱此病書近秀媚風度亦可觀第結構全疎欹傾聊且頗似初學書者顧何以亦負時名石今尚不磨泐豈係重翻本摹其泛駕遺其駿骨耶峿臺銘王氏跋一元結次山撰峿臺銘見歐陽永叔集古録中次山凡文多從顔尚書真卿李學士陽氷索書此篆書不知陽氷作者或自作之次山於文爾雅然不能髙而愛身後名甚銘亦類是次山兹銘歐陽永叔跋謂非好古者不知為可愛司冦跋謂於文爾雅然不能高今元集中無此銘止有浯溪銘尉遲祠祈雨碑王氏跋一攷之碑詞則唐張嘉佑祈雨於尉遲勤之祠應而屬吏紀者也勤為太師從子義師之役實從死焉書法絶似蔡有鄰而少放得非亦其筆耶祈雨一應遂乃勒碑亦遂留傳至今天下事固各有數耳李陽氷篆書謙卦王氏跋一李陽氷此刻雖再登石居然有殘雪滴淄之狀是廷尉正脉余家有此搨本曽以飾圍屏書勁而細然筆筆有態古篆今存者少宜寶之成徳節度徳政碑王氏跋一右成徳節度使李寶臣徳政碑寶臣降虜與田承嗣軰創藩鎮之禍其人本不足道碑詞脇下為諛餒謭不文獨王士則者僅見陶九成書譜中不甚著而書法遒勁瀟灑有李北海張從申之筆良可寳也碑在真定御史行臺不易搨余搨有數本文亦稍糢糊不全其字豐肉而飛動有勢法亦自李北海門中來然蕩而不疎艷而藏骨游筆間覺從容有餘態趙松雪冩碑云歩驟李顧視此尚隔一塵也評書以時代信是耳食然竟亦豈能全廢枊尚書諸葛武侯祠記王氏跋一右裴晉公度記枊尚書公綽書是時在武相元衡幕中三公勲業年位雖小異要之不愧忠武侯者柳於書不得稱名家獨米元章謂其勝誠懸今觀其行筆飄灑雄逸無拘迫寒儉之態真足塤箎第結構小疎不能運鐵腕捺磔間耳碑在成都可七百年矣完好尚如新得非以僻故存耶余友詹惟柄為成都守曽寄一本字僅能具態耳以塤箎誠懸尚有慚色何得云過之裴晉公文是唐時常體然頌武侯語甚精殆志意有符契哉董宣傳王氏跋一碑前有四字篆書漢董宣傳傳作中楷結法俱精雅有方圓意而不具人姓名當是唐能書者書之也唐人固多能書者第不知何為獨書此傳柳書西平王碑王氏跋一西平忠武王神道碑裴晉公文柳常侍書石刻在髙陵縣墓所苔蘚剝蝕字畫僅存然要之含蓄於元秘也至於料吐番背盟事文中絶不載豈有所諱耶所記官秩如初拜盕道帥後以邊將入為神䇿都知兵馬使始加左金吾衛將軍未嘗為右金吾大將軍復以神䇿先鋒討田悅加御史中丞再加御史大夫左㪚騎常侍非檢校官所記諸子僅十二人史稱十五人皆當以碑為正耳太保聽能求誠懸書父碑亦可謂有意不朽矣晉公名相也文雖不及韓柳然言之足重過之且亦非不能文者聽此舉未為全失若近世其人貪邪乂不解摛辭乃徒以官爵髙趨之此則又出李聽下數倍者也使李愿若在或尚知乞昌黎文然是時愿已亡矣元秘塔碑王氏跋一元秘塔銘石刻在闗中㑹昌元年建柳學士公權書裴觀察休撰又十二年休始以鹽鐵使入相此碑柳書中之最露筋骨者遒媚勁健固不乏要之晉法一大變耳柳書惟此碑盛行結體若甚苦者然其實是縱筆葢肆意出之畧不粘帶故不覺其鋒稜太厲也全是祖魯公家廟碑來久之熟而渾化亦遂自成家矣此碑刻手甚工并其運筆意俱刻出纎毫無失今唐碑存世能具筆法者當以此為第一復東林寺碑王氏跋一復東林寺碑柳河東書是年大中丁丑河東自太子賔客復拜常侍又二載以太子少師元㑹占奏耄謬奪俸書碑時葢已幾八十矣中多作率更體而小變遒勁為文弱亦可愛也誠懸幾八十猶能書碑平生作字甚多何目力乃能不傷如此近文氏父子亦然殆是天縱集柳書普照寺碑王氏跋一此碑遒勁方整有一夫當闗時力視誠懸真蹟不啻如之金狄人奉金教猶不忘臨池江左呉傳朋張即之軰為可愧也撰文者為仲汝文粗能其家言第云寺故右軍王羲之捨宅者􅄭右軍渡江時未十歲當是淮南公捨耳柳書露筋骨易於摹刻故雖自碑刻鉤勒來亦不甚失金狄但知立碑集書者固中原人耳李劍州碑王氏跋一長史名廣業曽祖淮安王神通父雲麾將軍璲子為都統國貞貞子庶人𤦺也以𤦺故立碑碑立之未五年而𤦺用叛僇碑辭多泐闕不可讀書撰人有曰尚書刑部侍郎上柱國原武男有曰使持節華州諸軍事者而皆不可攷矣書法極清婉可觀集古金石諸書俱遺之因志其畧此碑不甚行想亦以錡叛逆故今人搜出則以字故耳濟安侯廟記王氏跋一濟安侯廟記在華州葢昭宗自華歸長安褒賞節度使韓建而及於城隍之神者也記為諌議大夫李巨川撰拾遺柳懷素書所載與史皆合特巨川所䛕建詞過當後梁兵下華州以建所為表檄書奏皆出巨川手又為建畫䇿殺十六宅諸王逐禁旅斂潘鎮資數而僇之距碑成僅一年耳吾故記其事以戒夫文人之貳心而脂辭者唐末事真令忠義人憤恨班孟堅曰哀平際㑹禍福速哉唐兹時亦然僧彦修帖王氏跋一彦修葢與亞棲蛩光齊名者作詩語如避機懶婦書法如淮隂惡少年風狂跳踉俱非本色可歎可歎彦修書雖跳踉然骨力猶存總是素師餘派蔡忠惠萬安橋記王氏跋一萬安天下第一橋君謨此書雄偉遒麗當與此橋争勝結法全自顔平原來惟䇿法用虞永興耳畫錦堂差近之荔枝茶譜不足道也君謨此記全歩驟中興磨崖碑第微覺肉勝碑原係兩石嘉靖中遘倭患燬其半土人取舊本摹補之前一片仍舊刻也蔡端明荔枝譜王氏跋一蔡君謨荔枝譜一卷昔人評其書嚴正方重如土偶䝉金今無乃類之乎此本棗木刻在閩中故不能大佳耳白樂天序稱荔枝樹形團團如惟葢葉如桂冬青花如橘春榮實如丹夏熟朶如葡萄核如枇杷殻如紅繒膜如紫綃瓤肉瑩白如氷雪漿液甘酸如醴酩大畧如彼其實過之蘇子瞻詩云海山仙人絳羅􅃭紅綃中單白玉膚此皆為荔枝傳神君謨不及也然彼是巴蜀嶺南荔枝耳似不足辱二君子語樂天序子瞻詩皆是俊語此須乞虞永興歐陽率更書之若端明荔枝譜正可自書耳晝錦堂記王氏跋一韓魏公以上相作畫錦堂於相州時歐陽文忠公以㕘政為之記而蔡忠惠以三司使書之時稱三絶又謂忠惠每一字必冩數十赫蹏竢合作而後用之以故書成特精絶世所謂百衲碑者是也凡書貴有天趣既係百衲何由得佳且刻碑須書丹乃神若冩數十赫蹏擇合作用之不知若何入石如用朱填則益失真矣韓魏公書北嶽廟碑王氏跋一北嶽廟在曲陽中有一白石梁相𫝊云是舜時從嶽飛至者因祀於此其説迂誕不可信然古樹遒竦有二塑鬼竒甚皆千年外物碑刻亦稱是魏公書全師多寶塔碑但用力未深祇得其形似所以方嚴多秀媚少然聞當時效之者頗衆則以其勲業故淮瀆廟記王氏跋一大中祥符間修淮瀆廟知制誥路振記之書則待詔楊遵度也二子於名俱不甚𫝊文踏拖固其習書法甚熟於聖教而用筆稍粗大相國寺碑王氏跋一右寺碑在大梁翰林承㫖宋白撰待詔呉郢書完好若新立者白亦頗有文名而詞蕪雜不工郢雖不能脱祗侯習頗遒勁殆類誠懸集書宋初沿唐習能書者尚多此兩碑猶非其佳者海南黎君華曽示余數碑皆遒媚有姿雖不及唐人以趙松雪視之未知孰勝宋真宗先天太后贊王氏跋一真宗此書在亳州龍徳宫遒逸有致葢以其年正月謁龍徳耳先天太后者老子之母也唐系自老子尊徽號曰𤣥元皇帝故太后之號因之乃宋亦爾耶真宗好文之主書固宜工嵩嶽廟碑銘王氏跋一右嵩岳中天王廟碑盧崖州撰有唐季衰薾之風孫崇望葢以書待詔者運筆圓熟毋乃通院體之遺耶此書未佳猶在大相國寺碑下大觀御製五禮記王氏跋一大觀五禮記石刻在大名舊城字畫不甚密而遒朗可取或云徽宗御筆也徽宗能作瘦金書於楷法不足或是蔡京耳徽宗以書畫自務果其書必標以御筆或有押字若蔡京書贊兹盛典恐亦必書名今無欵識當祇是待詔書爾醉翁豐樂二亭記王氏跋一筆法全祖碑側記但増以秀媚然亦有雄古氣大約蘇書大乃愈佳也司寇公素不甚滿永叔若此二記恐弇州集中亦未能多有法何必古醉翁記以㪚文行賦體正自竒處可謂前無古人第不可有二耳豐樂記意不深而醖籍有餘味其精神祇在求戰地不得遂轉入休養生息意前後掩映機軸甚妙坡翁書與此二記正相稱也荔枝丹帖王氏跋一東坡公書柳子厚羅池銘辭遒勁古雅是其書中第一碑子厚英秀鬱鬱未吐沒為明神亦是常理獨怪嫚客死當是伊伾文態未洗盡耳余無此石刻本然有一墨本乃鄞張君所惠似是先用鉤法具間架後乃更用筆書之者穠艷而勁發有勢疑是南禺先生所臨因此思其原本必絶妙今跋稱是坡翁第一碑諒不誣也羅池神能使嫚者死世俗驚畏正在此司冦乃以伾文態􅅓之是董狐筆金剛經王氏跋一坡書金剛經刻石者二其一後有甘昇提舉跋為甘刻其一前有篆書十餘字凡坡書瞥法多拂起是右軍臨宣示筆意甘本失之今此舊本也第石理麄漫鋒鎩多中斷耳金剛經是釋氏心印品第不知坡翁書此是欲治心是欲種福蘇書三十六峯帖王氏跋一坡公此書古雅大勝季海賦極不足言亦不見坡翁集中長公諸小文字多不存稿此賦是以書傳耳蘇書歸去來辭帖王氏跋一此帖頗似李北海流便縱逸而小乏遒氣當是三錢雞毛筆所書耳前歸去辭字畫全不佳後題跋六行稍縱逸有態此碑是延祐乙卯彭澤縣摹刻者當是石理粗刻手拙耳司冦後於文休承處見佳臨本有跋極贊其佳懊戲題此雞毛筆語云罪過表忠觀碑王氏跋一武肅王初有國將築宫望氣者言因故府大之不過百年填西湖之半可得千年武肅笑曰世有千年而不出真主者乎奈何困吾民為遂弗改此其智有足多者五代史歐陽懟筆未盡徴也觀中碑今已重摹擘窠大字與醉翁豐樂記同法而更加嚴重若以飾圍屏信偉觀也荆公與長公極不合乃獨稱許此文可見古人服善宋人言荆公初見時極擊節連曰此何語也數次繼乃曰此三王世家也潘子真又謂公云是漢興諸侯王年表此兩語皆是似三王世家是形似諸侯年表是神初據形言久之乃悟其神耳文得於神斯善法古矣武肅王草莽英傑事要不能盡善惟知安心待真主始終臣事中原故能保其封疆耳其不填西湖亦是此意司冦據錢氏私誌謂五代史係歐公懟筆恐未然歐公平日推尊文僖公甚至歸田録所記惟贖珊瑚筆格一事稍短於明察然亦不失為厚徳其他若好讀書若不得於黄紙書名皆佳事好讀書尤為不易及何得云非美談武肅乃文僖曽祖有何大怨直至上誣及歐公曽同謝希深遊嵩嶽歸抵香山錢公遣歌妓徃謂因挾一妓為錢公所持尤非文僖固不純亦不因歐公言損品大抵凡子孫類為祖父䕶前稱道微未至怨遂歸焉文人負謗皆縁此近世尤甚凡頌人必得如孔顔乃滿志若止如孟子輿云有圭角卜子夏云見紛華而説亦卒不快矣但不意弇州公亦未鑑錢氏懟説東坡陶詩帖王氏跋一司冦公後以此彚入小酉館帖中共詩三首孟夏草木長一首人生歸有道一首種豆南山下一首使非㓜于搜得便終湮沒古碑不為人所知沉埋於苔蘚中者何限哉蘇書連昌宫詞帖王氏跋一長慶集中百官隊仗避岐薛宋人多譏之謂岐薛二王物故已久為元微之悞用事今書作岐路葢真本也作岐路最是正與下車鬭風句相應蘇書中山松醪賦帖王氏跋一此賦不為甚工坡翁乃好書之豈固有獨得韓公所謂惟以自嬉者耶東坡絶句松醪賦帖王氏跋一東坡絶句三十首松醪賦一首用筆流利輕俊指腕間蠕蠕有生色文待詔精八法者吾嘗得其臨本終不似也謂流利輕俊信然第筆勢稍寛弱豈刻手拙耶然蘇公字但小便弱亦不獨此馬劵帖王氏跋一子瞻以天厩賜馬遣李方叔使鬻之而為書劵魯直又為跋索十萬錢大是佳話馬劵事甚竒可賞三公皆名流彼買者想亦非俗士倘獲挂名劵中十萬錢不為費東坡告史全節語王氏跋一坡老言詩至杜工部書至顔魯公畫至呉道子天下之能事畢矣能事畢而衰生焉故吾於詩而得曹劉也書而得錘索也畫而得顧陸也為其能事未盡畢也噫此未易道也能事畢三字絶有分曉畫吾不能知若謂詩文字至杜韓顔三公而極余未服也葢藝至此乃全入今其機竅入人心髓今人為藝若刻意搜求未有不入三派者其道至此窮矣無但曹劉鍾索即先天以前猶别是一面目今人若舎三派必須力倣古先方能絶類不染不然忽不知己入窠臼矣何仲黙謂古詩亡於謝古文亡於韓亦是此意第褒貶不同調耳東坡雜帖王氏跋一右坡臨懷素王右軍桓大司馬各一首雜詩二首桓字元子今跋尾稱黿子又云征譙縱時書皆誤也征譙縱者劉裕此當是平李勢時書黿子或不誤古人讀書多當别有據不當以譙縱累之東坡詞王氏跋一坡書此黄州二詞行模大小絶似表忠觀碑遂無一筆失度恐好事者若聖教之勒石也内百年强半來日苦無多語人或憂之而公􅆒厯禁從節帥又十六年而後殁四百年後乃為唐伯虎作識無情之能感有情也如此謂是詞字如聖教勒石是漢庭老吏筆伯虎祈夢祗得中吕滿庭芳字耳然則何不取百年裏渾教是醉三萬六千場而自認强半無多語耶人自錯反令夢不錯大是怪事寄文與可絶句三十首王氏跋一公此書不甚假腕力而遒婉秀媚有筆外意詩亦多清麗可喜豈公以此君故瓣香洋州使君耶書儘饒態第不甚强勁蘇長公行草醉翁亭記王氏跋一新鄭公家藏蘇書醉翁亭記今刻之石結法遒美氣韻生動極有旭素屋漏痕意第不類蘇長公余見蘇行草不少惟濁筆一二得似耳正書遂無毫髪且公此書既不登石不應復用前跋豈公沒後有王逸老者居恒欲出懷素上乃其筆耶或南渡諸公如陸務觀張溫甫軰覩瑯琊石刻戲書之耶又念三君不辦此妙境令人怳怳跋尾超呉興小愞弱而疎不應稱宋及趙子固沈啟南呉原博跋恐亦未為真耳余曽見此搨本無但非蘇公書亦非宋人書其使轉間雖勁有力然不免帶俗帶邪頗類近時李太僕及長沙相兩公脚手又間雜以解縉紳宋仲温法此等書固時有當是正成間老臨池手耳新鄭相獲此帖於徽邸甚自寶愛即其弟姪亦不能多見後江陵相自家入京時過新鄭宅語談間忽問及此卷既去髙公曰彼豈尚索我賄耶因更侑以别物并卷餽之張受之去人或言張後復以卷構髙罪則未可信山谷書狄梁公碑王氏跋一昔人謂狄梁公事范文正公文之黄文節公書之為海内三絶然文篇法既俳書勢亦傾側未足絶也黄正書不足存有韻無體故也宋初尚多排體文正此碑是詞科髙手然亦不落莫魯直書稍大乃佳尤貴蒼老此書有嫩氣又小故姿態未溢祗覺傾側要之文與書亦皆足傳第以並梁公之勲業為三絶未免有慙色耳當神功聖厯間持正論者頗多亦不獨二王但后所倚重在梁公故梁公專其功姑姪母子兩語人皆誦之謂梁公以此動后愚意竊謂未然此語於理甚淺后亦豈不知且后既自稱帝矣所行原係反常事若已為周太祖而承嗣三思下以此世及即如此立廟以不遷臨百世於后心亦何不快子母詎能奪焉第后知識明達見爾時人心未忘唐惟任婁狄姚宋軰所以天下安然若盡付之楊再思來俊臣諸人手則徐敬業等當更環視而起必不能一朝居矣即使不聽梁公終不返廬陵后身死後衆臣亦必共推戴睿宗果立承嗣為太子亦祗足供北軍之誅耳后無雄傑為輔故事不成梁公能不動聲色使奸邪斂迹此所謂取虞淵之日山谷中興頌碑後詩王氏跋一山谷中興頌碑不後詩是論𤣥宗語俯仰感慨忍再讀迫急詰曲亦今人易厭書法翩翩有致惜摹搨久遂多失真者余謂坡筆以老取妍谷筆以妍取老雖側卧小異其品格固已相當跋尾云惜不得秦少游妙墨劉之崖石少游當亦善書爾時謫藤州故谷念之耶此詩開口即可厭立論庸腐亦無所謂不忍再讀第就彼道中亦可稱霸滇南耳書固佳以居魯公兩廡可無愧司冦不識秦少游能書亦是異事山谷書大江東去詞王氏跋一銅將軍鐵著板唱大江東去固也然其詞跌宕感慨有王處仲撾鼓意氣旁若無人魯直書莽莽亦足相發磊塊時閲之以當阮公數斗酒蘇此詞黄此書俱非雅品非當行而皆磊落自肆正是一派真足當阮公數斗酒余有此舊本而失却首幅不知刻石在何所愧無從覔補山谷七祖山詩王氏跋一山谷登七祖山次周元翁韻詩其書本得意筆而為再刻故且石頑而工拙所用峭拙取老取媚意殆盡其僅存者偃蹇桀驁之態耳詩亦頗自負得意語而類為拙工頑石所侵者何也人苦不自知何縁復寄王子駿此字大幾可四寸甚易刻乃不能得其筆意信哉石頑而工拙也魯直詩自是别傳司冦亦無庸饒舌山谷書東坡卜算子帖王氏跋一臨江人王説謂坡此詞是為惠州一女子作意或近之食時五觀帖王氏跋一涪翁食時五觀乃小乘經觕語耳然不可不時使何太宰王侍中讀之筆法極輕弱而鮮餘味余有此舊搨本字畫飛動筆力最熟最精勁當是涪翁佳帖司冦乃以輕弱少之殊不可解豈得其翻刻劣本耶涪翁雜帖王氏跋一涪翁草書自作偈語一通又唐詩二首此公自謂得長沙三昧一時亦翕然歸之其風韻態度誠翩翩濁世佳公子也即無論結搆與素師手腕有剛柔之異識者自得之素師手力勁然字形醜涪翁手力弱然字形媚廬山髙歌王氏跋一歐陽公廬山髙自謂出李杜上不滿識者一笑然其雄勁豪放亦是公最合作詩也山谷此書恣態猶存而鋒勢都乏豈石頑工拙故耶歐公初為此詩梅聖俞恨未見郭功甫為頌之聖俞極歎賞令再誦因置酒又再誦每誦一遍酒數行如此十遍竟不交一言而罷今司冦乃短之如此亦時尚異耳歐公失處乃由用險韻又不能以五七言行之却作枝蔓語輾轉以就其韻故味不長然歐詩他佳者尚多謂此為最合作詩亦未然蔡卞靈巖寺疏王氏跋一米南宫謂卞得筆此書圓勁遒美有兼人之力而時以己意參之葢有書筆無書學者要之不可以人廢也曹娥碑王氏跋一蔡氏兄弟固皆能書然學力不深其得附蘇黄米三公後是以官重今黜去以君謨當之是以人廢米南宫天馬賦王氏跋一韓宗伯有一墨本示余頗豪勁有態詹東圖謂是真蹟余細觀之即此碑臨出本耳鉤填蹟顯然米南宫雜帖王氏跋一元章三絶句又二紙神氣奕奕射人令人覽者爽然元章帖石刻者少此石不知在何所亦未盛行米元暉夫子廟記王氏跋一米元暉書夫子廟記石刻在呉城中書亦秀頴可愛但結法既不古又乏變態耳今人學元章不成多似元暉祗習父業不能探其原本故醖籍少趙子昻帖王氏跋一吾鄉人陶氏治地得藏石凡法帖十卷後二卷為姜堯章盧柳南餘俱趙呉興書呉興畫蘭一本清絶楚楚與王摩詰蕉蘭同韻此帖為顧善夫所刻内千文歸去來辭西銘各闕數行陶謁文太史書補之文固辭曰莫易視吾不能為後人笑端人謂太史勝束先生補亡逺矣彼宋康王之於呉傳朋非無此論但恨晚耳此帖今呉中盛行是松雪通行書未為甚佳獨畫蘭果清絶衡翁不補趙帖良是第於懷素千文真蹟却何為手補余在唐元卿處見山谷行書石刻衡翁亦補一幅夫何嘗不補豈陶氏無識欲此翁作偽蹟刻石耶趙子昻雜帖王氏跋四次跋云左太沖詩於曹氏兄弟猶子昻於大令父子可謂逼真三跋云服食帖家弟初見之驚愕咋指謂呉興遂能造此妙境既讀跋尾知為臨右軍筆也相與愀然歎佛菩薩地分不同如此四跋云子昻大書不如小楷書不如行豐碑大碣螭首龜趺要非其至者須於閒窓㪚筆有意無意間求之耳赤壁賦刻之江右王邸與蘇賦俱變體之佳者子昻於大令父子應如韋蘇州於陶彭澤氣韻非不似然相去卻逺今謂猶左太沖於曹氏兄弟恐未足當二王帖敬美所熟見何為不能辨服食帖臨本直至讀跋尾始知之耶佛菩薩地位不同自是當行解大不如小楷不如行豐碑大碣不如閒窓㪚筆以此評趙松雪最為確論淮府赤壁賦余有搨本是此公得意筆趙呉興佑聖觀記推官㕔記王氏跋一佑聖觀記在杭州本觀推官㕔在湖州郡齋俱規摹李北海番君廟碑王氏跋一番君廟碑者記故長沙文王呉芮也芮以故番令不能為秦死特以寛厚得物情厯數代而卒垂三十年而人祀之有加不亦幸哉元學士明善文趙承古孟頫書皆暮年筆故老勁而書尤可喜也趙碑字多方穩故韻不長番君碑較蒼勁司冦責番君不死秦秦有天下祗十五年芮不能死楚何為死秦亡秦必楚謂為楚報秦可也道教宗傳碑王氏跋一碑為集賢修撰虞集撰學士承㫖趙孟頫書葢叙真人張留孫元教之所由始自張聞詩而下及其徒陳義凡八人皆贈真人留孫位已至開府而其孫呉全節亦階特進元之名器濫觴至此哉且虞公修撰集賢而留孫實知院事其文與書雖美不足論也元俗大約尚鬼故奉道釋教特隆重留孫尚有像贊及碑銘俱趙子昻撰并書在今都城延祐宫書與此同文不及虞也虞文靖垂虹橋記王氏跋一文靖此帖儼雅中有餘意不失中古衣冠可重也重建廬山東林寺記王氏跋一右記為垂章閣侍書學士虞集撰所志寺顛末頗詳而書亦圓婉可愛特少遒耳文靖碑不多見此兩碑尚期搨來一讀之孫真人碑王氏跋一孫真人徳彧碑鄧集賢文原撰趙承㫖書徳彧即書重陽真人碑者承㫖此書不甚取骨而姿韻溢出於波拂間葢能用大令指於北海腕者也一道流而能令翰林諸名公為撰文為冩碑彼時道教之重如此今時不能爾也王重陽碑王氏跋一右碑為金密國公璹撰至元而道流李道謙書之亦遒偉有法按重陽名嚞初業儒不成去業武不就偶以遇異人得度遂為全真教主張大其説而行之者皆其徒丘處機力也馬丹陽碑王氏跋一丹陽真人初名從義後名鈺重陽上足也碑為元學士王利用撰而道流孫徳彧書文頗詳腴而書尤勁有魯公遺意道流固習書元時書學尚盛故兩人書皆可觀王重陽仙蹟記王氏跋一重陽仙蹟記金翰林修撰劉祖謙撰而姚牧菴璲至元世祖朝以安西文學為書書法全學宋文貞碑比之孫李不作墨猪氣元時仙教大興諸仙蹟詭異者甚多不獨王馬兩公豈賢傑不為用皆逃而之羽化耶雪菴茶榜王氏跋一元僧溥光書茶榜其詞紫方袍底語耳不得禪悦真味書法風骨頗遒勁畧具顔柳及眉山豫章結法此茶榜刻今世多以飾屏字全師顔魯公雖天趣未流動然亦有骨力余曽見此僧他墨蹟頗遒勁可喜趙承㫖郡學碑杜待制清真觀碑王氏跋一右趙承㫖郡學碑杜待制清真觀碑各一通併為一帙杜規摹趙遂無一筆失度政猶羊敬叔之於小王耳杜待制何名其書未見宋璲千文王氏跋一仲珩此書頗得晉唐人筆意圓熟流便有弄丸運斤之勢惟結法小疎耳不知此千文是何體世所傳舎人書多行草耳俞紫芝四體千文王氏跋一俞和元末人紫芝其别號也刻意呉興頗稱優孟此四體尤精然不免露本色耳宋俞秀老號紫芝吾友俞允文絶不稱號近刻一私印亦曰紫芝三君子皆俞姓皆善書亦大竒事也余有此帖其篆乃鍾鼎文據文徴仲跋謂是倣趙文敏書宋克前後出塞詩王氏跋一此刻在闗中今每以裝於懷素千文後不知何説豈石相連耶字亦小有致然無古意祗以章草法助佻勢未為甚工七姬帖王氏跋一七姬誌銘為潯陽張羽撰束呉宋克書文既近古而書復典雅有元常遺意足稱二絶第其事大竒而不情楊用修跋可謂得其隱真漢延老吏也跋謂其事大竒而不情極欲得讀之恨未覔得枝山十九首王氏跋一京兆此書清圓秀媚而風骨不乏在大令下李懷琳孫過庭上真蹟在休承所近聞以桂玉故鬻之徽人已見前停雲館帖中祝書唐初諸君子帖王氏跋一祝此跋為刻禇登善者祝跋已入石而登善摹本在許元復處未及授刻為恨筆法清婉貴麗置之武徳貞觀間誰能辨也跋己入石而摹本尚留亦是異事禇書是何帖跋未明祝京兆味泉賦帖王氏跋一此書二十行外𨽻分溢出古雅有餘若鉤剔之際少加含蓄便是大家王文恪墓誌王氏跋一此書方於晉而疎圓於歐而不局是祝金石中第一手毛中丞夫人墓誌王氏跋一此書視王文恪志銘運筆小圓形差匾古雅亦相亞也六體王氏跋一韓淮隂自謂用兵多多益善此帖近之惟學素師腕差弱耳王文恪墓誌最有名然余尚未見六體帖舊曽有今失去亦不為甚佳祝真書有一種近𨽻者雖古勁然頗倔强非本色君子亭記王氏跋一陽明先生謫龍場用王猷張廌例為亭竹間而手書記於壁後人為摹刻之書與詞皆工而差可讀也陽明先生書晚年最蒼老入妙此書尚覺如河朔少年沓拖而不可耐不知弇州公何為反取之若論文章固是此時者工王新建紀功碑王氏跋一新建既俘宸濠獻之歸待命於南昌而勒者也文成公凡功成每有手書碑紀之文與書皆磊落可喜華氏義田記王氏跋一華從龍先生此舉是范氏家法應徳此記宋文之有致者徴仲此書漢𨽻之有鋒者徴仲自矜𨽻書然刻碑者少用以存模古意亦足醒眼豐考功筆訣王氏跋一豐考功筆訣一册故鄞人豐道生所著道生初名坊以罪竄易今名皆采古八法精語而時附以己意其最宗者右軍耳兼享魏晉而旁及唐人至宋元及近代則齒牙餘剔耳吾謂豐氏有書學而無書才者此亦一徴也余生平見南禺公草書甚多皆精勁有古法臨古帖尤妙唐元卿稱為我朝第一惟未見楷書此帖所刻稍拘弱未為快也𨽻篆是勉强為之視文氏父子逺遜首五章論書法甚精學者可置座右第中釋折釵股一節謂是水墨得所肉匀骨勁冺規矩於方圓遁鈎繩於曲直嚴重渾厚而不為蛇蚓之態則似未然折釵股乃是草書中波畫用已退筆擲之其义頭處類折形㣲曲處如釵股右軍草帖中有一筆絶似呉中一友曽指余其帖今不常有今閣帖第八卷末後詫字外臂懷素自叙帖中張長史長字上二筆俱㣲有此法是筆法精熟中􅉫弄竒態所以妙若如南禺所言則祗可如釵股其折字説不去又凡金鐵物類僵而不活若但欲其勁而曲又何必取論於釵愚此解未敢自謂是願知書者辨之書畫跋跋卷二下
