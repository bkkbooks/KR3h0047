body:
  text: 書畫跋跋卷三明孫礦撰畫史道碩八駿圖王氏跋一謝赫畫品謂史道碩師曹衛與王微齊名而王得其意史得其似不無甲乙至李嗣真續畫品雖屈第中上然在二曹顧陸前則與赫異矣貞觀公私畫史稱史有八駿圖為隋朝官本宋宣和帝因之遂入晝譜此卷首雖殘破然有祕殿印記即趙吳興白錢塘亦定其為史本無疑也余嘗考圖畫見聞志謂晉武帝臨御得穆王八駿圖本令道碩摹寫之厯宋齊梁陳以為國寶至隋破臺城為賀若弼所有齊王暕以駿馬四十蹄美錦四十段購得之尋獻焬帝至唐貞觀中敕借魏王泰因而傳摹於世今此卷無貞觀小印當是人間摹本第其絹素精古筆力髙妙與郭若虛所記無不吻合段萬厯初黃金臺買此以為差勝駿骨遂識於後萬厯丙子西域貢一馬云是千里馬主上不受余時在客部曽同僚友觀之於時聞者亦爭來觀馬髙可五尺神氣壯偉若奔踶不可羈首直昻上腹下自項直至尾有脊骨一帶人曰此龍種也世傳八駿形狀怪異不類馬今觀此圖何嘗不類馬惟昻首及腹下脊骨是其竒處正與貢馬同耳弇州公得此圖正在太僕因遂刻置太僕廨中余有拓本馬髙八尺曰龍貢馬若以周尺計之亦既八尺勘書圖王氏跋一右一卷相傳為唐文皇訓子圖閻侍中立本畫元故恆陽文正王手定為神品第一圖中隱几而坐者天顔肅穆目力注視奕奕有生氣童子娟好靜秀展卷畏篤一武將拱立豐下而謹若不敢肆者然可想見其搴旗挾將之力餘一侍童二介士皆各得其意上有宣和殿印初翳若霧余令善工洗之則硃色隱透光彩射眉睫間而器物之妙絹素之精斷非後人所能贋者第文皇面頳而虬髯挺發可畏以故世稱之曰日表曰髭聖今像頗不甚合且爾時教承乾則不應命立本圖教髙宗則已長亦似未通而余乂嘗考宣和畫譜立本所遺無此圖僅有偽蜀黃筌勘書圖二卷此豈其一耶蓋宋初諸降王中惟孟昶有天人相見於花蕊夫人所供其童子為元哲武士為趙廷隱而當時進御者以勝國故不敢具其實故目之為勘書圖理稍近耳第其冠服類六朝不甚似五代則有未可曉者按東觀餘論有北齊勘書圖跋云是楊子華畫今司冦謂此圖冠服類六朝正相合但黃跋謂人物衣冠華虜相雜又云所寫人如邢子才魏收輩豈在其間乎又云他本尚餘兩榻有啓軸隱几而仰觀者有執卷搘如意而沉思者數輩蓋當時畫此弗但一通也今此圖稱隱几而坐者天顔肅穆童子展卷一武將一侍童二介士則又不相合豈黃筌用古裝寫今事耶宣和帝不妄署果孟昶彼時必有人識之今既衣冠類六朝北齊圖又云有數本然則當是黃臨楊簡略本耳石刻十八學士圖王氏跋一右十八學士圖督府參軍李子獲閻中令舊本摹勒上石所謂周昉貌趙郎併得性情者也余曽見此石本無他布置景物止一人一像十七人俱向左獨許敬宗身仍左而面特轉向右好事者或遂謂露傾邪狀夫許豈無正面時豈果閻令有意為之耶摹閻立本十八學士王氏跋一余為李參軍書十八學士石刻之明歲而公瑕以畫本見遺云自青瑣摹得者其人物極為精雅服有緋紫青緑四色皆中褁而獨蘇世長黃冠禿無髮腦傍有七黑黶若星者極肥而短頷鬍鬖鬖被口與虞世南面皆皺紋蓋二公仕隋甚久年可六十房杜少而澤與史合也其間有抵牾者圖稱房玄齡字喬年薛莊字元敬陸元朗字德明姚柬字思亷顔相時字師古而唐書稱姚思亷字簡之房喬字玄齡以字行陸德明薛元敬字即名也沈存中欲以是畫而證史之誤余又考之史蘇典籖名朂今日旭顔相時亦不當字師古師古相時兄也又唐武德中制三品服用紫五品以上朱八九品用青緑腰帶搢垂頸於下用撻尾勳官隨品加佩刀礪紛帨貞觀初始以深緑為六品淺緑七品深青淺青八九品今所不可曉者房杜既勛邸元僚官品並等不宜杜青而房緋豈房封臨淄侯而如晦僅建平男耶按五等爵男亦不宜青也蘇世長以陜府長史為軍咨祭酒故宜紫然不宜于志寧陸德明亦紫二君官甚卑傳可考又助教蓋文達緑而佩印元齡世南緋而佩紛悅世長志寧兼佩印及紛帨德明亦佩紛帨而它無之也衣皆窄袖短下束帶遒緊豈其時服制尚未定耶存中博極羣書其易持論固宜然吾尚不敢以史而廢圖今欲以圖而糾史亦未之敢也閻真本今在兵科云是先朝所賜凡官省中者無不取觀他好古者亦每借觀之第聞善鑒者云今藏已是摹本先朝本不知何時為人易去此於理良有然者凡官庫物最可易書畫尤甚無但司鑰者得施胠篋之技即在外諸人倘有相似摹本但賄胥人數金即可潛易之矣司冦以圖較史辨駁甚詳第圖雖贋大勢斷不錯史傳錯謬甚多恐未足據敬美定為貞觀物云政於異同間得之可謂子貢之億中不知難兄謂何王摩詰演教羅漢王氏跋一摩詰演教羅漢圖一軸上有徽宗御題押按宣和畫譜雖漢凡四十六軸此其一也摩詰精佛理此圖係用意第羅漢形貌從何處來亦有所本否若鑿空撰恐未安陸宣公畫像王氏跋一余偶得唐陸宣公像於楚中絹素極古行筆有昉幹爭趙郎風而幞頭作折上蓋貞元末公卿大夫已盛行軍容幞獨袍色慘淡似紫而已黯盡或忠州别駕時服也今天下名為治平無諱之朝不知公而在尚有可言者否與能盡公之言否所以稱公相業能大異唐否吾與公之耳孫廷尉與繩善因書其後以遺之與繩旦夕且大用才氣足繼公當於其身驗之也使公在今其遭際或不能如彼時然要無貶謫之禍其相業定勝唐第名却恐不能如唐重周昉擘阮圖王氏跋一擘阮圖相傳為周昉畫一人坐而擘阮即蔡京詩所謂左彈右擘弄清音者也一坐而持扇若拍口若啓所謂手撚輕蕉口自吟者也一坐而傾聽意甚專所謂側耳含情披月影者也京不足道其詩亦常語第奉宣和帝命題此詩而帝手署三字用瘦金體極遒美押法尤妙考宣和畫譜不載昉擘阮圖僅周文矩有之文矩五代人亦一時名手此圖設色運筆風神態度幾可與顧凱陸探微爭衡似非文矩所辦若文矩畫帝亦不令京題詠也弇園九友樓記稱所蓄名畫以此為冠按後續跋此圖係挂幅司冦於挂幅例無跋今獨跋此想亦由愛重之故爾第不知此跋寫於何處一古畫至令人主手署字宰相題詩又鑒賞皆精自是太平盛事不必引政事槩貶第恨不令嘉祐帝及永叔當之宋徽宗紅橋鸂鶒圖王氏跋一宣和帝遊後苑龍翔池見雙鸂鶒翹足紅欄之上因戲為此圖設色不甚深而目睛羽文駢棲自得之狀描寫都盡復作數百言敘其事書真所謂瘦金體乍看不得佳結法亦時時露疏稚而天骨遒美逸趣藹然於細􅥬得之信不在李重光下也按鄧公壽畫繼稱宣平五年賜宰臣以下燕瓊林侍從皆預酒半遣中使持大杯宣勸因以此圖示羣臣靡不環立聳歎稱服神妙然則當其時帝固自寶愛之若此而四百餘年後乃入吾手為遊目助不大幸耶鯫生見帝書畫便以為議論中竒貨吾不爾也宋帝畫余不能評據畫繼所記酒半宣示羣臣事倣佛貞觀餘風令人歎羡鯫生今已化為臭腐無庸談總之人主好藝猶勝别好從余冢宰兄魚脊諭此猶在善一邊徽宗三馬圖王氏跋一里人顧君出宣和帝三馬圖示余或以行筆稍露蹊徑疑為臨本顧其飲齕騰嘶之態溢出縑素間縱爾亦是隆凖公的裔耳前鸂鶒圖據相傳謂是偶覩鸂鶒因描寫者當的是御筆若此等圖恐不無係供奉輩代作范寬山水卷王氏跋一范仲立畫與李營丘甲乙俱在神品此卷層巒疊嶂掩映向背自有條理與宋人評逺望不離坐外者誠相合哉我舅氏見湖翁有寬山水大軸嘗以示客余時尚幼不能知所以佳徒隨衆玩賞而已又戚黨中一相知自云有寬挂幅甚佳為要人強取去餽一權相初時自裝潢人泄之彼因置酒酣暢間婉轉遊説度不能已因贈之權相得之大喜所藏寬畫數十軸皆出其下後此君受要人惠殆逾千金今此畫是橫卷不知視彼軸孰勝然山水宜逺觀應貴挂幅髙克明雪霽溪山圖王氏跋一宋絳州髙克明受眷仁宗纍官至少府監主簿賜紫仍畫院供奉大梁劉道醇第其格燕行李營丘范華原雖屈居妙品第一而謂其端願謹退尤喜幽默多行郊野間博山水之趣箕坐終日歸則求靜室以居沉屏思慮神遊物外景造筆端所請豪舉之士即勢迫利購弗應也卷尾二跋為徐武功吳文定書亦是素師首坐蘇長公入室當武功時在劉完菴所文定為沈石田周題已不無楚弓之歎今又再易主屬之家弟矣今人談帝王畫輒舉宣和帝令人悶鬱便欲戒藝然不知慶厯帝亦善繪事夫留心圖繪研究其趣此豈徒無妨於治當更有益於陶性情也仁宗畫今不可見矣觀克明所以受眷足知帝賞鑑之精夫其端願謹退博山水之趣箕坐終日豪舉之士即勢迫利購弗應此其人品固已超絶徽宗時立博士程畫畫院人至纍百然鄧椿謂其為人品所限多泥繩墨未脫卑凡嗟乎二帝之藻鑑豈待韓范富歐及京黼輩然後辨哉郭熙樹色平逺圖王氏跋一右郭熙樹色平逺圖一卷按熙河陽溫人渠宗若虛稱其施為巧贍位置淵深雖復學慕營丘亦能自放胸臆巨障髙壁多多益壯至宣和帝則盛推李成而謂熙與范寬雖自成名僅得一體然熙之傳世者多號平逺與若虛所記頗不同丘卷尾趙松雪虞道園馮海粟柯丹輩皆勝國名士恨語不甚稱耳熙字淳夫所著有林泉髙致一卷論畫家旨趣頗可喜據郭若虛序熙即其父今司冦乃云渠宗若虛且所稱施為巧贍等語亦非子稱父體豈序刻誤耶平逺二字已見圖大概亦宜逺觀者也文與可畫竹蘇子瞻詩王氏跋二東坡先生嘗贊石室先生畫竹曰詩不能盡溢而為書變而為畫又為作篔簹谷詩余所有此一幀乃石室先生竹而東坡先生題語真足三絶次跋云此卷有李衎題衎宋人善畫竹者也鄧文肅趙仲穆柯丹丘皆元名士也舊在文待詔徴仲所文極愛之時置几案間舍弟得寓目焉余不意購得一賈人肆中殊自愛且以慶此卷之得所歸也宋人謂與可是竹之左氏子瞻却類莊子又云東坡之竹妙而不真息齋之竹真而不妙息齋即李衎也鄉先達史鴈峯公宦吳中曽得挂幅一軸嘉興項氏圖畫記內文與可竹下注云一軸在餘姚史鴈峯家序其先來厯甚明余曽及見果清風襲人第尚不識其所以似左傳處此卷有東坡詩乂有息齋題畫竹名手備矣宜衡翁之愛之也煙江疊嶂圖歌王氏跋一余既已和蘇長公韻題此卷後續覽宣和畫譜目有祕藏晉卿煙江疊嶂圖及考聖朝名畫譜則又稱煙江疊嶂圖行於世然則晉卿作此畫有二本其行世者為王定圖畫而長公作歌者也當宣政間詔天下斷公文及墨迹進御之本豈應復留公歌於後而畫首乃有祕閣圖印蓋定國之本僅餘公墨迹而畫已失矣御藏晉卿别本又有江山平逺及千里江山圖安知不流落人間好事者取以配公書為一卷作蓻林竒􅥬耶若以為延津之合則吾未敢蓋歌詞與畫境小抵牾耳至於分布搆結紆徐掩映之狀妙極工緻斷非南宋勝國人所能辦而蘇長公筆法精純古雅為平生冠又不當參置蜉蝣之足也凡古人所好書詩文皆不止一本其所喜圖畫亦不止一本司冦以歌辭與畫境小有抵牾定為好事者配合良是但蘇公歌恐亦未必即係為王定國書者耳飲中八仙圖王氏跋一唐開元中八仙為少陵拈出覺竹林太寂寂也八公酒德未必過竹林正自可相伯仲耳賀監行草李相雅度恐亦不易及馬逺十二水王氏跋二馬河中逺畫水逺不以水名而所畫曲盡其情狀畫凡十二幀幀各有題字如雲生滄海層波疊浪之類雖極柔媚而有韻下書眻兩府三字其印章有楊娃語長輩云楊娃者皇后妹也以萟文供奉內庭凡逺畫進御反頒賜貴戚皆命楊妹子題署云然不能舉其代及遍考畫記稗史俱無之獨往往於逺他畫見楊迹如一此卷初藏陸太宰全卿家李文正吳文定王文恪俱有跋次跋云題畫後考陶九成書史會要楊娃者果寧宗恭聖皇后妹也書法類寧宗凡御府馬逺畫多命楊題之大兩府者楊石也單畫水甚竒楊娃題畫足嫓美上官昭容惜不覩徐賢妃為文皇署右軍文二卷迹耳石刻聖賢圖像王氏跋一石刻古今聖賢圖像凡百二人在紹興郡學三代以前雖內府所藏亦以意會耳唐文皇虬髯繞喙天下稱為髭聖今本虬而不髯明皇目細而長今作巨目梁武晚節一短瘦老公而今狀偉甚隋文以魁異驚世而今特細瘦文中子髯下垂至腹見於書今微鬚而短凡世所傳古人像多未必真然中亦間有真者第恨莫能辨耳今南京帝王廟係塑像文皇髯亦不虬梁武莫節乃老瘦此狀魁梧安知非中年像耶隋文亦不細瘦乃是像減小耳觀身露特多可見項羽戴唐烏巾大可疑王右軍與今二王帖中兩本皆不同真定大佛寺有宋太祖像在殿右小樓壁上與此亦不同南京廟又不同華亭孫宗伯有板行古聖賢圖贊與此亦半不同古人已不可見由此寓羮牆想亦小快余欲凂吳中畫手依此作絹素圖今尚未克宋刻絲仙山樓閣卷王氏跋一宋刻絲仙山樓閣頗精工而不甚得畫趣蓋宣政間裝經像函物也若唐伯虎文徴仲歌陸子淵顧華玉跋及君謙民懌輩題稍可重耳卷初藏顧御醫世安子淵外弟亦雲間世家次跋云髙皇帝初禁人間不得蓄伎巧一時妙迹永絶嘉靖中有巧工得舊刻絲思之一夕而悟遂能作此今人間盛行新刻或故令揉涴成舊以索髙價然亦不難辨也宋刻絲之妙不可名狀然只是精工之極謂不甚得畫趣果也嘉靖新刻絲余亦曽見然去宋尚逺元髙尚書夜山王氏跋一髙房山尚書作米家山如孟襄陽詩大自簡逺卷中跋畫勝國名士如趙虞二文敏鄧文肅鮮於困學皆精八法者虞公詩是兩馬中皮囊逮後筆尤可念也尚書畫余四十年前在京師舊家曽見一大山水挂軸趙松雪題其上極推重趙文敏長江疊嶂圖王氏跋二趙文敏此圖沖淡簡逺意在筆外不知於李營丘如何駸駸欲度荆郭前矣跋尾諸詩虞伯生柳道傳勝國名流陳敬宗吳原博先朝學士精八法者而啓南尤畫史中董狐言故足重也次跋云吾嚮者見公畫以為公吳興人故類苕霅間山水耳大江中行十日不遇風波平如席病小間推窗對江南北諸山閲此卷便似芙蓉鏡中美人黛眉湛睩使人心醉以此知前輩之不易嘲也凡古人詩及名畫必須得真境較之乃知其妙芙蓉鏡中語逸趣可想天間五馬圖王氏跋一趙承旨天間五馬圖或謂臨李伯時筆奚官二紫衣杖而立者端嚴有威度朱衣而刷者與馬受刷者一馬齕草者二齒相齮癢者二各極意態垂柳朱闌恍然若飛龍天廄之在目竊謂閻右相韓晉公合為此圖不必伯時本也宋元來畫大約寫逺淡山水為長子昻馬雖擅名第恐視唐技終稍讓耳黃大癡江山勝覽圖王氏跋二近來吳子輩爭先覔勝國趙承旨黃子久王叔明倪元鎮畫幾令宋人無處生活余甚為扼腕今觀子久江山圖僅尋丈耳而有萬里之勢次跋云王右丞詩江流天地外山色有無中是詩家極俊語却入畫三昧黃子久江山勝覽圖是畫家極秀筆却入詩三昧王右丞詩中有畫昔人已言之矣山色有無中果是畫家三昧語第不知江流天地外若何畫使宣和以此為題其魁當作何經營耶王叔明阜齋圖王氏跋一黃鶴山樵阜齋圖有二幀當是一向一背以極其趣耳松鬛極得米海嶽所稱李營丘剛針法峯彎竹木室榭穠麗詳宛大是本色佳境及讀沈啓南歌云此圖倣佛竹裏館茆茨翛然傍川水倚牀張册白日長似題前幀復有孤桐置髹几則後幀也阜齋不知何許人啓南比之輞川應亦不俗吾家小祗園寧減此第此中暫缺主人耳曹茂來先輩持以贄覽之不覺憮然一齋乃分向背勢作二圖大是妙格前此未聞也沈啓南畫家渠率所題詩宛具畫趣第阜齋元人啓南恐未必悉其行事其比之輞川要亦是畫圖中億度之耳黃鶴山樵雲林小隱圖王氏跋一黃鶴山樵王叔明為錢塘崔彥暉作雲林小隱圖叔明所長在重岩復嶂楓丹栗黃宏麗之致耳而此圖則清逺滃鬱大有北苑襄陽妙致驟見之以為大癡老人又疑老人不辦是也圖後意似小未盡問之王百榖云猶及見全本蓋少有浥瀾為裝師裁去耳題署者僧泐季潭叔明既手書所撰雲林辭而同時為辭賦記敘詩歌者凡草七人多佳士而余所知僅山隂王裕金華蘇伯衡始豐徐一夔嘉興鮑恂桐廬俞和臨安錢宰會稽詹愚士而已沈道禎戲謂余惜不及文待詔生當一一為考以報蓋待詔最能詳勝國先朝士大夫始未故也今雲林遺迹不知在何所乃圖顧存可見畫力過木石然文辭更久於畫但得歐蘇為記亦即可不朽倪雲林山隂丘壑圖王氏跋一雲林生平不作青緑山水僅二幅留江南此其最精者也據題初寫寄趙士聸後入鄒惟一家惟一所托以歿者書法亦道婉雅勝其生平所作雲林既不習青緑技何為一落筆便佳豈果有天解耶其畫格故不宜著色不知此圖作何點染料不必沿諸家法令人企慕若渴雲林西園圖王氏跋一雲林此圖乍看不似西園而細求之乃無不合作其用筆似弱而老似淺而深工力最多是得意筆也弱淺是此公本色一味杜撰惟以其天資有獨得處遂成家耳若論工力則良不少其得趣亦由此石刻玄元十一子像王氏跋一十一子像吳興趙承旨手摹書贊登石者今雖稍剝落其意象之古雅與書法之精工尚可據而想見也其人與事僅見於莊列所稱欲以配吾孔氏十哲耳佛髙弟子亦十人事事模倣乃爾余三十年前曽於韓郡丞子祁處見拓本韓時尚為諸生云近甫自荒草中搜出者亦頗糢糊矣韓亦能書極贊之置案頭日臨寫錢舜舉洪崖移居圖王氏跋二洪崖移居圖吳興錢舜舉筆服飾不甚古而神彩秀發暬御亦作天人相覽之令人灑然次跋云按真誥所稱洪崖先生為青城仙伯者與赤松子俱為神農氏師此則唐張氲先生也先生生於隋一名藴字藏真亦自號洪崖長七尺五寸眉目疏秀戴烏帽衣紅蕉葛衫烏犀帶短䩓鞾攜卭竹杖所乘白騾曰雪精從者五曰橘栗术葛拙負六角扇垂雲笠方木鐙二元書木如意長生瓢魏惠壺不柱杓常應開元帝召欲爵之不應辭去尋乘騾入彭仙煉丹井以化今考舜舉此圖貌飾乘從種種相合者蓋即其人也當是時盛言張果先生而不言張藴先生豈先生能杜德機更勝之耶唐傳竒又云李泌鄴侯任誕多大言嘗得酒留客而曰今夜洪崖先生過宿當為具人皆笑之夫以為古青城仙伯則誕以為張氲先生不足誕也鄴侯自靈武功成後失不匿迹耳不然夫安知鄴侯之不為真而先生之不為誕耶仙家有真訣然其所記事率多誕妄此由其徒淺薄無學者欲過張大其教乃反遺人破綻洪崖自是古仙者若夫張氲先生恐止不受開元爵一事係實耳其餘率多傅會無稽跋舉張果證之不知果事亦誕妄也續集跋所引氲事尤多至云好古玩尤令人發噱鄴侯真先生誕正是實論趙吳興歸去來圖王氏跋一趙吳興畫陶彭澤歸去來縱極八法之妙不能不落豎儒吻蓋以永𥘉之不臣晉與吳興之仕元趣相左耳仕宦慕山林自是常情歸去來可圖彭澤令不可圖亦是畫家常格吳興此染無庸來豎儒吻第今時惟偽趙筆多靖節圖尤多即具眼如弇州翁詎能無失鑑但當於此致辨耳古畫山水王氏跋一余癸酉秋自建業揚帆厯采石皖城眺九華匡廬之勝徘徊於黃岡赤壁間所遇無非此圖者若其畫品之妙髙可以攀馬逺父子令伯虎與周臣極意為之亦自不逺所遇無非此圖逸趣可想王安道遊華山圖王氏跋二洪武中吾州王履安以知命之歲挾䇿冒險凌太華絶頂探幽宅與羽人靜姝問答歸而筆之記若詩又能托之畫畫册凡四十絶得馬夏風格天骨遒爽書法亦純雅可愛安道歿歸之里人武氏失其四後於長干酒肆見之傾槖金購歸為武家雅語垂二百年吾友人李憲使攀龍復登其顛所至書吾姓名於石而吾又托友人王參政道行刻石蓮花峯續跋云余既為武氏跋王安道華山圖意欲乞錢叔寶手摹而未果踰月陸丈叔平來訪難其老侍之至暮口不忍言摹畫事也陸丈手其册不置曰此老遂能接宋人不作勝國弱腕第少生耳顧欣然謂余為子留數日存其大都陸丈圖品與安道同故特相契合吾友人俞仲蔚周公瑕莫雲卿輩特妙小楷吾悉取安道敘記及古近體詩托仲蔚唐人雜記并詩托雲卿李于鱗一記六詩喬莊簡一記一賦托公瑕都少卿一記托程孟孺别書作一册此册成安道有靈不免作衛夫人泣矣華山竒迹賴昌黎乃顯近日于鱗一記狀寫入神足與三峯同不朽矣安道善畫復好遊其收拾畫景當無遺此圖即係傳真又非他徒撮取意態者比也第視于鱗筆恐終不無少遜耳司冦後托陸叔平摹此圖并凂俞仲蔚周公瑕莫廷韓分寫諸詩文謂安道有靈當作衛夫人泣嗟乎後起者籍自常理第不知何人能令于鱗泣戴文進七景圖王氏跋一戴文進作圖凡七幀曰浣溪春行卧聽松泉竹溪夜泊雷峯夕照憑欄待月西湖雨霽東籬秋晚余初閲之以為沈啓南作見題字不工及驗其印章而始知為文進也然無一筆錢塘意蒼老秀逸超出蹊徑之外乃知此君與啓南無所不師法妙處亦無所不合耳吾鄉陸太宰全卿各系以詩并跋其後余少時曽問一畫師曰我朝畫何人第一渠答曰戴文進乃吳子論殊不爾然其所推重者無過啓南余觀司冦得此佳畫遂疑為啓南然則菰蘆中善月旦者尚未能作糊名試官也余於畫道淺無敢強作解事第二公恐未易軒輊無所不師法妙處無所不合是蘇味道評無一筆錢塘意則公孫夙因未脫耳王槐野仲父答薛方山仲父書曰公吳人也而負秦性正與此同城南茅屋圖王氏跋一此圖乃錢塘戴文進作有程南雲篆額楊文貞吳餘慶鮑相諸公題詠文進自謂倣陳仲梅而中間大有米襄陽筆意惟落色稍過濃潤耳茅屋中紅袍人豈秋江獨釣例耶戴公平生自負似謂能步趨古人筆筆入畫格耳今司冦乃以有米襄陽意賞之是頌祭將軍惟取其雅歌投壺也戴公地下聞之不知肯認為知己否戴文進山水平逺王氏跋一載文進生前作畫不能買一飽是小厄後百年吳中聲價漸不敵相城是大厄然令具眼觀之尚是我明髙手小厄大厄語足使藝夫流涕驃騎天幸李將軍數竒古來凡事盡然不獨畫也王孟端竹王氏跋一孟端竹為國朝第一手有石室居士梅花道人遺意而清標髙格又似過之余嘗記其二事其一沐黔公行金帛求孟端畫謝絶之後忽作一幅遺其僚素厚黔公者使致之曰姑以是塞公意母言我為公也其二月夜聞鄰笛乘興畫幅竹訪遺之其人乃大賈甚喜具駝絨文綺各二求孟端一配幅孟端却其幣手裂畫壞之嗚呼即無論孟端竹求其人可更得否孟端二事好事者每喜道之然正是畫家俗氣余不嗤其謝絶及裂畫獨恨其塞意訪遺耳患不能為人役勃勃手腕間何扮此鑿壞態為夏太常墨竹王氏跋一亦夏太常墨竹名價甚重近雖小損不減彭城篾材余嘗題一卷云今年秋復從明輔所見此卷掩映斐亹大有好致而水石復妙余因輟以贈之且戲明輔曰晉人不識竹嘗謂是有節薥吾太常里人也盍以歸我明佐笑不答太常吳人也其竹昔重今減不知何説此跋既云輟贈明輔又云盍歸我疑有錯誤沈石田春山欲雨圖王氏跋一石田畫卷無過春山欲雨其源出巨然僧梅花道人而加以秀潤不作驚風怒霆勃怒戰掣之狀而元氣在含吐間夏日九宜堂與沈山人嘉則舍弟敬美曹甥子念相約為此歌雖咄咄賞新語猶自後塵題此圖但書少陵詩天欲今朝雨山回萬古春二句足矣無須多出新語即跋中元氣云云猶覺煩絮石田山水王氏跋一此卷二十六幀幀幀饒氣韻生趣秀溢楮墨問卷初出湯舍人凡十六幀汰其四為十二已又從黃羽淵得十二幀汰其八為四已又從黃淳父得十六幀汰其半為八已又從沈生得十幀汰其八為二此所以精也跋尾彭孔嘉稱文待詔云石田先生神仙中人也此語吾亦聞之待詔且云滿百文某安敢望此老吳中推石田畫咸曰神品今司冦公亦曰畫聖此翁畫贋本最多然余亦曽從賞鑑家獲睹一二真迹其氣韻神采信不凡第用筆終覺粗於書家乃行草也宋人謂元章無楷石田翁未免坐此矣沈啓南畫虞山致道觀昭明手植三檜王氏跋一虞山致道觀有昭明太子手植七星檜然其存者三耳幽竒怪崛種種橫出意表且在理外餘俱宋人補者余嘗欲令錢叔寶尤子求貌之袖手莫敢先晚得沈石田翁畫獨其最舊者三株且為詩歌紀之觀在常熟支有功中丞曽向余贊七檜之竒云真古今罕有今跋稱出意表在理外則信乎怪異矣第有功不言四株已非舊植則宋人補手蓋亦出束廣微上也錢尤袖手莫先猶勝舐筆和墨輩啓南獨貌三株儃儃然得之盤礴裸間矣司冦公既獲其俊何不令彼兩公各一本揭之園亭石田畫隆池阡王氏跋一石田先生遊支硎之隆池阡有記記中有詩至其為圖則後三百日而始成以此知先生之易於文而不易於畫也先生易於文不易於畫良然哉凡能事皆無出之易者不遊域外不入杪忽決無以發其天機也驟雨盈溝澮濕不及寸欲速則不達何事不爾石田臨黃鶴山樵圖王氏跋一此畫太白山圖不知視老樵原本如何當自勝之惟翁亦云榾榾追三月極擬加精緻便欲無此卷後輩豈可易其自負出藍亦不淺矣茂來出示之幾欲移家此間買兩豢角犢墾十雙也臨手果髙欲勝原本自易此古人所云戲效其體者也然亦有能創作不能摹者摹臨勝自運乃其常耳石田畫錢塘山行圖王氏跋一余嘗從桐廬陸行至錢塘諸山不甚崷聳而掩映草樹出沒廬井甚有意態我王子猷云山隂道上行使人應接不暇豈欺哉此時有公事不能出一語博其勝忽忽往來胸中今得沈啓南先生所圖閲之頓還舊觀汪司馬為襄陽守時每登輿必課文一篇司冦敏於汪兹者山行何乃以公事奪不能出一語若云為應接山水不暇猶不失當行石田載酒圖王氏跋一石田詩落句云主人昨夜載春酒酌月還須喚老夫似未得與此會也其描寫風物情景乃爾佳知此老胸中丘壑矣煙波畫舫垂楊曲岸事事倣佛小祗圜獨真山磊塊竒勝耳此乃即景寫或圖者信非髙手不能司冦門下畫士多何不令為祗園圖又寒山圖王氏跋一曰寒山想寫其嚴肅慘栗意此題不知自古有之或自此翁創起石田寫生册王氏跋一此册白石翁雜花果十六紙折枝鳥三紙鵝一紙渡溪虎一紙秋蟬一紙其合者往往登神逸品按五代徐黃而下至宣和主寫花烏妙在設色粉繪隱起如粟精工之極儼苦生肖石田氏乃能以淺色淡墨作之而神采更自翩翩所謂妙而真者也意足不求顔色似前身相馬九方臯語雖俊似不必用為公解嘲昔人評畫謂花鳥為下愚意亦然以其取興淺也作畫用深色最難一色不得法即損格若淺色則可任意勿借口曰逸品唐伯虎詩畫卷王氏跋一唐伯虎桃花菴歌當有圖不知落何人手豫後得一幀意頗與歌似而秀潤婉麗入趙吳興三昧因裝潢成卷按二科志載伯虎首篇作倀倀行又有何處逢春不惆悵何處逢春不可憐今皆削去伯虎此詩如父老談農桑事事實際中間作宛至情語當由才未盡耳然過此則胡釘鉸矣任長卿待御有伯虎桃花一挂軸余雖不解畫亦覺其佳實際情語是伯虎詩本色雖淺率亦自可喜彼時方尚中晚調故應爾幸不落宋足矣周東村賓鶴圖王氏跋一周東村臣為賓鶴翁作圖文太史題字稱二絶偶有長康之化幾五十年而翁諸孫幼於復購得之諸公嘖嘖歎賞幼於兄伯起至以唐伯虎為其曽大父畫西園圖失之不能復以為痛恨幼於不忘其先故當自偷快人得人失伯起亦姑置之何如凡家藏物失之自近則堪懊惱逺則稍可自寬伯起恨曽大父園圖不能復亦自常情此圖在他姓不能如張氏重人失人得未是切諭周東村韓熙載夜宴圖王氏跋一韓熙載夜宴圖乃李主遣國手顧宏中於熙載第偷寫得者曲盡其縱狎跌宕之態宏中别寫本行人間宣和帝收得凡四本俱宏中筆而又有顧大中二本亦佳帝自著譜云大中應是宏中昆季也𢎞治間杜堇古狂稍損益之尋落江南好事大姓家以百斛粟遺祝希哲為作一歌八絶句手題其後為吳中三絶此則東村摹堇圖而白陽陳淳書祝詩周行筆精工不減杜而陳書亦在逸品蓋第四佳本也熙載事絶不足道顧其意欲自汚不肯作亡國相有出於長卿犢鼻之上者昔嚴續僕射為其文可求索熙載神道碑以千金雙鬟為贐熙載不肯作諛辭重相苦欲刪潤立郤其婢題一絶於泥金帶上云余曽於徐正夫太常家見此圖亦臨杜本然非周筆也韓叔言自是風流人豪彼時謂其風采照物是神仙中人每縱轡城苑衆皆隨觀談笑則聽者忘倦獻替多嘉納制誥典雅有元和之風其不欲作亡國相正與錢武肅識見同大抵遭亂世多有此等才難説故自汚亦只是就材料作若使當治世必能自檢郭汾陽聞楊文貞作相遂減伎樂是也弇州詩文勝此公其襟懷亦倣佛似之第立却雙鬟一事恐弇州公遜此決斷吳中諸名士畫王氏跋一右周東村雜山水八幅妙有郭馬筆意唐六如一幅亦精絶陳白陽二幀其一少年筆最工不減六如一寫意亦自清逺似馬文璧不若晚歲之草草也文衡山四幅清逺秀潤得元人趣仇十洲四幅秀氣逼人眉睫間兩水雄逸與東村俱不下宋人陸包山遊天池一幀巉巖陡削秋懷一幀蕭瑟而不寒儉皆可賞也吳中此等雜小圖最多余舊時亦有數本但多係偽筆今此二十一幀經弇州辨過無贋可貴也臨李伯時蓮社圖王氏跋一宋李伯時作蓮社圖其宗人元中為記甚悉元趙吳興子昻重臨之而余所得則又子昻臨本也即孫枝所不論其人物儼雅位置精密益可以想見其二本之妙余乃乞俞仲蔚又略敘所見於後足補元中之缺余復考記內佛陀耶舍者華云覺佛陀跋陀羅者華云覺賢耶舍即鳩摩羅什師與跋陀羅俱從羅什長安中譯經後跋陀羅南邁土廬山與逺公社而耶舍辭姚秦還西域足迹蓋未嘗渡江也且逺以晉元熙元年示寂而道士陸修靜至梁天監初上武帝科儀相去可百歲其不相及無疑要之蓮社事固佳是禪林遊戲三昧地不必計其傅會與否以慈氏蓮花藏例之則三大劫中人皆在會固無不相及也凡釋氏所紀事類多傅會緣其徒史學疏徒欲自侈其事不知翻犯攻駁也此圖亦祗以畫傳耳謂三大劫中人皆在會語太迂不切滕子濟唐人出遊圖內有不係同時者黃長睿謂其揚鑣並驅睇視相語近於得意忘象惟真賞者獨知之以評此圖或近凌氏藏文待詔畫册王氏跋一吳人得文待詔一點染法輒贋作欵識覔生活此三十六紙真待詔得意筆開窗散懷出倪入趙極有意無意之妙而都不著欵識僅餘一詩豈邢娙娥敝衣來前令尹姬自色奪耶元旻必欲吾輩證明之母乃覺有待之為煩也拈出題其後此正恐他夫人故作敝衣面貌者耳有待為煩一語大妙文徴仲雜畫王氏跋一此十幀可謂文氏碎金置山房中敵吾家琳琅矣此畫册應亦與前凌氏册同第經伯樂湔祓價便數倍沖虛信仙品然亦詎能無所待哉文太史雲山畫卷王氏跋一文太史徴仲諸生時為黃博士應龍作此卷畫倣老米氣暈生色遂不減髙彥敬書法圓熟翩翩出晉人比之晚年筆少骨而多韻詩雖大厯以後語亦自楚楚應龍絶寶愛之戒其後人勿為餅金懸購者所得去六十年而其諸孫強以留余得厚直而去余聊以寓吾目而已佳畫遺子孫絶不易守今以屬司冦公亦可謂得所歸矣朱司農子孫固不如桐鄉民衡翁詩畫卷王氏跋一癸草余避地吳中一日以間謁文太史手此卷索題太史坐隅畫蘭石畢覺秀色朗朗射人眉睫間已書數古體詩詩亦清拔是平生合作者而書法從豫章來尤蒼老可愛昔人謂求衡翁書畫者惟入其書室懇其靣作乃得佳且無偽今觀此果然文徴仲勸農圖祝希哲記王氏跋一希哲齒長於徴仲此卷圖與記不知孰先後記圖圖記固當有别司冦後以祝記入三吳楷法册割去畫余謂不當爾陳道復書畫王氏跋一白陽道人作書畫不好模楷而綽有逸趣故生平無一俗筆在二法中俱可稱散僧入聖此卷尤其合作者至書少陵贈王宰一歌自擬亦不淺矣吳中少年不勝家雞之賤吾故存之以俟夫賞識者道復每稱文待詔為師元美巵言云家弟嘗問待詔道復曽從翁學書畫耶待詔微哂曰我道復舉業師耳渠書畫自有門徑非吾徒也意不滿之如此然余舅氏楊紫溪翁曽同文休承兄弟論畫休承問吳中畫品舅氏首舉衡翁因曰賢昆仲皆佳手此外維陳白陽筆法超邁休承擊節曰白陽筆法果髙恐老父亦當讓之紫溪翁亦以為然曽向余述之舅氏畫家専門嘉靖末名噪武林休承又號為紹翁畫學者其與紫溪翁言是心髓語何乃與衡翁論懸絶且兩處皆面語非他人傳者真不可解以余臆斷道復祗長於淺色寫意非若衡翁無所不能筆法或有獨得余非當行不能深知也衡翁對敬美或是自謙語且道其實司冦公誤疑為不滿耳道復書亦近米不知吳中少年何為賤之陳道復水仙梅卷王氏跋一道復畫亦花卉為多想所長在此畫扇卷王氏跋四甲之五跋云右扇卷凡七人十八面內戴文進松崖圖筆簡而趣有餘與祝希哲題字足稱二絶沈啓南五而多老筆獨一面榴房妙絶詞似戲聾老人且為祝生子亦有希哲題字唐伯虎二面其一秀色射人其一布置精密而逸趣不乏可與文進鼎足張夢晉石湖秋渠風流名士陳道復山水花卉九面所謂意足不求顔色似者題字亦多佳致謝時臣小米派也比之本色差不俗耳甲之六跋云右扇卷皆徴仲畫也凡二十面前一面乃癸丑秋送余北上者時年八十四矣尚能作蠅頭小楷題七言見贈彭孔嘉以排律繼之楷法遂不減公餘十九面皆雜山水夏木寒林清泉白石或題詩或止押名而蒼古秀潤妙有勝國諸公遺意內十面尤合作覽之令人神爽甲之七跋云右扇卷凡六人為畫二十一東村周臣七面包山陸治六面十洲仇英三面文水文嘉二面五峯文伯仁二面沱江陳括一面隱之六跋云陶翁存仁圖天文地理各一文太史徴明六陳太學道復一李東昌孔陽一梁禮部孜一尢山人永三張生復一皆畫也又二面作梅杏花似吳延孝筆而許太僕初小楷二賦其上書畫法多可觀據所稱甲乙五六等當是連前字扇為次耳戴沈唐文四公畫若在扇真為至寶其可喜可愛更過於幅軸也面字背畫是扇常格兹所云題字及書詩賦者似即在畫一面第不知亦有係與前字扇為一柄者否若拆開為卷帙不無可惜文伯仁燕臺八景王氏跋一八景今見一統志中伯仁作此圖比鑿空強撰者味固長若得選館閣諸公詩佳者託公瑕廷韓輩書之用以相配亦足稱名卷陸叔平遊洞庭詩畫十六幀王氏跋一余以壬申之秋九月遊洞庭而陸叔平時亦從諸少年往蓋七十七矣而簪履在雲氣間若飛歸日始草一記及古體若干首以貽陸丈存故事耳居明年之五月而陸丈來訪出古紙十六幅各為一景若採余詩之景不重犯者而貌之其秋骨秀削浮天渺瀰的為太湖兩洞庭傳神無爽也妙處上逼李營丘郭河中馬夏而下所不論矣問之陸丈自言至八十二畫當夫成審爾吾於其時上章乞道士服䇿一杖從探未竟之勝而吾二人者合作摩詰一身毋謂獪少年得隴望蜀也詩中有畫畫中有詩昔人於摩詰有是評矣然詩中畫非善畫者莫能拈出而畫中詩亦非工詩者莫能點破二者互為宅第畫無所不可詩而詩容有不可畫則是兩語者又若専為畫論也叔平畫元美詩近日真無有兩公瑕畏水不敢去難令執管其間若十六詩公自書而記令莫廷韓書并洞庭景可共稱四絶第不知叔平此圖是為太湖傳神是為弇州詩寫意若無詩者遂不畫則亦止是詩中畫也余謂叔平家此湖山中當以生平意所賞寫為數十圖令司冦逐一詩之斯盡洞庭之勝耳八十二乃大成道復䇿杖大是佳境惜俱不能踐悵恨悵恨錢叔寶溪山深秀圖王氏跋一余近獲髙麗貢繭潔白如玉夏月錢叔寶見過令作矮行長幀淺色溪山深秀圖結法一派流自黃子久而間以啓南老筆蒼古秀潤絶出蹊徑之外一時吳中名士俱作歌賞羡之真勝事也人或謂余有所寄則不然大丈夫好山水便當謝去朝市安用役役寄此為然人生有義命要不當以一端成出處也譬如見佳畫輒云是真山水見佳山水輒云一幅真畫究竟何所歸書此志感且以解嘲有所寄正是司冦公心事諸跋中屢屢見之何為不肯輸服見佳畫輒云是真見佳景輒云是畫是幻境問心語以較夫廊廟山林良有似焉魏公子牟曰身在江海之上心懸魏闕之下謝元暉詩曰既歡懷祿情復協滄洲趣此二君孰愈人必多右元暉余則獨嘉子牟何者息念甚難身能脫即是勇斷彼居廊廟者何嘗頃刻忘見在正自日用不知耳夏山欲雨圖王氏跋一梁禮部思伯見訪心逺堂出沈啓南春山欲雨圖示之後有吾兄弟沈嘉則三歌嘉則獨作夏山已雨語為不類思伯遂以錢叔寶夏山欲雨圖見示索跋叔寶此圖暗靄鬱浡生氣淋漓遂足雁行啓南獨二荷傘人亦似已雨狀幾欲書嘉則長歌應之嫌其形穢相與一大笑而止不然少陵雷聲花氣二言或足塞白也思伯其肯我否思伯亦善畫何不即畫夏山已雨圖少陵二語佳矣第千峯雨可畫雷聲花氣若何畫尤子求華清上馬圖王氏跋一楊太真華清上馬圖舊有粉本而寂寥不甚稱尤子求善白描會余得蜀箋乃乞子求作圖而以意增損之遂妙吳中善書者俞仲蔚連昌宫詞彭孔嘉長恨歌周公瑕津陽門行黃淳父清平調八首及袁魯望張伯起王百穀王元馭華幼圜舍弟輩各以小楷書宫詞遂成佳本其他固所不睱論也畫家謂人物難而美女尤難此據鞍景不知若何司冦何不作一歌附其後錢叔寶紀行圖王氏跋一吾家太倉去神都為水道三千七百里自吾過舞象而還往者十二而水居其八去年春二月入領太僕友人錢叔寶以繪事妙天下為余圖自吾家小祗園至廣陵得三十二幀蓋余嘗笑叔寶如附趙大年不能作五百里觀也叔寶上足曰張復余舟而北所至屬圖之為五十幀以貽叔寶稍於晴晦旦暮之間加色澤或為理其映帶輕重而已張元春即寓敬美家余時見之美少年也渠所至為圖司冦公當有指授得叔寶稍潤色之應更佳耳身曽親厯以入畫自有深味凡吳越人宦京者宜人藏一卷鍾馗移家圖王氏跋一鍾馗事僅見唐傳竒中楊用修以為喬鍾葵字辟邪後人因而附會之恐亦非也李伯時舊戲作嫁妹圖或云即移家圖余嘗見其副本叔寶雖倣佛其意而所增飾遇半昔謂橋神貌醜畏張平子圖之不敢見異日叔寶可免勾攝之苦矣余初時曽於柴山人季通處見一本云是嫁妹圖仇十洲筆想亦臨伯時本也第不知當時作此圖是取何意書畫跋跋卷三
